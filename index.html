<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛情反正日誌 — 단편 웹진</title>

<!-- =====================================================
  구글 폰트 불러오기
  - Libre Baskerville : 영문 세리프 (제목용)
  - IBM Plex Mono     : 영문 고정폭 (태그·라벨용)
  - Noto Serif KR     : 한국어 본문 폰트
  - Noto Serif SC     : 한자 타이틀 폰트
  - Hahmlet           : 게시글 제목 전용 폰트
===================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;600&family=Hahmlet:wght@300;400;500;600&family=Nanum+Myeongjo:wght@400;700&family=Ma+Shan+Zheng&family=ZCOOL+QingKe+HuangYou&family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />

<style>
/* =====================================================
  ■ 색상·크기 변수 모음 (CSS 변수)
    여기서 색상을 바꾸면 사이트 전체에 반영됩니다.
    라이트 모드 기준입니다.
===================================================== */
:root {
  /* 배경 계열 — 베이지를 더 밝고 따뜻하게 올렸습니다 */
  --c-paper:   #faf6ee;   /* 전체 배경: 더 밝은 크림 베이지 */
  --c-cream:   #f3ece0;   /* 카드·패널 배경 */
  --c-tan:     #d4c9b4;
  --c-warm:    #b8a88a;
  --c-brown:   #7a5c3c;

  /* 글씨 계열 — 대비를 높여 가독성 강화 */
  --c-ink:     #1a1208;   /* 본문: 더 짙게 */
  --c-mid:     #3d2e1a;   /* 중간 강조: 더 짙게 */
  --c-muted:   #7a6548;   /* 흐린 글씨: 더 짙게 → 잘 보이게 */
  --c-dim:     #a89070;   /* 힌트 글씨: 기존보다 훨씬 밝게 */

  /* 포인트 색 */
  --c-accent:  #b02020;   /* 빨강 강조 */
  --c-gold:    #9a7010;   /* 금색 강조 */

  /* 테두리 — 조금 더 진하게 해서 구분선이 잘 보이게 */
  --c-border:  #cec0a8;
  --c-border2: #b8a080;

  /* 실제 사용 별칭 */
  --bg:        var(--c-paper);
  --surface:   #ffffff;   /* 카드는 순백 */
  --surface2:  var(--c-cream);
  --border:    var(--c-border);
  --text:      var(--c-ink);
  --text-mid:  var(--c-mid);
  --text-muted:var(--c-muted);
  --text-dim:  var(--c-dim);
  --accent:    var(--c-accent);
  --gold:      var(--c-gold);

  --sidebar-w: 280px;
  --header-h:  58px;
  --radius:    3px;
  --trans:     0.3s cubic-bezier(0.4,0,0.2,1);
  --shadow:    0 2px 12px rgba(42,31,20,0.10);
  --shadow-lg: 0 8px 40px rgba(42,31,20,0.18);
}



/* =====================================================
  ■ 기본 리셋 & body 스타일
===================================================== */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth }
html, body { height:100%; }
body {
  font-family:'Noto Serif KR',serif;
  background:var(--bg);
  color:var(--text);
  min-height:100%;
  overflow-x:hidden;
  transition:background 0.4s;
  user-select:none;          /* 텍스트 드래그 선택 방지 */
  -webkit-user-select:none;
}

/* 종이 질감 그레인 오버레이 (배경 위에 살짝 깔리는 노이즈) */
body::after {
  content:'';
  position:fixed; inset:0; z-index:9998; pointer-events:none;
  opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* =====================================================
  ■ 인트로 화면 (처음 켰을 때 나오는 전체화면) — 레트로 버전
    클릭하면 사라집니다.
===================================================== */
#intro {
  position:fixed; inset:0; z-index:9000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer;
  overflow:hidden;
  background:#f0e6d2;
  animation:introBgDarken 2.0s cubic-bezier(0.6,0,0.4,1) forwards;
}
@keyframes introBgDarken {
  0%   { background:#f0e6d2 }
  100% { background:#1a0f08 }
}

/* ── 인트로 배경 사진 — 레트로 필터 + 느린 드리프트 ── */
.intro-bg-photo {
  position:absolute; inset:-6%; z-index:-1; pointer-events:none;
  background-image:url('https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EB%B6%89%EC%9D%80-%EB%A0%88%ED%8A%B8%EB%A1%9C-%EC%A0%84%ED%99%94%EA%B8%B0--%ED%8E%B8%EC%A7%80--%EA%BD%83.png?raw=true');
  background-size:cover; background-position:center;
  filter:sepia(0.55) saturate(1.35) contrast(1.15) brightness(0.82) hue-rotate(-6deg);
  opacity:0; 
  animation:
    introPhotoDrift 22s ease-in-out infinite alternate,
    introPhotoFadeIn 1.6s ease 0.1s forwards;
}
@keyframes introPhotoDrift {
  0%   { transform:scale(1.0)  translate(0,0); }
  100% { transform:scale(1.09) translate(-1.6%,-1.1%); }
}
@keyframes introPhotoFadeIn {
  0%   { opacity:0; }
  100% { opacity:0.88; }
}

/* 배경 — 세피아 톤 + 비네트 */
#intro::before {
  content:'';
  position:absolute; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 90% 75% at 50% 45%, #2a1810 0%, #170d07 65%, #0c0603 100%);
  mix-blend-mode:multiply;
  opacity:0;
  animation:introBgOverlay 2.0s cubic-bezier(0.6,0,0.4,1) forwards;
}
@keyframes introBgOverlay {
  0%   { opacity:0 }
  55%  { opacity:0 }
  100% { opacity:0.62 }
}

/* 네온 글로우 펄스 — 청록 + 적색 듀오톤 (레트로 VHS 색수차 느낌) */
#intro::after {
  content:'';
  position:absolute; inset:0; z-index:1; pointer-events:none;
  background:
    radial-gradient(ellipse 55% 42% at 36% 40%,
      rgba(225,75,42,0.20) 0%, transparent 65%),
    radial-gradient(ellipse 55% 42% at 66% 58%,
      rgba(40,180,195,0.15) 0%, transparent 65%);
  opacity:0;
  animation:introGlowPulse 4s ease-in-out 2.2s infinite alternate;
}
@keyframes introGlowPulse {
  from { opacity:0.6 }
  to   { opacity:1 }
}

/* 클릭 후 퇴장 */
#intro.hidden {
  animation:introOut 1.1s cubic-bezier(0.7,0,0.3,1) forwards;
  pointer-events:none;
}
@keyframes introOut {
  0%   { opacity:1; transform:scale(1); filter:blur(0) }
  30%  { opacity:1; transform:scale(1.03); filter:blur(0) }
  100% { opacity:0; transform:scale(1.1); filter:blur(12px) }
}

/* ── 도트/그레인 노이즈 텍스처 — 더 또렷하게 ── */
.intro-grain {
  position:absolute; inset:-20%; z-index:3; pointer-events:none;
  opacity:0.16; mix-blend-mode:overlay;
  background-image:
    repeating-radial-gradient(circle at 0 0, transparent 0, rgba(255,255,255,0.55) 1px, transparent 1.6px);
  background-size:3px 3px;
  animation:grainShift 0.4s steps(4) infinite, introFadeIn 1.5s ease 0.2s both;
}
@keyframes grainShift {
  0%   { transform:translate(0,0) }
  25%  { transform:translate(-1.2%,1%) }
  50%  { transform:translate(1%,-0.8%) }
  75%  { transform:translate(-0.6%,-1.2%) }
  100% { transform:translate(0,0) }
}

/* ── CRT 비네트 — 더 짙게 ── */
.intro-vignette {
  position:absolute; inset:0; z-index:4; pointer-events:none;
  background:radial-gradient(ellipse 70% 65% at 50% 50%, transparent 45%, rgba(0,0,0,0.72) 100%);
  opacity:0; animation:introFadeIn 1.6s ease 0.2s forwards;
}



/* ── CRT 스캔라인 — 더 짙고 굵게 ── */
.intro-scanlines {
  position:absolute; inset:0; z-index:2; pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.18) 2px,
    rgba(0,0,0,0.18) 3px
  );
  animation:introFadeIn 2s ease 0.5s both;
}
/* 스캔라인 위로 천천히 흐르는 밝은 띠 (브라운관 롤링 느낌) */
.intro-scanroll {
  position:absolute; left:0; right:0; height:160px; z-index:2; pointer-events:none;
  background:linear-gradient(to bottom, transparent, rgba(255,235,200,0.10) 50%, transparent);
  animation:scanRoll 6s linear infinite, introFadeIn 1.5s ease 1s both;
}
@keyframes scanRoll {
  0%   { top:-120px }
  100% { top:100% }
}

/* ── 네 모서리 브라켓 — 레트로 사이니지 더블라인 ── */
.intro-corner {
  position:absolute; z-index:10; pointer-events:none;
  width:clamp(32px,5.5vw,54px); height:clamp(32px,5.5vw,54px);
  opacity:0;
}
.intro-corner::after {
  content:''; position:absolute; inset:5px;
  border-color:rgba(220,150,60,0.30);
}
.intro-corner.tl { top:clamp(16px,3vw,32px); left:clamp(16px,3vw,32px);
  border-top:2px solid rgba(225,165,70,0.65); border-left:2px solid rgba(225,165,70,0.65);
  animation:introCornerIn 0.7s ease 0.9s forwards; }
.intro-corner.tl::after { border-top:1px solid rgba(220,150,60,0.30); border-left:1px solid rgba(220,150,60,0.30); }
.intro-corner.tr { top:clamp(16px,3vw,32px); right:clamp(16px,3vw,32px);
  border-top:2px solid rgba(225,165,70,0.65); border-right:2px solid rgba(225,165,70,0.65);
  animation:introCornerIn 0.7s ease 1.0s forwards; }
.intro-corner.tr::after { border-top:1px solid rgba(220,150,60,0.30); border-right:1px solid rgba(220,150,60,0.30); }
.intro-corner.bl { bottom:clamp(16px,3vw,32px); left:clamp(16px,3vw,32px);
  border-bottom:2px solid rgba(225,165,70,0.65); border-left:2px solid rgba(225,165,70,0.65);
  animation:introCornerIn 0.7s ease 1.1s forwards; }
.intro-corner.bl::after { border-bottom:1px solid rgba(220,150,60,0.30); border-left:1px solid rgba(220,150,60,0.30); }
.intro-corner.br { bottom:clamp(16px,3vw,32px); right:clamp(16px,3vw,32px);
  border-bottom:2px solid rgba(225,165,70,0.65); border-right:2px solid rgba(225,165,70,0.65);
  animation:introCornerIn 0.7s ease 1.2s forwards; }
.intro-corner.br::after { border-bottom:1px solid rgba(220,150,60,0.30); border-right:1px solid rgba(220,150,60,0.30); }
@keyframes introCornerIn {
  from { opacity:0; transform:scale(0.6) }
  to   { opacity:1; transform:scale(1) }
}

/* ── 레트로 코너 라벨 (REC ●, 타임코드 등) ── */
.intro-rec {
  position:absolute; top:clamp(40px,6vw,60px); left:clamp(56px,9vw,92px); z-index:10;
  display:flex; align-items:center; gap:6px;
  font-family:'Pretendard',sans-serif; font-size:10px;
  letter-spacing:0.14em; color:rgba(230,90,60,0.85);
  opacity:0; animation:introFadeIn 0.6s ease 1.3s forwards;
}
.intro-rec .dot {
  width:6px; height:6px; border-radius:50%;
  background:#e2503a;
  animation:recBlink 1.1s ease-in-out infinite;
  box-shadow:0 0 6px rgba(220,60,40,0.8);
}
@keyframes recBlink { 0%,100% { opacity:1 } 50% { opacity:0.25 } }

.intro-timecode {
  position:absolute; top:clamp(40px,6vw,60px); right:clamp(56px,9vw,92px); z-index:10;
  font-family:'Pretendard',sans-serif; font-size:10px;
  letter-spacing:0.08em; color:rgba(220,190,140,0.6);
  font-variant-numeric:tabular-nums;
  opacity:0; animation:introFadeIn 0.6s ease 1.4s forwards;
}

/* ── 이미지 슬롯 ── */
.intro-img-wrap {
  position:relative; z-index:10;
  margin-bottom:28px;
  opacity:0; animation:introFadeIn 0.8s ease 0.3s forwards;
}
.intro-img-wrap img {
  max-height:110px; max-width:240px;
  object-fit:contain;
  display:block; margin:0 auto;
  filter:drop-shadow(0 2px 20px rgba(200,140,60,0.4));
}
.intro-img-wrap.hidden { display:none }

/* ── 메인 타이틀 ── */
.intro-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(72px,19vw,172px);
  font-weight:600;
  letter-spacing:0.04em;
  line-height:1.0;
  display:flex; flex-direction:column; align-items:center;
  position:relative; z-index:10;
  gap:0;
  text-align:center;
  margin-top:-16vh;
}
.ch-row { display:block; position:relative; line-height:1.0; }

/* 한자 6글자 — 명조 계열 안에서 굵기/스타일 대비로 차이를 줌 */
.hanja-1 { font-family:'Noto Serif SC',serif; font-weight:600; }      /* 愛 — 굵은 세리프 */
.hanja-2 { font-family:'Nanum Myeongjo',serif; font-weight:400; }     /* 情 — 전통 명조 */
.hanja-3 { font-family:'Noto Serif KR',serif; font-weight:300; }      /* 反 — 가는 명조 */
.hanja-4 { font-family:'Hahmlet',serif; font-weight:600; }            /* 正 — 굵은 함렛 */
.hanja-5 { font-family:'Nanum Myeongjo',serif; font-weight:700; }     /* 日 — 명조 볼드 */
.hanja-6 { font-family:'Noto Serif SC',serif; font-weight:300; }      /* 誌 — 가는 세리프 */

.ae-heart-wrap {
  display:inline-block;
  position:relative;
  transform:rotate(6deg);
}
.ch-ae {
  font-size:1em;
  display:inline-block;
  position:relative; z-index:2;
}
.heart-svg {
  position:absolute;
  left:-0.65em; top:58%;
  transform:translateY(-50%);
  width:2.2em; height:1.44em;
  z-index:0;
  opacity:0.9;
  fill:#c23a28;
  filter:drop-shadow(0 0 12px rgba(200,50,30,0.65));
  animation:heartGlow 2.4s ease-in-out 2.0s infinite alternate;
}
@keyframes heartGlow {
  from { filter:drop-shadow(0 0 8px rgba(200,50,30,0.5)) drop-shadow(0 0 18px rgba(200,50,30,0.18)) }
  to   { filter:drop-shadow(0 0 16px rgba(230,70,40,0.8)) drop-shadow(0 0 34px rgba(210,50,30,0.32)) }
}

/* 개별 글자 등장 — 색수차(VHS 글리치) 포함 */
.intro-title .ch {
  display:inline-block;
  position:relative; z-index:1;
  opacity:0;
  color:#ecdcc0;
  transform:translateY(22px) scale(0.88);
  filter:blur(6px);
  animation:charIn 0.85s cubic-bezier(0.22,1,0.36,1) forwards;
  text-shadow:
    1px 0 0 rgba(220,70,50,0),
    -1px 0 0 rgba(40,180,190,0),
    0 2px 8px rgba(0,0,0,0.6);
}
.intro-title .ch.accent {
  color:#d2452c;
  text-shadow:
    1px 0 0 rgba(220,70,50,0),
    -1px 0 0 rgba(40,180,190,0),
    0 2px 8px rgba(0,0,0,0.6);
}
@keyframes charIn {
  0%   { opacity:0; transform:translateY(22px) scale(0.88); filter:blur(6px);
         text-shadow:1px 0 0 rgba(220,70,50,0), -1px 0 0 rgba(40,180,190,0), 0 2px 8px rgba(0,0,0,0.6); }
  40%  { opacity:1; transform:translateY(-4px) scale(1.07) translateX(2px); filter:blur(0);
         text-shadow:2px 0 0 rgba(220,70,50,0.55), -2px 0 0 rgba(40,180,190,0.45), 0 2px 20px rgba(0,0,0,0.4); }
  55%  { transform:translateY(-2px) scale(1.03) translateX(-1px);
         text-shadow:-1.5px 0 0 rgba(220,70,50,0.4), 1.5px 0 0 rgba(40,180,190,0.35), 0 2px 16px rgba(0,0,0,0.4); }
  72%  { transform:translateY(1px) scale(0.99) translateX(0);
         text-shadow:1px 0 0 rgba(220,70,50,0.2), -1px 0 0 rgba(40,180,190,0.18), 0 2px 10px rgba(0,0,0,0.5); }
  100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0);
         text-shadow:1px 0 0 rgba(220,70,50,0), -1px 0 0 rgba(40,180,190,0), 0 2px 8px rgba(0,0,0,0.6); }
}

/* 글자 등장 후 — 가끔씩 미세하게 떨리는 VHS 트래킹 에러 */
.intro-title .ch:not(.accent) {
  animation:charIn 0.85s cubic-bezier(0.22,1,0.36,1) forwards, charGlow 3s ease-in-out 2.2s infinite alternate, vhsJitter 7s ease-in-out 3s infinite;
}
.intro-title .ch.accent {
  animation:charIn 0.85s cubic-bezier(0.22,1,0.36,1) forwards, vhsJitter 7s ease-in-out 3.4s infinite;
}
@keyframes charGlow {
  from { text-shadow:1px 0 0 rgba(220,70,50,0), -1px 0 0 rgba(40,180,190,0), 0 2px 8px rgba(0,0,0,0.55) }
  to   { text-shadow:1px 0 0 rgba(220,70,50,0.22), -1px 0 0 rgba(40,180,190,0.18), 0 2px 14px rgba(0,0,0,0.45) }
}
@keyframes vhsJitter {
  0%, 96%, 100% { transform:translateX(0) }
  97%           { transform:translateX(-1.5px) }
  98%           { transform:translateX(1px) }
  99%           { transform:translateX(-0.5px) }
}

/* ── 부제목 — 레트로 타이프라이터 ── */
.intro-sub {
  font-family:'Pretendard',sans-serif;
  font-size:clamp(11px,1.5vw,15px);
  letter-spacing:0.16em; text-transform:uppercase;
  color:rgba(232,210,170,0.85);
  position:relative; z-index:10;
  text-align:center;
  opacity:0; animation:introFadeIn 0.8s ease 1.8s forwards;
  margin-top:clamp(20px,4vh,40px);
}
.intro-sub::before, .intro-sub::after {
  content:'※'; color:rgba(200,100,60,0.7); font-size:1.6em; margin:0 8px;
  display:inline-block; vertical-align:middle; line-height:0;
}

/* ── 클릭 유도 텍스트 — 점멸 네온 사인 느낌 ── */
.intro-click {
  font-family:'Pretendard',sans-serif;
  font-size:clamp(10px,1.3vw,13px);
  letter-spacing:0.2em; text-transform:uppercase;
  color:rgba(235,150,90,0.92);
  position:relative; z-index:10;
  text-align:center;
  margin-top:clamp(20px,4vh,40px);
  opacity:0;
  text-shadow:0 0 10px rgba(220,110,60,0.5);
  animation:introBlink 1.7s steps(1) 2.4s infinite;
}
@keyframes introBlink {
  0%, 45%  { opacity:1 }
  50%, 95% { opacity:0.25 }
  100%     { opacity:1 }
}

/* 공통 페이드인 */
@keyframes introFadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
/* (하위 호환) */
@keyframes introFadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* =====================================================
  ■ 상단 헤더
===================================================== */
#header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:var(--header-h);
  background:var(--bg);
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
  transition:background 0.4s;
}
/* 헤더 아래 보조 선 */
#header::after {
  content:''; position:absolute; bottom:-4px; left:0; right:0;
  height:1px; background:var(--border); opacity:0.5;
}

/* 로고 (한자 타이틀) */
.logo {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:19px; color:var(--text); cursor:pointer;
  letter-spacing:0.05em; display:flex; align-items:baseline; gap:8px;
}
.logo-hanja {
  font-weight:600; font-size:19px; letter-spacing:0.06em;
  /* 빨강→금색 그라디언트 글씨 */
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-tag {
  font-family:'Pretendard',sans-serif;
  font-size:8px; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--text-muted);
}
.header-right { display:flex; align-items:center; gap:10px }

/* 헤더 아이콘 링크 컨테이너 */
#headerIcons { display:flex; align-items:center; gap:6px }

/* 헤더 아이콘 링크 개별 버튼
   아이콘 이미지가 없으면 텍스트·이모지가 표시됩니다. */
.header-icon-link {
  display:flex; align-items:center; justify-content:center;
  width:34px; height:34px;
  border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text-muted); font-size:14px; text-decoration:none;
  transition:border-color var(--trans), color var(--trans);
  flex-shrink:0;
}
.header-icon-link:hover { border-color:var(--gold); color:var(--gold) }
.header-icon-link img {
  width:20px; height:20px;
  object-fit:contain;
  display:block;
}
/* 햄버거 메뉴 버튼 (모바일) */
.burger {
  width:42px; height:42px;
  border:none; border-radius:0;
  background-image:url("https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B2%84%ED%8A%BC-%EC%A0%95%EC%82%AC%EA%B0%81%ED%98%95.png?raw=true");
  background-size:100% 100%; background-repeat:no-repeat;
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
  transition:filter var(--trans);
}
.burger:hover { filter:brightness(0.92) }
.burger span { display:block; width:16px; height:1px; background:var(--text-mid); transition:all var(--trans); transform-origin:center }
/* 열렸을 때 X 모양으로 변환 */
.burger.open span:nth-child(1) { transform:translateY(6px) rotate(45deg) }
.burger.open span:nth-child(2) { opacity:0; transform:scaleX(0) }
.burger.open span:nth-child(3) { transform:translateY(-6px) rotate(-45deg) }

/* =====================================================
  ■ 어두운 배경 오버레이 (모바일에서 사이드바 열릴 때)
===================================================== */
#overlay {
  position:fixed; inset:0; z-index:150;
  background:rgba(14,11,8,0.55);
  opacity:0; pointer-events:none; transition:opacity var(--trans);
}
#overlay.visible { opacity:1; pointer-events:all }

/* =====================================================
  ■ 왼쪽 사이드바 (목차 메뉴)
===================================================== */
#sidebar {
  position:fixed; top:0; left:0; bottom:0; z-index:200;
  width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  box-shadow:var(--shadow-lg);
  transform:translateX(-100%);    /* 기본: 왼쪽으로 숨김 */
  transition:transform var(--trans);
  overflow-y:auto; display:flex; flex-direction:column;
}
#sidebar.open { transform:translateX(0) }  /* 열리면 원위치 */

.sidebar-head {
  padding:20px;
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-logo {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:15px; font-weight:600; letter-spacing:0.06em;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.sidebar-close {
  width:28px; height:28px; background:none; border:none;
  color:var(--text-muted); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border-radius:var(--radius); transition:color var(--trans);
}
.sidebar-close:hover { color:var(--accent) }

/* 대메뉴 (Fiction / Art / Videos) — 글씨 더 크고 선명하게 */
.nav-section  { padding:8px 0 }
.nav-cat {
  display:flex; align-items:center; justify-content:center; position:relative;
  padding:13px 20px; cursor:pointer;
  font-family:'Pretendard',sans-serif;
  font-size:11px; font-weight:400; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text-mid);   /* 기존 text-muted → text-mid 로 더 진하게 */
  transition:all var(--trans); user-select:none;
  border-left:3px solid transparent;   /* 기존 2px → 3px */
  text-align:center;
}
.nav-cat-arrow { position:absolute; right:20px; font-size:8px; transition:transform var(--trans); color:var(--text-muted) }
.nav-cat:hover, .nav-cat.active { color:var(--text); border-left-color:var(--accent) }
.nav-cat.active { color:var(--accent) }
.nav-cat.open .nav-cat-arrow { transform:rotate(90deg) }

/* 접혔다 펼쳐지는 서브메뉴 컨테이너 */
.nav-sublist { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1); background:var(--surface2) }
.nav-sublist.open { max-height:2000px }


/* 소목차 — 클릭 시 카테고리 페이지로 바로 이동하므로 더 눈에 띄게 */
.nav-sub {
  padding:11px 20px 11px 28px; cursor:pointer;
  font-size:12.5px; font-weight:400;
  color:var(--text-mid);
  letter-spacing:0.03em;
  transition:color var(--trans), background var(--trans);
  border-left:3px solid transparent;
  border-bottom:1px solid var(--border);
  font-family:'Pretendard',sans-serif;
  text-align:center;
}
.nav-sub:hover { color:var(--text); background:var(--surface); border-left-color:var(--gold) }
.nav-sub.active { color:var(--accent); border-left-color:var(--accent) }

/* 개별 게시글 항목 */
.nav-content-item {
  padding:5px 20px 5px 42px; cursor:pointer;
  font-size:11px; color:var(--text-muted);   /* 기존 text-dim → text-muted */
  font-family:'Noto Serif KR',serif;
  transition:color var(--trans);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display:flex; align-items:center; gap:6px;
}
.nav-content-item:hover  { color:var(--text) }
.nav-content-item.active { color:var(--accent) }

/* 전체 목차 안의 게시글 항목 — 다른 nav-sub 와 통일 */
.nav-content-item.all-list-item {
  padding:5px 20px;
  justify-content:center;
  text-align:center;
  font-family:'Pretendard',sans-serif;
  font-size:12.5px;
  color:var(--text-mid);
}
.nav-lock-icon { font-size:9px; opacity:0.6 }

/* 사이드바 최하단 이미지 (목차 열렸을 때만 보임) */
.sidebar-bottom-img-wrap {
  margin-top:auto;
  pointer-events:none;
  line-height:0;
}
.sidebar-bottom-img-wrap img {
  width:100%;
  display:block;
  object-fit:contain;
  object-position:left bottom;
}

.sidebar-divider { height:1px; background:var(--border); margin:4px 0 }

/* =====================================================
  ■ 메인 콘텐츠 영역
===================================================== */
#main {
  position:relative; z-index:1;
  margin-top:var(--header-h);
  min-height:calc(100% - var(--header-h));
  padding:40px 22px 84px;
  max-width:740px;
  margin-left:auto; margin-right:auto;
}
#main::before {
  content:'';
  position:fixed; inset:0; z-index:-1;
  background-image:url("https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B0%B0%EA%B2%BD.png?raw=true");
  background-size:cover; background-position:center top; background-repeat:no-repeat;
}

/* ── 게시글 목차 화면 레트로 효과 (글 읽는 뷰어에서도 동일하게 적용) ── */
.toc-retro-vignette {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:radial-gradient(ellipse 80% 70% at 50% 40%, transparent 50%, rgba(20,10,5,0.30) 100%);
}
.toc-retro-scanlines {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.09) 2px, rgba(0,0,0,0.09) 3px
  );
  mix-blend-mode:multiply;
}
.toc-retro-grain {
  position:fixed; inset:-20%; z-index:0; pointer-events:none;
  opacity:0.09; mix-blend-mode:overlay;
  background-image:
    repeating-radial-gradient(circle at 0 0, transparent 0, rgba(255,255,255,0.5) 1px, transparent 1.6px);
  background-size:3px 3px;
  animation:grainShift 0.5s steps(4) infinite;
}

/* =====================================================
  ■ 메인 랜딩 화면 (처음 진입 화면)
===================================================== */
#landing { display:none }
#landing.active {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
  animation:fadeUp 0.7s ease both;
  position:fixed;
  inset:0;
  z-index:10;
  overflow:hidden;
}

/* ─────────────────────────────────────────────
   랜딩 배경 이미지
   JS의 LANDING_BG_URL 에 이미지 URL을 넣으면 배경이 적용됩니다.
   비워두면 기본 --bg 색상 배경 그대로 표시됩니다.
   전체 화면에 꽉 차게 표시됩니다.
───────────────────────────────────────────── */
#landing-bg {
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  z-index:-1;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}
/* 배경 이미지 활성화 시 타이틀·버튼을 z-index:1 로 (레트로 효과 레이어는 제외) */
#landing.has-bg > *:not(#landing-bg):not(#landing-overlay-img):not(.landing-retro-scanlines):not(.landing-retro-vignette):not(.landing-retro-grain):not(.landing-retro-glow) { position:relative; z-index:1 }

/* ── 랜딩 화면 레트로 효과 (인트로와 톤을 맞춘 스캔라인·비네트·그레인·듀오톤 글로우) ── */
.landing-retro-scanlines {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.13) 2px, rgba(0,0,0,0.13) 3px
  );
  mix-blend-mode:multiply;
}
.landing-retro-vignette {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:radial-gradient(ellipse 75% 70% at 50% 45%, transparent 48%, rgba(20,10,5,0.46) 100%);
}
.landing-retro-grain {
  position:fixed; inset:-20%; z-index:0; pointer-events:none;
  opacity:0.13; mix-blend-mode:overlay;
  background-image:
    repeating-radial-gradient(circle at 0 0, transparent 0, rgba(255,255,255,0.5) 1px, transparent 1.6px);
  background-size:3px 3px;
  animation:grainShift 0.5s steps(4) infinite;
}
.landing-retro-glow {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 50% 40% at 32% 38%, rgba(225,75,42,0.10) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 68% 60%, rgba(40,180,195,0.08) 0%, transparent 65%);
  animation:introGlowPulse 5s ease-in-out infinite alternate;
}

/* ─────────────────────────────────────────────
   랜딩 오버레이 이미지
   배경(#landing-bg)과 완전히 겹쳐 전체 화면을 채웁니다.
   z-index:0 → 랜딩 콘텐츠(z:1) 뒤에 위치, 버튼·로고 아래
   pointer-events:none → 클릭 완전 통과
───────────────────────────────────────────── */
#landing-overlay-img {
  display:none;
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  z-index:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  pointer-events:none;
  /* 로고와 반대 위상·다른 속도로 둥둥 */
  animation:overlayFloat 6s ease-in-out infinite;  /* 기본: 부유만 */
  filter:drop-shadow(0 3px 4px rgba(0,0,0,0.42));
}

/* ─────────────────────────────────────────────
   랜딩 타이틀 이미지
   #landing-title-img 의 src 에 URL을 넣으면
   텍스트 타이틀 대신 이미지 로고가 크게 표시됩니다.
   권장 크기: 폭 1200px 이상의 투명 PNG
───────────────────────────────────────────── */
#landing-title-img {
  display:none;
  max-width:min(1440px, 100vw);
  width:100vw;
  height:auto;
  max-height:680px;
  object-fit:contain;
  margin-top:48px;
  margin-bottom:12px;
  animation:titleFloat 4s ease-in-out infinite;
  filter:drop-shadow(0 3px 5px rgba(0,0,0,0.50)) drop-shadow(0 0 16px rgba(192,57,43,0.3));
}
/* 모바일: 랜딩 로고 더 크게 */
@media(max-width:600px) {
  #landing-title-img {
    width:112vw;
    max-width:112vw;
    max-height:none;
    margin-top:8px;
    margin-left:-2vw;
  }
}

/* 대형 텍스트 타이틀 */
.landing-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(44px,12.5vw,80px);
  font-weight:600; line-height:1.05; color:var(--text);
  margin-bottom:14px; letter-spacing:0.04em;
}
.landing-title em {
  color:var(--accent); display:block; font-style:normal; font-size:0.72em;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.landing-desc {
  display:none;                  /* 문구 숨김 */
  font-size:14px; color:var(--text-muted); line-height:1.9;
  max-width:360px; font-weight:300; margin-bottom:48px;
}

/* ─────────────────────────────────────────────
   카테고리 선택 버튼 3개
   이미지를 넣으면 이미지 자체가 버튼이 됩니다.
   이미지가 없으면 기존 텍스트 버튼으로 표시됩니다.
───────────────────────────────────────────── */
/* ─────────────────────────────────────────────
   카테고리 선택 버튼 3개
   대각선 세로 배치: Fiction(왼쪽) / Art(오른쪽) / Videos(왼쪽)
───────────────────────────────────────────── */
.cat-buttons { 
  display:flex; 
  flex-direction:column;
  align-items:center;
  gap:8px;
  margin-top:-52px;
}

/* 기본 상태: 대각선 배치 */
.cat-btn:nth-child(1) { transform:translateX(-50px); }
.cat-btn:nth-child(2) { transform:translateX(50px);  }
.cat-btn:nth-child(3) { transform:translateX(-50px); }

/* ── 등장 애니메이션: .landing-animate 클래스 부착 시 실행 ── */
.landing-animate .cat-btn:nth-child(1) { animation:btnRise1 0.7s cubic-bezier(0.22,1,0.36,1) 0.85s both, btnPulse1 3.2s ease-in-out 2s infinite; }
.landing-animate .cat-btn:nth-child(2) { animation:btnRise2 0.7s cubic-bezier(0.22,1,0.36,1) 1.05s both, btnPulse2 3.2s ease-in-out 2.6s infinite; }
.landing-animate .cat-btn:nth-child(3) { animation:btnRise3 0.7s cubic-bezier(0.22,1,0.36,1) 1.25s both, btnPulse3 3.2s ease-in-out 3.2s infinite; }

/* ── 버튼 상시 pulse (위상 다르게) ── */
@keyframes btnPulse1 {
  0%,100% { transform:translateX(-50px) translateY(0)   scale(1);    opacity:1; }
  50%     { transform:translateX(-50px) translateY(-3px) scale(1.02); opacity:0.93; }
}
@keyframes btnPulse2 {
  0%,100% { transform:translateX(50px)  translateY(0)   scale(1);    opacity:1; }
  50%     { transform:translateX(50px)  translateY(-3px) scale(1.02); opacity:0.93; }
}
@keyframes btnPulse3 {
  0%,100% { transform:translateX(-50px) translateY(0)   scale(1);    opacity:1; }
  50%     { transform:translateX(-50px) translateY(-3px) scale(1.02); opacity:0.93; }
}

@keyframes btnRise1 {
  from { opacity:0; transform:translateX(-50px) translateY(20px); }
  to   { opacity:1; transform:translateX(-50px) translateY(0); }
}
@keyframes btnRise2 {
  from { opacity:0; transform:translateX(50px) translateY(20px); }
  to   { opacity:1; transform:translateX(50px) translateY(0); }
}
@keyframes btnRise3 {
  from { opacity:0; transform:translateX(-50px) translateY(20px); }
  to   { opacity:1; transform:translateX(-50px) translateY(0); }
}

/* ── 기본 버튼 (이미지 없을 때) ── */
.cat-btn {
  position:relative; overflow:hidden;
  padding:19px 46px;
  background:var(--surface);
  border:1px solid var(--c-border2);
  cursor:pointer;
  font-family:'Pretendard',sans-serif;
  font-size:14px; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text-mid);
  transition:transform var(--trans), box-shadow var(--trans);
  box-shadow:var(--shadow);
  border-radius:var(--radius);
}
.cat-btn:hover {
  box-shadow:var(--shadow);
  transform:scale(1.06);
}
.cat-btn span { position:relative; z-index:1; display:flex; align-items:center; gap:8px }
.cat-btn-num  { font-size:11px; color:var(--text-dim) }

/* 텍스트 버튼 hover — shimmer 없음 */
.cat-btn:not(.has-img)::before { display:none }
.cat-btn:not(.has-img):hover::before { display:none }

/* ── 이미지 버튼 (이미지 있을 때) ──
   이미지 자체가 버튼이 됩니다.
   정사각형 틀이 아니라 이미지의 실제 영역을 사용합니다.
   투명부분을 제외한 이미지 크기대로 표시됩니다. */
.cat-btn-img {
  display:none;
  width:154px;
  height:auto;
  aspect-ratio:710 / 440;
  object-fit:contain;
  transition:transform var(--trans);
  cursor:pointer;
  pointer-events:none;
}

/* has-img: 버튼 껍데기를 완전히 비움 */
.cat-btn.has-img {
  padding:0;
  background:none;
  border:none;
  box-shadow:none;
  border-radius:var(--radius);
  overflow:visible;      /* 이미지가 overflow:hidden에 잘리지 않도록 */
}
/* has-img 버튼 hover — translateX 유지하며 확대 */
.cat-btn:nth-child(1).has-img:hover { transform:translateX(-50px) scale(1.06); }
.cat-btn:nth-child(2).has-img:hover { transform:translateX(50px)  scale(1.06); }
.cat-btn:nth-child(3).has-img:hover { transform:translateX(-50px) scale(1.06); }
.cat-btn.has-img:hover .cat-btn-img { transform:scale(1.06); }
/* has-img 버튼의 텍스트 span 완전히 숨김 */
.cat-btn.has-img > span { display:none }

/* =====================================================
  ■ 카테고리 목록 페이지
===================================================== */
#catPage { display:none }
#catPage.active { display:block; animation:fadeUp 0.5s ease both }

.catpage-head {
  margin: 0 -62px 0 -62px; padding:14px 62px 32px;
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:flex-start;
  flex-wrap:nowrap; gap:12px;
  position:relative;
}
.catpage-head .back-btn { margin-left:auto; flex-shrink:0; }
.catpage-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(28px,6.2vw,46px);
  font-weight:600; color:var(--text); line-height:1;
}
.catpage-title em { color:var(--accent); font-style:normal }
.catpage-title-img {
  max-width:min(370px, 62vw);
  height:auto;
  display:block;
  margin-left:-16px;
  animation:catLogoSlideIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
  filter:brightness(1.08);
}
@keyframes catLogoSlideIn {
  from { opacity:0; transform:translateX(-40px); }
  to   { opacity:1; transform:translateX(0); }
}

/* 뒤로가기 버튼 — 프레임 이미지 원본 비율(356:132) 유지 */
.back-btn {
  background: transparent;
  border: none;
  background-image: url('https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B2%84%ED%8A%BC-%EB%B0%B1.png?raw=true');
  background-size: 100% 100%;
  background-repeat: no-repeat;
  width: 96px;
  aspect-ratio: 356 / 132;
  padding:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Pretendard',sans-serif; font-size:10px;
  letter-spacing:0.04em; text-transform:uppercase;
  white-space:nowrap;
  color:var(--text-muted); cursor:pointer;
  transition:transform var(--trans), filter var(--trans);
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}
.back-btn:hover { transform:translateY(-1px); filter:brightness(1.08) drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }

/* 소목차 탭 버튼들 — 한 줄에 4개씩, 이미지 크기에 따라 다르게 */
.sub-tabs {
  display:grid; grid-template-columns:repeat(4, 1fr); gap:10px;
  margin-bottom:20px;
  margin-top:20px; position:relative; z-index:2;
}
.sub-tab {
  background:none; border:none; padding:0;
  font-family:'Pretendard',sans-serif;
  font-size:10.5px; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--text-muted); cursor:pointer; transition:all var(--trans);
  display:flex; align-items:center; justify-content:center;
}
.sub-tab img {
  width:auto; height:auto; display:block;
  transform:scale(1.15);
  transition:filter var(--trans), transform var(--trans);
}
.sub-tab:hover img { filter:brightness(1.1); transform:scale(1.22) translateY(-5px); }
.sub-tab.active img { filter:brightness(1.15) drop-shadow(0 0 6px rgba(176,32,32,0.5)); }

/* 게시글 카드 목록 */
.content-grid { display:flex; flex-direction:column; align-items:center; gap:16px }
.content-card {
  width: 100%;
  max-width: 310px;
  background: transparent;
  border: none;
  /* 9-slice: 이미지 테두리가 카드 크기에 맞춰 자유 변형 */
  border-image-source: url('https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B8%94%EB%A1%9D-%EA%B2%8C%EC%8B%9C%EA%B8%80.png?raw=true');
  border-image-slice: 40 40 40 40 fill;
  border-image-width: 20px;
  border-image-repeat: stretch;
  padding: 24px 18px;
  cursor: pointer;
  transition: transform 0.28s cubic-bezier(0.22,1,0.36,1), filter 0.28s ease;
  display: flex; align-items: center; justify-content: center; gap: 14px;
  position: relative; overflow: visible;
  filter: brightness(1.08);
}
/* 호버: 프레임 전체가 살짝 위로 올라옴 (밝기는 상시 적용) */
.content-card::before { display: none; }
.content-card:hover {
  transform: translateY(-2px) translateX(2px);
  background: transparent;
  padding-left: 24px;
}

.card-info   { flex:1; text-align:center; }
.card-meta   {
  font-family:'Pretendard',sans-serif; font-size:10px; font-weight:600;
  letter-spacing:0.15em; text-transform:uppercase;
  color:var(--text-mid);
  margin-bottom:6px;
}
.card-meta-cat {
  color:var(--accent); font-weight:700;
}
.card-meta-sub {
  font-size:10px; font-weight:500; letter-spacing:0.15em;
  color:var(--text-mid);
}
/* 게시글 제목 (가독성 높인 명조 계열 폰트) */
.card-title  {
  font-family:'Noto Serif KR',serif;
  font-size:15px; font-weight:600;
  color:var(--text); line-height:1.35; margin-bottom:6px;
  text-shadow: 0 1px 0 rgba(255,255,255,0.6);
}
/* 작가명 */
.card-author {
  font-family:'Nanum Myeongjo',serif;
  font-size:12px; color:var(--text-mid); font-weight:700;
  letter-spacing:0.04em;
}
.card-author::before {
  content:'— ';
  font-family:'Nanum Myeongjo',serif;
  font-size:12px; color:var(--text-mid); margin-right:1px;
}
.card-author::after {
  content:' —';
  font-family:'Nanum Myeongjo',serif;
  font-size:12px; color:var(--text-mid); margin-left:1px;
}

/* 전체 탭에서 소목차 구분 헤더
   — 다크모드에서도 CSS 변수가 제대로 적용되도록 인라인 스타일 대신 class 사용 */
.sub-section-label {
  width:100%; max-width:310px;
  padding:14px 4px 8px;
  font-family:'Pretendard',sans-serif; font-size:12px;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--text-muted);
  border-top:1px solid var(--border);
  margin-top:8px;
  display:flex; align-items:center; gap:6px;
}
.sub-section-label::before {
  content:'·';
  color:var(--accent);
}

/* =====================================================
  ■ 게시글 뷰어 (읽기 화면)
===================================================== */
#viewer { display:none }
#viewer.active { display:block; animation:fadeUp 0.5s ease both; padding-top:32px; }

/* 뷰어 상단 바 (뒤로가기 + 경로 표시) */
.viewer-topbar {
  display:flex; align-items:center; gap:10px;
  margin-bottom:-46px; flex-wrap:wrap;
  justify-content:flex-start;
  position:relative; z-index:2;
}
.viewer-topbar .back-btn { flex-shrink:0; order:1; margin-left:auto; transform:translateY(-48px); }
.viewer-bc {
  font-family:'Pretendard',sans-serif; font-size:12px;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--text-muted); flex:1;
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  margin-left:64px;
}
.viewer-bc span { color:var(--text-dim) }

/* 게시글 제목 영역 — 그라디언트가 본문 색까지 자연스럽게 이어짐 */
.viewer-header {
  margin: 0 -62px 0 -62px; padding:14px 62px 28px;
  border-bottom:2px solid var(--border); position:relative;
}
.viewer-header::before {
  content:'';
  position:absolute; top:-30px; left:-20px; right:-20px; bottom:0;
  z-index:-1;
  background: var(--bg);
}

/* 헤더 이미지 배너 (제목 위) */
.viewer-banner {
  position: relative;
  margin: 0 -74px 0 -90px;
  overflow: hidden;
}
.viewer-banner img {
  width: 100%;
  height: auto;
  display: block;
}
/* 게시글 제목 (Hahmlet 폰트) */
.viewer-title {
  font-family:'Hahmlet',serif;
  font-size:clamp(26px,6.4vw,42px);
  font-weight:500; line-height:1.2;
  color:var(--text); margin-bottom:14px;
}
.viewer-author-row {
  margin-top:-2px; margin-bottom:26px;
}
.viewer-info-row {
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  margin-top:10px;
}
/* 작가명 (뷰어용) */
.viewer-author {
  font-family:'Noto Serif KR',serif;
  font-size:15px; color:var(--text-mid); font-style:normal;
}
.viewer-author::before {
  content:'by ';
  font-family:'Pretendard',sans-serif; font-style:normal;
  font-size:9px; letter-spacing:0.12em; color:var(--text-muted);
}
/* 타입 배지 — 크기 키움 */
.type-badge {
  font-family:'Pretendard',sans-serif;
  display:inline-block; padding:4px 12px;   /* 3px 10px → 4px 12px */
  border-radius:2px; font-size:11px; font-weight:500;   /* 9px → 11px */
  letter-spacing:0.12em; text-transform:uppercase;
}
.type-badge.fiction { background:rgba(176,32,32,0.12);  color:#8b1515; border:1px solid rgba(176,32,32,0.40) }
.type-badge.art     { background:rgba(154,112,16,0.12); color:#7a5a00; border:1px solid rgba(154,112,16,0.40) }
.type-badge.video   { background:rgba(32,80,160,0.10);  color:#1a4a9a; border:1px solid rgba(32,80,160,0.35) }


/* =====================================================
  ■ 픽션(소설) 본문
    - 문단 사이 거리: 늘림 (margin-bottom 2.2em)
    - 줄간격: 약간 줄임 (2.1 → 1.95)
    - 들여쓰기: 줄임 (2em → 1.4em)
    - 글 위아래 공백 추가
===================================================== */
.fiction-body {
  font-family:'Noto Serif KR',serif;
  font-size:15px; line-height:1.92;
  color:var(--text); font-weight:300;
  letter-spacing:0.01em; max-width:620px;
  padding:64px 0;
  transition:font-family 0.2s ease;
}
.fiction-body.font-pretendard {
  font-family:'Pretendard',sans-serif;
}
.fiction-body p {
  margin-bottom:2.2em;   /* 문단 사이 거리 늘림 */
  text-indent:1.4em;     /* 들여쓰기 줄임 */
}
/* 무더기 엔터 → 추가 여백으로 표시 */
.fiction-body p.empty-line {
  text-indent:0; margin-bottom:1em; height:1em;
}
/* "나 "로 시작하는 문장은 들여쓰기 규칙 관계없이 무조건 들여쓰기
   JS에서 처리하므로 여기서는 클래스만 정의합니다 */
.indent-na {
  display:block;
  padding-left:1.4em;   /* 들여쓰기와 동일한 값 */
  text-indent:0;
}
/* txt 파일 로딩 실패 시 오류 메시지 */
.fiction-error {
  font-size:12px; color:var(--accent);
  padding:24px; border:1px solid var(--border); border-radius:var(--radius);
  font-family:'Pretendard',sans-serif; letter-spacing:0.08em;
  margin:20px 0;
}

/* ─────────────────────────────────────────────
   텍스트 파일 마크다운 인라인 서식 스타일
   **굵게**  →  strong
   *기울임*  →  em
   ~~취소선~~ → del
───────────────────────────────────────────── */
.fiction-body strong {
  font-weight:600;
  color:var(--text);       /* 조금 더 강조 */
}
.fiction-body em {
  font-style:italic;
  color:var(--text-mid);   /* 기울임은 약간 진한 색 */
}
.fiction-body del {
  text-decoration:line-through;
  color:var(--text-muted); /* 취소선은 흐린 색 */
  opacity:0.75;
}
/* 중첩: 굵은 기울임 */
.fiction-body strong em,
.fiction-body em strong {
  font-weight:600; font-style:italic;
}

/* =====================================================
  ■ 아트(이미지) 뷰어
===================================================== */
.art-viewer { display:flex; flex-direction:column; gap:3px }
.art-viewer img { width:100%; display:block; border-radius:2px; border:1px solid var(--border) }
.art-caption {
  margin-top:16px; font-size:12px;
  color:var(--text-muted); text-align:center;
  line-height:1.6;
}

/* =====================================================
  ■ 영상(유튜브) 뷰어
===================================================== */
.video-wrapper {
  position:relative; width:100%; padding-bottom:56.25%; /* 16:9 비율 */
  background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden;
}
.video-wrapper iframe { position:absolute; inset:0; width:100%; height:100%; border:none }
.video-desc {
  margin-top:16px; font-size:13.5px; color:var(--text-muted);
  line-height:1.8; font-weight:300;
}

/* =====================================================
  ■ 이전글/다음글 버튼
===================================================== */
/* 본문 영역 — 두 구분선(제목 아래 / 페이저 위) 사이는 미색 배경으로 깨끗하게 */
#contentBody {
  background: var(--bg);
  position: relative;
  margin: 0 -22px 0;
  padding-left: 22px;
  padding-right: 22px;
  transition: background 0.3s ease, color 0.3s ease;
}
#contentBody.content-dark {
  --bg:        #1c140d;
  --surface:   #241a10;
  --text:      #f7efe0;
  --text-mid:  #e3d4b8;
  --text-muted:#b8a888;
  --text-dim:  #8a7a5e;
  --border:    #3a2c1c;
  --accent:    #e0735e;
  background: var(--bg);
  color: var(--text);
}

.viewer-pager {
  display:flex; gap:10px; justify-content:space-between;
  margin-top:48px; padding-top:24px; border-top:2px solid var(--border);
}
.pager-btn {
  flex:1; padding:13px 16px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text-muted); cursor:pointer;
  font-family:'Pretendard',sans-serif; font-size:11px;   /* 9px → 11px */
  letter-spacing:0.10em; text-transform:uppercase;
  transition:all var(--trans); box-shadow:var(--shadow);
  display:flex; align-items:center; gap:8px;
}
.pager-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent) }
.pager-btn:disabled { opacity:0.22; cursor:not-allowed; box-shadow:none }
.pager-btn.prev { justify-content:flex-start }
.pager-btn.next { justify-content:flex-end }
.pager-label { font-size:13px; color:var(--text); font-family:'Noto Serif KR',serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:130px }

/* 글 하단 "목록으로" 버튼 */
.viewer-back-bottom { display:flex; justify-content:center; margin-top:16px }
.viewer-back-bottom .back-btn { padding:12px 32px; font-size:11px }

/* =====================================================
  ■ 글씨 크기 조절 컨트롤
    뷰어 상단에 표시되는 A- / A+ 버튼
===================================================== */
.viewer-controls-right {
  display:flex; align-items:center; gap:8px;
  margin-left:auto; flex-wrap:wrap;
}
.font-controls-group {
  display:flex; align-items:center; gap:4px;
}
.font-size-ctrl {
  display:flex; align-items:center; gap:4px;
}
.font-size-ctrl span {
  font-family:'Pretendard',sans-serif; font-size:9px;
  letter-spacing:0.12em; color:var(--text-muted);
  padding:0 4px;
}
.fs-btn {
  width:28px; height:28px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; font-family:'Pretendard',sans-serif;
  font-size:11px; color:var(--text-mid);
  display:flex; align-items:center; justify-content:center;
  transition:all var(--trans); line-height:1;
}
.fs-btn:hover { border-color:var(--accent); color:var(--accent) }

/* 본문 다크모드 토글 버튼 */
.dark-toggle-btn {
  width:28px; height:28px; padding:0; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; font-size:13px; color:var(--text-mid);
  display:flex; align-items:center; justify-content:center; line-height:1;
  transition:all var(--trans);
}
.dark-toggle-btn:hover { border-color:var(--accent); color:var(--accent) }

/* 폰트 선택 — 단일 버튼 + 드롭다운, 글씨 크기 조절 바로 왼쪽 */
.font-family-dropdown {
  position:relative;
  margin-right:8px;
}
.ff-toggle-btn {
  display:flex; align-items:center; gap:5px;
  padding:6px 12px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; font-family:'Pretendard',sans-serif;
  font-size:11px; letter-spacing:0.04em; color:var(--text-mid);
  transition:all var(--trans); line-height:1;
}
.ff-toggle-btn:hover { border-color:var(--accent); color:var(--accent) }
.ff-caret { font-size:9px; color:var(--text-muted); transition:transform var(--trans) }
.font-family-dropdown.open .ff-caret { transform:rotate(180deg) }

.ff-menu {
  position:absolute; top:calc(100% + 6px); left:0; z-index:50;
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow-lg);
  display:none; flex-direction:column; min-width:128px;
  overflow:hidden;
}
.font-family-dropdown.open .ff-menu { display:flex; animation:ffMenuIn 0.18s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes ffMenuIn {
  from { opacity:0; transform:translateY(-4px); }
  to   { opacity:1; transform:translateY(0); }
}
.ff-option {
  padding:9px 14px; background:none; border:none; text-align:left;
  cursor:pointer; font-family:'Pretendard',sans-serif;
  font-size:11.5px; letter-spacing:0.03em; color:var(--text-mid);
  transition:background var(--trans), color var(--trans);
}
.ff-option:hover { background:var(--surface2); color:var(--text) }
.ff-option.active { color:var(--accent); font-weight:600; }


/* =====================================================
  ■ 맨 위로 올라가기 버튼
    스크롤을 300px 이상 내리면 나타납니다.
    border에 --c-border2 대신 --border 사용 (다크모드 호환)
===================================================== */
#scrollTopBtn {
  position:fixed; bottom:32px; right:24px; z-index:300;
  width:48px; height:48px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius); cursor:pointer;
  font-family:'Pretendard',sans-serif; font-size:14px;
  color:var(--text-muted);
  display:none; align-items:center; justify-content:center;
  box-shadow:var(--shadow-lg); transition:all var(--trans);
}
#scrollTopBtn:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-2px) }
#scrollTopBtn.visible { display:flex }


/* =====================================================
  ■ 모달 팝업 (비밀번호 입력창, 성인 인증 등)
===================================================== */
#modal-backdrop {
  position:fixed; inset:0; z-index:8000;
  background:rgba(14,11,8,0.65);
  display:none; align-items:center; justify-content:center; padding:20px;
}
#modal-backdrop.visible { display:flex; animation:fadeIn 0.2s ease both }
.modal {
  background:var(--surface); border:2px solid var(--border);
  border-radius:var(--radius); padding:30px 26px;
  max-width:400px; width:100%; box-shadow:var(--shadow-lg);
  animation:scaleIn 0.22s ease both; position:relative;
}
/* 모달 상단 장식선 */
.modal::before {
  content:''; position:absolute; top:-1px; left:20px; right:20px; height:2px;
  background:linear-gradient(to right,var(--accent),var(--gold),var(--accent));
}
.modal-title {
  font-family:'Libre Baskerville',serif; font-size:18px;
  font-style:normal; color:var(--text); margin-bottom:14px;
}
.modal-body { font-size:13px; color:var(--text-muted); line-height:1.7; margin-bottom:18px }
.modal-body input, .modal-body textarea {
  width:100%; padding:10px 12px; margin-top:10px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius); font-size:12.5px;
  outline:none; transition:border-color var(--trans);
  color:var(--text); font-family:'Noto Serif KR',serif;
}
.modal-body input:focus, .modal-body textarea:focus { border-color:var(--gold) }
.modal-body textarea { resize:vertical; min-height:72px }
/* 비밀번호 불일치 오류 메시지
   — 다크모드에서 rgba 배경이 너무 어두워 보이지 않는 문제를 수정했습니다 */
.modal-error {
  font-size:11px; color:var(--accent); margin-top:8px;
  display:none; line-height:1.5;
  padding:8px;
  background:rgba(192,57,43,0.12);   /* 기존 0.06에서 0.12로 올려 다크모드에서도 보이게 */
  border:1px solid rgba(192,57,43,0.30);
  border-radius:var(--radius);
}
.modal-btns { display:flex; gap:8px; justify-content:flex-end; align-items:center; flex-wrap:wrap }
/* "인증하러가기" 버튼 — 왼쪽으로 밀어 분리 */
.modal-btn.link-out { margin-right:auto; color:var(--gold); border-color:var(--gold) }
.modal-btn.link-out:hover { background:rgba(154,112,16,0.08); border-color:var(--gold) }
.modal-btn {
  padding:10px 22px; border-radius:var(--radius);   /* 8px 18px → 10px 22px */
  font-family:'Pretendard',sans-serif; font-size:11px;   /* 9px → 11px */
  letter-spacing:0.12em; text-transform:uppercase; cursor:pointer;
  transition:all var(--trans); border:1px solid var(--border);
  color:var(--text-mid); background:none;
}
.modal-btn:hover            { border-color:var(--text-mid) }
.modal-btn.primary          { background:var(--text);   border-color:var(--text);   color:var(--bg) }
.modal-btn.primary:hover    { background:var(--accent);  border-color:var(--accent) }
.modal-btn.danger           { background:var(--accent);  border-color:var(--accent); color:#fff }
.modal-btn.danger:hover     { background:#a93226 }

/* =====================================================
  ■ 공통 애니메이션
===================================================== */
@keyframes fadeUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }
@keyframes scaleIn  { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
/* 로고 부유 — 빠르고 진폭 작음 */
@keyframes titleFloat {
  0%,100% { transform:translateY(0px) }
  50%     { transform:translateY(-10px) }
}
/* 오버레이 부유 — 느리고 진폭 큼, 반대 위상 */
@keyframes overlayFloat {
  0%,100% { transform:translateY(-8px) }
  50%     { transform:translateY(8px) }
}
/* 랜딩 등장 — 배경 페이드인 */
@keyframes landingBgIn {
  from { opacity:0 }
  to   { opacity:1 }
}
/* 랜딩 등장 — 로고 위에서 내려오며 페이드인 */
@keyframes logoDropIn {
  from { opacity:0; transform:translateY(-28px) }
  to   { opacity:1; transform:translateY(0) }
}
/* 랜딩 로고 — 화려한 등장(회전+확대), 1회만 실행 */
@keyframes logoGrandEntrance {
  0%   { opacity:0; transform:scale(0.3) rotate(-25deg); filter:drop-shadow(0 3px 5px rgba(0,0,0,0.50)) drop-shadow(0 0 16px rgba(192,57,43,0.3)); }
  40%  { opacity:1; transform:scale(1.15) rotate(8deg); filter:drop-shadow(0 8px 14px rgba(0,0,0,0.35)) drop-shadow(0 0 16px rgba(192,57,43,0.3)); }
  60%  { transform:scale(0.96) rotate(-3deg); filter:drop-shadow(0 6px 10px rgba(0,0,0,0.40)) drop-shadow(0 0 16px rgba(192,57,43,0.3)); }
  80%  { transform:scale(1.04) rotate(1deg); filter:drop-shadow(0 4px 8px rgba(0,0,0,0.45)) drop-shadow(0 0 16px rgba(192,57,43,0.3)); }
  100% { opacity:1; transform:scale(1) rotate(0deg); filter:drop-shadow(0 3px 5px rgba(0,0,0,0.50)) drop-shadow(0 0 16px rgba(192,57,43,0.3)); }
}
/* 랜딩 등장 — 버튼 아래서 올라오며 페이드인 */
@keyframes btnRiseIn {
  from { opacity:0; transform:translateY(22px) }
  to   { opacity:1; transform:translateY(0) }
}
/* 랜딩 타이틀 — 화려한 등장: 블러+확대에서 골드 글로우와 함께 안착 */
@keyframes titleGrandEntrance {
  0%   { opacity:0; transform:translateY(-24px) scale(0.9); filter:blur(8px); text-shadow:0 0 0px rgba(200,168,106,0); letter-spacing:0.3em; }
  50%  { opacity:1; transform:translateY(4px) scale(1.05); filter:blur(0px); text-shadow:0 0 32px rgba(200,168,106,0.65); letter-spacing:0.02em; }
  75%  { transform:translateY(-2px) scale(1.0); text-shadow:0 0 16px rgba(200,168,106,0.4); }
  100% { opacity:1; transform:translateY(0) scale(1); text-shadow:0 2px 20px rgba(200,168,106,0.25); letter-spacing:0.04em; }
}
/* 버튼 개별 stagger — translateX를 건드리지 않고 opacity+Y만 */
@keyframes btnFadeRise {
  from { opacity:0; transform:translateY(20px) }
  to   { opacity:1; transform:translateY(0) }
}

/* =====================================================
  ■ 동적 효과 — 전체 사이트 생동감
===================================================== */


/* ── 로고 shimmer (헤더 한자 타이틀) ──
   마우스를 올리면 빛이 스쳐지나갑니다. */
.logo:hover .logo-hanja {
  background:linear-gradient(
    120deg,
    var(--accent) 0%,
    var(--gold) 40%,
    #f0d090 55%,
    var(--gold) 70%,
    var(--accent) 100%
  );
  background-size:200% auto;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:shimmerText 1.4s linear infinite;
}
@keyframes shimmerText {
  0%   { background-position:200% center }
  100% { background-position:-200% center }
}

/* ── 콘텐츠 카드 등장 애니메이션 ──
   카드가 아래에서 위로 페이드인됩니다. */
.content-card {
  animation:cardIn 0.4s ease both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(10px) }
  to   { opacity:1; transform:translateY(0) }
}
/* 순서대로 늦게 등장 (nth-child로 stagger) */
.content-card:nth-child(1)  { animation-delay:0.04s }
.content-card:nth-child(2)  { animation-delay:0.08s }
.content-card:nth-child(3)  { animation-delay:0.12s }
.content-card:nth-child(4)  { animation-delay:0.16s }
.content-card:nth-child(5)  { animation-delay:0.20s }
.content-card:nth-child(6)  { animation-delay:0.24s }
.content-card:nth-child(7)  { animation-delay:0.28s }
.content-card:nth-child(8)  { animation-delay:0.32s }

/* ── 네비게이션 항목 hover glow ──
   사이드바 소목차에 마우스 올리면 글씨에 은은한 광채 */
.nav-sub:hover {
  text-shadow:0 0 12px rgba(154,112,16,0.35);
}
.nav-cat.active {
  text-shadow:0 0 16px rgba(176,32,32,0.25);
}

/* ── 맨 위로 버튼 pulse ──
   처음 나타날 때 pulse 효과 */
#scrollTopBtn.visible {
  animation:btnPulse 0.4s ease both;
}
@keyframes btnPulse {
  0%   { transform:scale(0.7); opacity:0 }
  70%  { transform:scale(1.12) }
  100% { transform:scale(1); opacity:1 }
}

/* ── 모달 등장 강화 ── */
.modal { animation:modalIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both }
@keyframes modalIn {
  from { opacity:0; transform:scale(0.88) translateY(16px) }
  to   { opacity:1; transform:scale(1) translateY(0) }
}



/* ── 헤더 아이콘 링크 hover spin (이미지 아이콘) ── */
.header-icon-link:hover img {
  animation:iconSpin 0.4s ease;
}
@keyframes iconSpin {
  0%   { transform:rotate(0deg) scale(1) }
  40%  { transform:rotate(-12deg) scale(1.15) }
  100% { transform:rotate(0deg) scale(1) }
}

/* ── sub-tab 활성화 시 슬라이드인 ── */
.sub-tab.active {
  animation:tabPop 0.22s cubic-bezier(0.34,1.4,0.64,1) both;
}
@keyframes tabPop {
  from { transform:scale(0.9); opacity:0.6 }
  to   { transform:scale(1); opacity:1 }
}

/* ── 섹션 페이지 전환 시 더 부드럽게 ── */
#catPage.active  { animation:fadeUp 0.45s cubic-bezier(0.4,0,0.2,1) both }
#viewer.active   { animation:fadeUp 0.45s cubic-bezier(0.4,0,0.2,1) both }

/* ── 사이드바 항목 stagger ── */
.nav-cat { transition:color var(--trans), border-color var(--trans), text-shadow var(--trans) }

/* ── 랜딩 등장 애니메이션: .landing-animate 부착 시 실행 ── */
#landing.landing-animate #landing-bg          { animation:landingBgIn 1.0s ease both; }
#landing.landing-animate #landing-overlay-img { animation:overlayFloat 6s ease-in-out 1.0s infinite, landingBgIn 1.0s ease both; }
#landing.landing-animate #landing-title-img   { animation:logoGrandEntrance 1.8s cubic-bezier(0.22,1,0.36,1) 0.2s 1 both; }
#landing.landing-animate .landing-title-img-wrap { animation:titleFloat 4s ease-in-out 2s infinite; }
#landing.landing-animate #landing-title-text  { animation:titleGrandEntrance 1.3s cubic-bezier(.22,1,.36,1) 0.2s both, titleFloat 4s ease-in-out 1.5s infinite; }
#landing.landing-animate .landing-desc        { animation:fadeUp 0.8s ease 0.7s both; }
/* ── 카테고리 버튼: 개별 stagger는 nth-child에서 처리 ── */

/* =====================================================
  ■ 스크롤바 커스텀
===================================================== */
::-webkit-scrollbar            { width:5px }
::-webkit-scrollbar-track      { background:var(--bg) }
::-webkit-scrollbar-thumb      { background:var(--border); border-radius:2px }
::-webkit-scrollbar-thumb:hover{ background:var(--text-dim) }

@media(min-width:900px) {
  #sidebar { transform:translateX(0) }
  #main    { margin-left:var(--sidebar-w); max-width:calc(720px + var(--sidebar-w)); padding:56px 52px 100px }
  .burger  { display:none }
  #overlay { display:none }
  #header  { padding-left:calc(var(--sidebar-w) + 24px) }
}

/* 모바일(900px 미만): 헤더/배너의 데스크탑용 -62px/-70px 베젤이
   #main의 실제 모바일 패딩(22px)보다 커서 화면 밖으로 튀어나가
   가로 스크롤이 생기던 문제 수정 — 베젤을 22px로 맞춤 */
@media(max-width:899px) {
  .viewer-header, .catpage-head {
    margin-left:-22px; margin-right:-22px;
    padding-left:22px; padding-right:22px;
  }
  .viewer-header::before, .catpage-head::before {
    left:0; right:0;
  }
  .viewer-banner {
    margin-left:-22px; margin-right:-22px;
  }
}
</style>
</head>

/* =====================================================

===================================================== */
(function() {
  const el = document.getElementById('introTimecode');
  if (!el) return;
  const start = performance.now();
  let raf;
  function pad(n) { return String(n).padStart(2, '0'); }
  function tick() {
    const elapsed = performance.now() - start;
    const totalSec = Math.floor(elapsed / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    const frames = Math.floor((elapsed % 1000) / (1000 / 30)); // 30fps 가상 프레임
    el.textContent = `${pad(h)}:${pad(m)}:${pad(s)}:${pad(frames)}`;
    raf = requestAnimationFrame(tick);
  }
  raf = requestAnimationFrame(tick);
  window.__stopIntroTimecode = () => cancelAnimationFrame(raf);
})();

function dismissIntro() {
  document.getElementById('intro').classList.add('hidden');
  window.scrollTo({ top:0, behavior:'smooth' });
  setTimeout(() => { document.getElementById('intro').style.display = 'none'; }, 900);

    if (txt) txt.style.display = 'none';
  }
})();

    landing-overlay-img src가 있으면 이미지를 보여줍니다.
    배경 위에 겹쳐서 타이틀 부유 애니메이션과 함께 떠다닙니다.
===================================================== */
(function() {

  if (overlayImg && overlayImg.getAttribute('src') && overlayImg.getAttribute('src').trim() !== '') {

/* =====================================================
  ■ 헤더 로고: 텍스트 로고 고정 표시
    웹진 로고 이미지는 랜딩 타이틀(landing-title-img)에 표시됩니다.
===================================================== */

/* =====================================================
  ■ 카테고리 버튼 이미지 자동 처리
    cat-btn-img src가 있으면 이미지 버튼으로 전환됩니다.
    이미지 자체가 버튼이 되며, 텍스트 span 은 CSS(.cat-btn.has-img > span)로 숨깁니다.
===================================================== */
(function() {
  document.querySelectorAll('.cat-btn-img').forEach(img => {
    /* src 속성이 존재하고 빈 문자열이 아닌 경우 */
    const srcUrl = img.getAttribute('src') || '';
    if (srcUrl && srcUrl !== window.location.href && srcUrl.trim() !== '') {
      img.style.display = 'block';
      const btn = img.closest('.cat-btn');
      if (btn) btn.classList.add('has-img');
    }
  });
})();

/* =====================================================
  ■ 사이드바 네비게이션 자동 생성
    - 대메뉴 클릭: 소목차 목록 펼치기/닫기
    - 소목차 클릭: 해당 소목차의 카테고리 페이지로 바로 이동
    - 게시글 클릭: 해당 게시글 바로 열기
===================================================== */
function buildNav() {
  const container = document.getElementById('navMenu');
  container.innerHTML = '';

  /* ── 전체 목차 섹션 ──
     모든 대메뉴의 게시글을 펼쳐서 개별 항목으로 나열합니다.
     "전체 목차" 헤더 아래에 모든 게시글이 보입니다. */
  const allCatEl = document.createElement('div');
  allCatEl.className = 'nav-cat';
  allCatEl.innerHTML = `전체 목차 <span class="nav-cat-arrow">▶</span>`;

  const allListEl = document.createElement('div');
  allListEl.className = 'nav-sublist';

  for (const [cat, subs] of Object.entries(contentData)) {
    /* 대메뉴 구분 레이블 (예: — Fiction —) */
    const catLabel = document.createElement('div');
    catLabel.style.cssText = `
      padding:8px 20px 4px 20px;
      font-family:'Pretendard',sans-serif;font-size:9px;
      letter-spacing:0.2em;text-transform:uppercase;
      color:var(--accent);opacity:0.8;
      border-top:1px solid var(--border);margin-top:4px;
      text-align:center;
    `;
    catLabel.textContent = '— ' + cat + ' —';
    allListEl.appendChild(catLabel);

    for (const [sub, items] of Object.entries(subs)) {
      items.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'nav-content-item all-list-item';
        el.dataset.cat = cat; el.dataset.sub = sub; el.dataset.idx = idx;
        el.title = item.title;
        if (item.adult) el.innerHTML = `<span class="nav-lock-icon">🔒</span>${escH(item.title)}`;
        else            el.textContent = item.title;
        el.addEventListener('click', e => {
          e.stopPropagation();
          attemptLoad(cat, sub, idx);
          closeSidebar();
        });
        allListEl.appendChild(el);
      });
    }
  }

  /* 전체 목차 클릭: 펼치기/닫기 */
  allCatEl.addEventListener('click', () => {
    const open = allListEl.classList.contains('open');
    document.querySelectorAll('.nav-cat').forEach(el => el.classList.remove('open','active'));
    document.querySelectorAll('#navMenu > .nav-sublist').forEach(el => el.classList.remove('open'));
    if (!open) { 
      allCatEl.classList.add('open','active'); 
      allListEl.classList.add('open'); 
    }
  });

  container.appendChild(allCatEl);
  container.appendChild(allListEl);


  const hrAll = document.createElement('div');
  hrAll.className = 'sidebar-divider';
  container.appendChild(hrAll);

  /* ── 대메뉴별 목차 ── */
  for (const [cat, subs] of Object.entries(contentData)) {

    const catEl = document.createElement('div');
    catEl.className = 'nav-cat';
    catEl.dataset.cat = cat;
    catEl.innerHTML = `${cat} <span class="nav-cat-arrow">▶</span>`;

    const subListEl = document.createElement('div');
    subListEl.className = 'nav-sublist';

    for (const [sub, items] of Object.entries(subs)) {

      /* 소목차 — 클릭 시 해당 소목차 탭이 선택된 카테고리 페이지로 이동 */
      const subEl = document.createElement('div');
      subEl.className = 'nav-sub';
      subEl.textContent = sub;
      subEl.addEventListener('click', e => {
        e.stopPropagation();
        goCategory(cat, sub);
        closeSidebar();
      });

      const itemListEl = document.createElement('div');
      itemListEl.className = 'nav-sublist';

      items.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'nav-content-item';
        el.dataset.cat = cat; el.dataset.sub = sub; el.dataset.idx = idx;
        el.title = item.title;
        if (item.adult) el.innerHTML = `<span class="nav-lock-icon">🔒</span>${escH(item.title)}`;
        else            el.textContent = item.title;
        el.addEventListener('click', e => {
          e.stopPropagation();
          attemptLoad(cat, sub, idx);
          closeSidebar();
        });
        itemListEl.appendChild(el);
      });

      subListEl.appendChild(subEl);
      subListEl.appendChild(itemListEl);
    }

    catEl.addEventListener('click', () => {
      const open = subListEl.classList.contains('open');
      document.querySelectorAll('.nav-cat').forEach(el => el.classList.remove('open','active'));
      document.querySelectorAll('#navMenu > .nav-sublist').forEach(el => el.classList.remove('open'));
      if (!open) {
        catEl.classList.add('open','active');
        subListEl.classList.add('open');
      }
    });

    container.appendChild(catEl);
    container.appendChild(subListEl);

    const hr = document.createElement('div');
    hr.className = 'sidebar-divider';
    container.appendChild(hr);
  }
}
buildNav();

/* =====================================================
  ■ URL 해시 라우터
  ─────────────────────────────────────────────────────
  해시 형식:
    #                              → 랜딩
    #Fiction                       → 카테고리 (전체 탭)
    #Fiction/황현진                 → 카테고리 (소목차 탭)
    #Fiction/황현진/0               → 뷰어 (게시글)
===================================================== */
function routeHash(hash, pushState) {
  /* '#' 제거 후 슬래시로 분리 */
  const raw = (hash || '').replace(/^#/, '');
  if (!raw) { goLanding(pushState); return; }

  const parts = raw.split('/').map(decodeURIComponent);
  const cat   = parts[0];
  const sub   = parts[1] || null;
  const idx   = parts[2] !== undefined ? Number(parts[2]) : null;

  /* cat이 contentData에 없으면 랜딩으로 */
  if (!contentData[cat]) { goLanding(pushState); return; }

  if (idx !== null && sub && contentData[cat][sub] && contentData[cat][sub][idx]) {
    /* 뷰어 */
    const item = contentData[cat][sub][idx];
    if (item.adult && !adultUnlocked) {
      /* 성인 콘텐츠는 카테고리로 fallback */
      goCategory(cat, sub, pushState);
    } else {
      loadContent(cat, sub, idx, pushState);
    }
  } else if (sub && contentData[cat][sub]) {
    /* 카테고리 + 소목차 탭 */
    goCategory(cat, sub, pushState);
  } else {
    /* 카테고리 전체 탭 */
    goCategory(cat, null, pushState);
  }
}

/* 뒤로/앞으로 버튼 */
window.addEventListener('popstate', (e) => {
  routeHash(location.hash, false);
});

/* =====================================================
  ■ 딥링크 진입 시 인트로 건너뛰기
    URL 해시가 있으면 인트로를 즉시 숨기고 해당 페이지로 바로 이동합니다.
===================================================== */
(function() {
  if (location.hash && location.hash !== '#') {
    const intro = document.getElementById('intro');
    if (intro) intro.style.display = 'none';
    if (window.__stopIntroTimecode) window.__stopIntroTimecode();
    routeHash(location.hash, false);
  }
})();

function hideAll() {

    const el = document.getElementById(id);
    el.classList.remove('active');

    '황창': 'https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EC%86%8C%EB%AA%A9%EC%B0%A8%EC%9D%B8%EB%8D%B1%EC%8A%A4-07.png?raw=true',
    '황쳌': 'https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EC%86%8C%EB%AA%A9%EC%B0%A8%EC%9D%B8%EB%8D%B1%EC%8A%A4-04.png?raw=true',
    '황필': 'https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EC%86%8C%EB%AA%A9%EC%B0%A8%EC%9D%B8%EB%8D%B1%EC%8A%A4-01.png?raw=true',
