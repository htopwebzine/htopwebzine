<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛情反正日誌 — 단편 웹진</title>

<!-- ====================================================
  구글 폰트 불러오기
  - Libre Baskerville : 영문 세리프 (제목용)
  - IBM Plex Mono     : 영문 고정폭 (태그·라벨용)
  - Noto Serif KR     : 한국어 본문 폰트
  - Noto Serif SC     : 한자 타이틀 폰트
  - Hahmlet           : 게시글 제목 전용 폰트
===================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;600&family=Hahmlet:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* =====================================================
  ■ 색상·크기 변수 모음 (CSS 변수)
    여기서 색상을 바꾸면 사이트 전체에 반영됩니다.
    라이트 모드 기준입니다.
===================================================== */
:root {
  /* 배경 계열 */
  --c-paper:   #f5f0e8;   /* 가장 밝은 종이색 배경 */
  --c-cream:   #ede6d9;   /* 카드·패널 배경 */
  --c-tan:     #d4c9b4;   /* 보조 배경 */
  --c-warm:    #b8a88a;   /* 테두리 강조 */
  --c-brown:   #7a5c3c;   /* 진한 갈색 */

  /* 글씨 계열 */
  --c-ink:     #2a1f14;   /* 가장 짙은 본문 색 */
  --c-mid:     #5a4a38;   /* 중간 강조 글씨 */
  --c-muted:   #9a8870;   /* 흐린 설명 글씨 */
  --c-dim:     #c8b89a;   /* 매우 흐린 힌트 글씨 */

  /* 포인트 색 */
  --c-accent:  #c0392b;   /* 빨강 강조색 (버튼·활성) */
  --c-gold:    #b8860b;   /* 금색 강조 */

  /* 테두리 */
  --c-border:  #d8cebb;
  --c-border2: #c4b49a;

  /* 위 변수들을 실제로 사용하는 별칭 */
  --bg:        var(--c-paper);
  --surface:   #fff;
  --surface2:  var(--c-cream);
  --border:    var(--c-border);
  --text:      var(--c-ink);
  --text-mid:  var(--c-mid);
  --text-muted:var(--c-muted);
  --text-dim:  var(--c-dim);
  --accent:    var(--c-accent);
  --gold:      var(--c-gold);

  /* 레이아웃 크기 */
  --sidebar-w: 280px;     /* 왼쪽 사이드바 너비 */
  --header-h:  58px;      /* 상단 헤더 높이 */
  --radius:    3px;       /* 모서리 둥글기 */

  /* 애니메이션·그림자 */
  --trans:     0.3s cubic-bezier(0.4,0,0.2,1);
  --shadow:    0 2px 12px rgba(42,31,20,0.10);
  --shadow-lg: 0 8px 40px rgba(42,31,20,0.18);
}

/* =====================================================
  ■ 다크 모드 색상
    헤더의 ☽ 버튼을 누르면 이 값들로 덮어씁니다.
===================================================== */
[data-theme="dark"] {
  --bg:         #14110d;
  --surface:    #1e1a14;
  --surface2:   #252018;
  --border:     #352d22;
  --text:       #e8dfd0;
  --text-mid:   #b8a890;
  --text-muted: #7a6a58;
  --text-dim:   #4a3d30;
  --accent:     #e05040;
  --gold:       #d4a020;
}

/* =====================================================
  ■ 기본 리셋 & body 스타일
===================================================== */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth }
body {
  font-family:'Noto Serif KR',serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;          /* 가로 스크롤 방지 */
  transition:background 0.4s,color 0.4s;
}

/* 종이 질감 그레인 오버레이 (배경 위에 살짝 깔리는 노이즈) */
body::after {
  content:'';
  position:fixed; inset:0; z-index:9998; pointer-events:none;
  opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* 화면 테두리 장식선 (데스크탑에서 보이는 얇은 액자선) */
#main-deco {
  position:fixed; top:var(--header-h); left:0; right:0; bottom:0;
  pointer-events:none; z-index:0; overflow:hidden;
}
#main-deco::before {
  content:''; position:absolute;
  border:1px solid var(--border); opacity:0.4;
  top:24px; left:calc(var(--sidebar-w) + 24px); right:24px; bottom:24px;
  border-radius:2px;
}

/* =====================================================
  ■ 인트로 화면 (처음 켰을 때 나오는 전체화면)
    클릭하면 사라집니다.
===================================================== */
#intro {
  position:fixed; inset:0; z-index:9000;
  background:#0e0b08;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer;
}
/* 클릭 후 위로 날아가는 퇴장 애니메이션 */
#intro.hidden {
  animation:introOut 0.9s cubic-bezier(0.7,0,0.3,1) forwards;
}
@keyframes introOut {
  0%   { opacity:1; transform:translateY(0) }
  100% { opacity:0; transform:translateY(-100%); pointer-events:none }
}
/* 인트로 세로 황금선 */
.intro-rule {
  width:1px; height:0;
  background:linear-gradient(to bottom,transparent,#c8a86a,transparent);
  animation:introLine 1.4s ease 0.2s forwards;
  margin-bottom:32px;
}
@keyframes introLine { to { height:80px } }

/* 인트로 타이틀 */
.intro-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(36px,12vw,96px);
  font-weight:600;
  color:#f0e8d8;
  letter-spacing:0.06em;
  opacity:0; animation:introFadeUp 0.8s ease 0.7s forwards;
  line-height:1.1;
}
.intro-title span { color:#c0392b } /* 강조 한자는 빨강 */

/* 인트로 부제목 */
.intro-sub {
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:0.35em; text-transform:uppercase;
  color:#7a6a58; margin-top:20px;
  opacity:0; animation:introFadeUp 0.8s ease 1.0s forwards;
}
/* "클릭하여 입장" 깜빡임 */
.intro-click {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px; letter-spacing:0.25em; text-transform:uppercase;
  color:#4a3d2c; margin-top:48px;
  opacity:0; animation:introBlink 1.4s ease 1.6s infinite;
}

/* 인트로 네 모서리 장식 */
.intro-corner {
  position:absolute; width:40px; height:40px;
  border-color:#3a2e22; border-style:solid; border-width:0;
}
.intro-corner.tl { top:24px;    left:24px;  border-top-width:1px;    border-left-width:1px  }
.intro-corner.tr { top:24px;    right:24px; border-top-width:1px;    border-right-width:1px }
.intro-corner.bl { bottom:24px; left:24px;  border-bottom-width:1px; border-left-width:1px  }
.intro-corner.br { bottom:24px; right:24px; border-bottom-width:1px; border-right-width:1px }

/* 공통 등장 애니메이션 */
@keyframes introFadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes introBlink  { 0%,100%{opacity:0} 50%{opacity:1} }

/* =====================================================
  ■ 상단 헤더
===================================================== */
#header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:var(--header-h);
  background:var(--bg);
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
  transition:background 0.4s, border-color 0.4s;
}
/* 헤더 아래 보조 선 */
#header::after {
  content:''; position:absolute; bottom:-4px; left:0; right:0;
  height:1px; background:var(--border); opacity:0.5;
}

/* 로고 (한자 타이틀) */
.logo {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:19px; color:var(--text); cursor:pointer;
  letter-spacing:0.05em; display:flex; align-items:baseline; gap:8px;
}
.logo-hanja {
  font-weight:600; font-size:19px; letter-spacing:0.06em;
  /* 빨강→금색 그라디언트 글씨 */
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-tag {
  font-family:'IBM Plex Mono',monospace;
  font-size:8px; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--text-muted);
}
.header-right { display:flex; align-items:center; gap:10px }

/* 다크모드 토글 버튼 */
.theme-btn {
  width:34px; height:34px; background:none;
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:border-color var(--trans); color:var(--text-muted);
}
.theme-btn:hover { border-color:var(--gold); color:var(--gold) }

/* 햄버거 메뉴 버튼 (모바일) */
.burger {
  width:34px; height:34px; background:none;
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
  transition:border-color var(--trans);
}
.burger:hover { border-color:var(--accent) }
.burger span { display:block; width:16px; height:1px; background:var(--text-mid); transition:all var(--trans); transform-origin:center }
/* 열렸을 때 X 모양으로 변환 */
.burger.open span:nth-child(1) { transform:translateY(6px) rotate(45deg) }
.burger.open span:nth-child(2) { opacity:0; transform:scaleX(0) }
.burger.open span:nth-child(3) { transform:translateY(-6px) rotate(-45deg) }

/* =====================================================
  ■ 어두운 배경 오버레이 (모바일에서 사이드바 열릴 때)
===================================================== */
#overlay {
  position:fixed; inset:0; z-index:150;
  background:rgba(14,11,8,0.55);
  opacity:0; pointer-events:none; transition:opacity var(--trans);
}
#overlay.visible { opacity:1; pointer-events:all }

/* =====================================================
  ■ 왼쪽 사이드바 (목차 메뉴)
===================================================== */
#sidebar {
  position:fixed; top:0; left:0; bottom:0; z-index:200;
  width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  box-shadow:var(--shadow-lg);
  transform:translateX(-100%);    /* 기본: 왼쪽으로 숨김 */
  transition:transform var(--trans), background 0.4s;
  overflow-y:auto; display:flex; flex-direction:column;
}
#sidebar.open { transform:translateX(0) }  /* 열리면 원위치 */

.sidebar-head {
  padding:20px;
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-logo {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:15px; font-weight:600; letter-spacing:0.06em;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.sidebar-close {
  width:28px; height:28px; background:none; border:none;
  color:var(--text-muted); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border-radius:var(--radius); transition:color var(--trans);
}
.sidebar-close:hover { color:var(--accent) }

/* 대메뉴 (Fiction / Art / Videos) */
.nav-section  { padding:8px 0 }
.nav-cat {
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 20px; cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--text-muted); transition:all var(--trans); user-select:none;
  border-left:2px solid transparent;
}
.nav-cat:hover, .nav-cat.active { color:var(--text); border-left-color:var(--accent) }
.nav-cat.active { color:var(--accent) }
.nav-cat-arrow { font-size:7px; transition:transform var(--trans); color:var(--text-dim) }
.nav-cat.open .nav-cat-arrow { transform:rotate(90deg) }

/* 접혔다 펼쳐지는 서브메뉴 컨테이너 */
.nav-sublist { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1); background:var(--surface2) }
.nav-sublist.open { max-height:2000px }

/* 소목차 (Short Stories, Flash Fiction 등) */
.nav-sub {
  padding:8px 20px 8px 30px; cursor:pointer;
  font-size:11px; color:var(--text-muted); letter-spacing:0.05em;
  transition:color var(--trans), background var(--trans);
  border-left:2px solid transparent;
}
.nav-sub:hover { color:var(--text); background:var(--surface) }
.nav-sub.active { color:var(--gold) }

/* 개별 게시글 항목 */
.nav-content-item {
  padding:5px 20px 5px 42px; cursor:pointer;
  font-size:10.5px; color:var(--text-dim); font-family:'Noto Serif KR',serif;
  transition:color var(--trans);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display:flex; align-items:center; gap:6px;
}
.nav-content-item:hover  { color:var(--text-muted) }
.nav-content-item.active { color:var(--accent) }
.nav-lock-icon { font-size:9px; opacity:0.6 }    /* 성인 잠금 자물쇠 아이콘 */
.sidebar-divider { height:1px; background:var(--border); margin:4px 0 }

/* =====================================================
  ■ 메인 콘텐츠 영역
===================================================== */
#main {
  position:relative; z-index:1;
  margin-top:var(--header-h);
  min-height:calc(100vh - var(--header-h));
  padding:48px 24px 100px;
  max-width:780px;
  margin-left:auto; margin-right:auto;
}

/* =====================================================
  ■ 메인 랜딩 화면 (처음 진입 화면)
===================================================== */
#landing { display:none }
#landing.active {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:75vh; text-align:center;
  animation:fadeUp 0.7s ease both;
}
.landing-vol {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px; letter-spacing:0.35em; text-transform:uppercase;
  color:var(--text-muted); margin-bottom:24px;
  display:flex; align-items:center; gap:12px;
}
.landing-vol::before, .landing-vol::after {
  content:''; display:block; width:40px; height:1px; background:var(--border)
}
/* 대형 타이틀 */
.landing-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(38px,10vw,88px);
  font-weight:600; line-height:1.05; color:var(--text);
  margin-bottom:16px; letter-spacing:0.04em;
}
.landing-title em {
  color:var(--accent); display:block; font-style:normal; font-size:0.72em;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
/* 타이틀 아래 장식선 */
.landing-rule {
  width:80px; height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:20px auto;
}
.landing-desc {
  font-size:14px; color:var(--text-muted); line-height:1.9;
  max-width:360px; font-weight:300; margin-bottom:48px;
}

/* 카테고리 선택 버튼 3개 */
.cat-buttons { display:flex; gap:12px; flex-wrap:wrap; justify-content:center }
.cat-btn {
  position:relative; overflow:hidden;
  padding:14px 32px;
  background:var(--surface);
  border:1px solid var(--c-border2);
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--text-mid);
  transition:all var(--trans);
  box-shadow:var(--shadow);
}
/* 마우스 올리면 빨간 배경이 왼쪽에서 스윽 채워짐 */
.cat-btn::before {
  content:''; position:absolute; inset:0;
  background:var(--accent);
  transform:scaleX(0); transform-origin:left;
  transition:transform var(--trans); z-index:0;
}
.cat-btn:hover::before { transform:scaleX(1) }
.cat-btn:hover { color:#fff; border-color:var(--accent); box-shadow:0 4px 20px rgba(192,57,43,0.25); transform:translateY(-1px) }
.cat-btn span { position:relative; z-index:1; display:flex; align-items:center; gap:8px }
.cat-btn-num { font-size:8px; color:var(--text-dim) }
.cat-btn:hover .cat-btn-num { color:rgba(255,255,255,0.6) }

/* =====================================================
  ■ 카테고리 목록 페이지
===================================================== */
#catPage { display:none }
#catPage.active { display:block; animation:fadeUp 0.5s ease both }

.catpage-head {
  margin-bottom:32px; padding-bottom:20px;
  border-bottom:2px solid var(--border);
  display:flex; align-items:flex-end; justify-content:space-between;
  flex-wrap:wrap; gap:12px;
}
.catpage-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(32px,7vw,52px);
  font-weight:600; color:var(--text); line-height:1;
}
.catpage-title em { color:var(--accent); font-style:normal }

/* 뒤로가기 버튼 */
.back-btn {
  padding:7px 14px; background:none;
  border:1px solid var(--border); border-radius:var(--radius);
  font-family:'IBM Plex Mono',monospace; font-size:9px;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--text-muted); cursor:pointer; transition:all var(--trans);
}
.back-btn:hover { border-color:var(--accent); color:var(--accent) }

/* 소목차 탭 버튼들 */
.sub-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px }
.sub-tab {
  padding:6px 16px; background:none;
  border:1px solid var(--border); border-radius:2px;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px; letter-spacing:0.14em; text-transform:uppercase;
  color:var(--text-muted); cursor:pointer; transition:all var(--trans);
}
.sub-tab:hover, .sub-tab.active { background:var(--text); border-color:var(--text); color:var(--bg) }

/* 게시글 카드 목록 */
.content-grid { display:flex; flex-direction:column; gap:2px }
.content-card {
  background:var(--surface); border:1px solid var(--border);
  padding:20px 22px; cursor:pointer;
  transition:all var(--trans);
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  position:relative; overflow:hidden;
}
/* 마우스 올리면 왼쪽에 빨간 세로선 생김 */
.content-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:0;
  background:var(--accent); transition:width var(--trans);
}
.content-card:hover::before { width:3px }
.content-card:hover { padding-left:25px; background:var(--surface2) }

.card-info   { flex:1 }
.card-meta   {
  font-family:'IBM Plex Mono',monospace; font-size:8.5px;
  letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text-dim); margin-bottom:6px;
}
/* 게시글 제목 (Hahmlet 폰트) */
.card-title  {
  font-family:'Hahmlet',serif;
  font-size:17px; font-weight:400;
  color:var(--text); line-height:1.3; margin-bottom:8px;
}
/* 작가명 */
.card-author {
  font-size:12px; color:var(--text-muted); font-style:italic;
}
.card-author::before {
  content:'by ';
  font-family:'IBM Plex Mono',monospace; font-style:normal;
  font-size:8px; letter-spacing:0.12em; color:var(--text-dim); margin-right:2px;
}

<script>
/* =====================================================
  ■ 비밀번호 설정
    - ADULT_PW  : 성인 게시글 접근 비밀번호
    - MASTER_KEY: 댓글 강제 삭제·수정용 마스터키
      (자기 비밀번호를 잃어버린 댓글도 삭제 가능)

  ※ 수정 방법: 따옴표 안의 값만 바꾸면 됩니다.
    예) const ADULT_PW = '0000';
===================================================== */
const ADULT_PW   = '1234';
const MASTER_KEY = 'admin0000';

/* =====================================================
  ■ 콘텐츠 데이터
  ─────────────────────────────────────────────────────
  이 객체만 수정하면 사이트 전체가 자동으로 업데이트됩니다!

  구조: 대메뉴 > 소목차 > [게시글 배열]

  ┌ 게시글 공통 필드
  │  title  : 제목 (문자열)
  │  type   : 'fiction' | 'art' | 'video'
  │  author : 작가명
  │  sub    : 소속 소목차명 (사이드바 표시용)
  │  adult  : true → 성인 잠금 / false → 누구나
  │
  ├ Fiction 전용
  │  body     : 본문 직접 입력 (줄바꿈 두 번 = 단락 구분)
  │  bodyFile : 'story.txt'  ← 로컬 파일 경로 (Live Server 필요)
  │  bodyURL  : 'https://...' ← 원격 파일 URL
  │  (body / bodyFile / bodyURL 중 하나만 사용)
  │
  ├ Art 전용
  │  images  : ["이미지URL1", "이미지URL2", ...] 배열
  │  caption : 작품 설명 (선택)
  │
  └ Video 전용
     youtubeId : 유튜브 영상 ID (URL에서 v= 뒤의 값)
     desc      : 영상 설명 (선택)

  ─────────────────────────────────────────────────────
  소목차 추가 예시:
    Fiction 안에 "Poetry": [ {게시글...}, ... ] 를 추가하면
    탭과 사이드바에 자동으로 나타납니다.
===================================================== */

/* =====================================================
  ■ 상태 변수 (현재 어느 페이지를 보고 있는지 기억)
===================================================== */
let currentCat = null;   /* 현재 선택된 대메뉴 */
let currentSub = null;   /* 현재 선택된 소목차 */

/* =====================================================
  ■ 전체 게시글 플랫 배열 만들기
    이전글/다음글 버튼이 모든 대메뉴를 가로지르며 이동할 수 있게
    모든 게시글을 하나의 배열로 펼쳐놓습니다.
===================================================== */
function buildFlatList() {
  flatList = [];
  for (const [cat, subs] of Object.entries(contentData))
    for (const [sub, items] of Object.entries(subs))
      items.forEach((item, idx) => flatList.push({ cat, sub, idx, item }));
}
buildFlatList();

/* =====================================================
  ■ 비밀번호 단순 해시 함수
    댓글 비밀번호를 숫자+문자 조합으로 변환해 저장합니다.
    (완전한 보안은 아니지만 단순 노출을 막습니다)
===================================================== */
function simpleHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return h.toString(36);
}

/* =====================================================
  ■ 사이드바 네비게이션 자동 생성
    contentData 객체를 읽어서 메뉴를 동적으로 만듭니다.
    게시글을 추가해도 이 함수를 수동으로 수정할 필요 없습니다.
===================================================== */
function buildNav() {
  const container = document.getElementById('navMenu');
  container.innerHTML = '';

  for (const [cat, subs] of Object.entries(contentData)) {

    /* 대메뉴 항목 (Fiction / Art / Videos) */
    const catEl = document.createElement('div');
    catEl.className = 'nav-cat';
    catEl.dataset.cat = cat;
    catEl.innerHTML = `${cat} <span class="nav-cat-arrow">▶</span>`;

    /* 대메뉴 아래 펼쳐지는 컨테이너 */
    const subListEl = document.createElement('div');
    subListEl.className = 'nav-sublist';

    for (const [sub, items] of Object.entries(subs)) {

      /* 소목차 항목 */
      const subEl = document.createElement('div');
      subEl.className = 'nav-sub';
      subEl.textContent = sub;

      /* 소목차 아래 게시글 목록 컨테이너 */
      const itemListEl = document.createElement('div');
      itemListEl.className = 'nav-sublist';

      /* 개별 게시글 항목 */
      items.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'nav-content-item';
        el.dataset.cat = cat;
        el.dataset.sub = sub;
        el.dataset.idx = idx;
        el.title = item.title;
        /* 성인 게시글에는 자물쇠 아이콘 추가 */
        if (item.adult) el.innerHTML = `<span class="nav-lock-icon">🔒</span>${escH(item.title)}`;
        else            el.textContent = item.title;
        /* 클릭 시 성인 확인 후 로드 */
        el.addEventListener('click', e => {
          e.stopPropagation();
          attemptLoad(cat, sub, idx);
          closeSidebar();
        });
        itemListEl.appendChild(el);
      });

      /* 소목차 클릭: 게시글 목록 펼치기/닫기 */
      subEl.addEventListener('click', e => {
        e.stopPropagation();
        const open = itemListEl.classList.contains('open');
        subListEl.querySelectorAll('.nav-sublist').forEach(el => el.classList.remove('open'));
        subListEl.querySelectorAll('.nav-sub').forEach(el => el.classList.remove('active'));
        if (!open) { itemListEl.classList.add('open'); subEl.classList.add('active'); }
      });

      subListEl.appendChild(subEl);
      subListEl.appendChild(itemListEl);
    }

    /* 대메뉴 클릭: 소목차 펼치기/닫기 */
    catEl.addEventListener('click', () => {
      const open = subListEl.classList.contains('open');
      document.querySelectorAll('.nav-cat').forEach(el => el.classList.remove('open','active'));
      document.querySelectorAll('.nav-sublist').forEach(el => el.classList.remove('open'));
      if (!open) { catEl.classList.add('open','active'); subListEl.classList.add('open'); }
    });

    container.appendChild(catEl);
    container.appendChild(subListEl);
    /* 대메뉴 사이 구분선 */
    const hr = document.createElement('div');
    hr.className = 'sidebar-divider';
    container.appendChild(hr);
  }
}
buildNav(); /* 페이지 로드 시 즉시 실행 */

/* =====================================================
  ■ 화면 전환 헬퍼 함수
    세 화면(랜딩, 카테고리, 뷰어) 중 하나만 보이게 합니다.
===================================================== */
function hideAll() {
  ['landing', 'catPage', 'viewer'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active');
    el.style.display = 'none';
  });
}
function show(id) {
  const el = document.getElementById(id);
  el.style.display = id === 'landing' ? 'flex' : 'block';
  el.classList.add('active');
}

/* 랜딩(메인) 화면으로 이동 */
function goLanding() {
  hideAll();
  show('landing');
  currentCat = null;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* =====================================================
  ■ 카테고리 페이지로 이동
    탭 버튼 생성 (전체 탭 포함) 후 전체 목록 표시
===================================================== */
function goCategory(cat) {
  hideAll();
  show('catPage');
  currentCat = cat; currentSub = null; currentIdx = null;

  const icons = { Fiction: '✦', Art: '◈', Videos: '▷' };
  document.getElementById('catPageTitle').innerHTML = `<em>${icons[cat] || '·'}</em> ${cat}`;

  const subs   = Object.keys(contentData[cat]);
  const tabsEl = document.getElementById('subTabs');
  tabsEl.innerHTML = '';

  /* "전체" 탭 — 모든 소목차를 한 번에 보여줌 */
  const allBtn = document.createElement('button');
  allBtn.className = 'sub-tab active';
  allBtn.textContent = '전체';
  allBtn.addEventListener('click', () => {
    document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    renderGridAll(cat);
  });
  tabsEl.appendChild(allBtn);

  /* 소목차별 탭 */
  subs.forEach(sub => {
    const btn = document.createElement('button');
    btn.className = 'sub-tab';
    btn.textContent = sub;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid(cat, sub);
    });
    tabsEl.appendChild(btn);
  });

  renderGridAll(cat); /* 기본값: 전체 탭 */
  window.scrollTo({ top: 0, behavior: 'smooth' });
  navHighlight(cat, null, null);
}

/* =====================================================
  ■ 전체 탭 게시글 목록 렌더링
    소목차 구분 헤더를 붙이고 그 아래 카드들을 나열합니다.
===================================================== */
function renderGridAll(cat) {
  currentSub = null;
  const grid = document.getElementById('contentGrid');
  grid.innerHTML = '';
  const subs = Object.keys(contentData[cat]);

  subs.forEach(sub => {
    /* 소목차 구분 헤더 */
    const header = document.createElement('div');
    header.className = 'sub-section-label';
    header.textContent = sub;
    grid.appendChild(header);

    /* 해당 소목차의 게시글 카드들 */
    (contentData[cat][sub] || []).forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'content-card';
      card.innerHTML = `
        <div class="card-info">
          <div class="card-meta">
            ${escH(sub)} &nbsp;·&nbsp; ${item.type.toUpperCase()}
            ${item.adult ? '<span style="color:var(--accent)">· 성인</span>' : ''}
          </div>
          <div class="card-title">${escH(item.title)}</div>
          <div class="card-author">${escH(item.author || 'Anonymous')}</div>
        </div>
        ${item.adult ? '<div class="card-lock">🔒</div>' : ''}
        <div class="card-arrow">→</div>
      `;
      card.addEventListener('click', () => attemptLoad(cat, sub, idx));
      grid.appendChild(card);
    });
  });
}

/* =====================================================
  ■ 특정 소목차 게시글 목록 렌더링
===================================================== */
function renderGrid(cat, sub) {
  currentSub = sub;
  const grid = document.getElementById('contentGrid');
  grid.innerHTML = '';

  (contentData[cat][sub] || []).forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'content-card';
    card.innerHTML = `
      <div class="card-info">
        <div class="card-meta">
          ${escH(sub)} &nbsp;·&nbsp; ${item.type.toUpperCase()}
          ${item.adult ? '<span style="color:var(--accent)">· 성인</span>' : ''}
        </div>
        <div class="card-title">${escH(item.title)}</div>
        <div class="card-author">${escH(item.author || 'Anonymous')}</div>
      </div>
      ${item.adult ? '<div class="card-lock">🔒</div>' : ''}
      <div class="card-arrow">→</div>
    `;
    card.addEventListener('click', () => attemptLoad(cat, sub, idx));
    grid.appendChild(card);
  });
}

/* =====================================================
  ■ 게시글 열기 전 성인 확인
    adult: true 인 게시글은 비밀번호 입력 팝업 띄움
    한 번 인증하면 adultUnlocked = true 가 되어 다음부터는 통과
===================================================== */
function attemptLoad(cat, sub, idx) {
  const item = contentData[cat][sub][idx];
  if (item.adult && !adultUnlocked) {
    openModal('성인 인증', `
      <div>이 콘텐츠는 성인 전용입니다.<br>접근 비밀번호를 입력해 주세요.</div>
      <input type="password" id="modalPwInput" placeholder="비밀번호" autocomplete="off">
    `, [
      { label: '취소', cls: '',        action: closeModal },
      { label: '확인', cls: 'primary', action: () => {
        const pw = document.getElementById('modalPwInput').value;
        if (pw === ADULT_PW) {
          adultUnlocked = true;  /* 인증 성공 */
          closeModal();
          loadContent(cat, sub, idx);
        } else {
          /* 비밀번호 틀림 */
          const e = document.getElementById('modalError');
          e.style.display = 'block';
          e.textContent = '비밀번호가 올바르지 않습니다.';
        }
      }}
    ]);
  } else {
    loadContent(cat, sub, idx); /* 성인 잠금 없거나 이미 인증됨 */
  }
}

/* =====================================================
  ■ 게시글 뷰어 로딩
    제목·작가·본문·이전/다음 버튼·댓글창을 그려줍니다.
===================================================== */
async function loadContent(cat, sub, idx) {
  hideAll();
  show('viewer');
  currentCat = cat; currentSub = sub; currentIdx = idx;

  const item = contentData[cat][sub][idx];
  const ck   = `${cat}.${sub}.${idx}`;  /* 댓글 저장 키 */
  if (!comments[ck]) comments[ck] = [];  /* 처음 방문이면 빈 배열 초기화 */

  /* 이전글/다음글 찾기 */
  const fi   = flatList.findIndex(f => f.cat === cat && f.sub === sub && f.idx === idx);
  const prev = fi > 0                   ? flatList[fi - 1] : null;
  const next = fi < flatList.length - 1 ? flatList[fi + 1] : null;

  /* 상단 경로(브레드크럼) 표시 */
  document.getElementById('viewerBc').innerHTML = `${cat} <span>›</span> ${sub}`;
  /* 뒤로가기 버튼이 이 카테고리 페이지로 돌아가도록 */
  document.getElementById('viewerBackBtn').onclick = () => goCategory(cat);

  /* 이전/다음 버튼 HTML */
  const pagerHTML = `
    <div class="viewer-pager">
      <button class="pager-btn prev"
        ${!prev ? 'disabled' : ''}
        ${prev  ? `onclick="attemptLoad('${prev.cat}','${prev.sub}',${prev.idx})"` : ''}>
        ← <span class="pager-label">${prev ? escH(prev.item.title) : '처음'}</span>
      </button>
      <button class="pager-btn next"
        ${!next ? 'disabled' : ''}
        ${next  ? `onclick="attemptLoad('${next.cat}','${next.sub}',${next.idx})"` : ''}>
        <span class="pager-label">${next ? escH(next.item.title) : '마지막'}</span> →
      </button>
    </div>
    <div class="viewer-back-bottom">
      <button class="back-btn" onclick="goCategory('${cat}')">← 목록으로</button>
    </div>
  `;

  /* 뷰어 전체 HTML 삽입 */
  document.getElementById('viewerInner').innerHTML = `
    <div class="viewer-header">
      <h1 class="viewer-title">${escH(item.title)}</h1>
      <div class="viewer-info-row">
        <span class="type-badge ${item.type}">${item.type.toUpperCase()}</span>
        <span class="viewer-author">${escH(item.author || 'Anonymous')}</span>
        <span class="viewer-sub">${escH(sub)}</span>
      </div>
    </div>
    <div id="contentBody">${await renderBody(item)}</div>
    ${pagerHTML}
    <div class="comments-section">
      <div class="comments-heading" id="commentsHeading">
        Comments <span id="commentCount">(${comments[ck].length})</span>
      </div>
      <div class="comment-form">
        <textarea id="commentText" placeholder="이 작품에 대한 감상을 남겨주세요..."></textarea>
        <div class="comment-form-row">
          <div class="comment-pw-wrap">
            <input type="password" id="commentPw"
              placeholder="비밀번호 (수정·삭제 시 필요)" autocomplete="new-password">
            <div class="comment-pw-hint">
              비밀번호를 분실하시면 댓글 수정 및 삭제가 불가능합니다.
            </div>
          </div>
          <button class="comment-submit" onclick="submitComment('${ck}')">등록 →</button>
        </div>
        <div class="comment-policy">
          ※ 익명으로 게시됩니다. 비밀번호는 서버에 저장되지 않으며, 분실 시 복구 불가합니다.
        </div>
      </div>
      <div class="comment-list" id="commentList">${renderComments(ck)}</div>
    </div>
  `;

  navHighlight(cat, sub, idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* =====================================================
  ■ 본문 렌더링 — 타입에 따라 다른 HTML 반환
===================================================== */
async function renderBody(item) {

  /* ── Fiction: 텍스트 본문 ── */
  if (item.type === 'fiction') {
    let text = '';

    if (item.bodyFile || item.bodyURL) {
      /* txt 파일 불러오기 */
      const url = item.bodyURL || item.bodyFile;
      try {
        const r = await fetch(url);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        text = await r.text();
      } catch(e) {
        return `<div class="fiction-error">
          ⚠ 파일을 불러올 수 없습니다: ${escH(url)}<br>
          <small>${e.message}</small><br><br>
          로컬 서버(예: VS Code Live Server)에서 실행하거나<br>
          bodyURL에 원격 파일 주소를 입력해 주세요.
        </div>`;
      }
    } else {
      text = item.body || ''; /* 직접 입력한 본문 사용 */
    }

    /* 빈 줄 두 개 = 단락 구분 → <p> 태그로 변환 */
    const ps = text.trim().split(/\n\n+/).map(p =>
      `<p>${p.replace(/\n/g, '<br>')}</p>`
    ).join('');
    return `<div class="fiction-body">${ps}</div>`;
  }

  /* ── Art: 이미지 세로 나열 ── */
  if (item.type === 'art') {
    const imgs = (item.images || []).map(u =>
      `<img src="${u}" alt="artwork" loading="lazy">`
    ).join('');
    return `<div class="art-viewer">${imgs}</div>
            ${item.caption ? `<div class="art-caption">${escH(item.caption)}</div>` : ''}`;
  }

  /* ── Video: 유튜브 임베드 ── */
  if (item.type === 'video') {
    return `<div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/${item.youtubeId}"
        allowfullscreen allow="autoplay;encrypted-media"></iframe>
    </div>
    ${item.desc ? `<p class="video-desc">${escH(item.desc)}</p>` : ''}`;
  }

  return ''; /* 알 수 없는 타입이면 빈 문자열 */
}

/* =====================================================
  ■ 댓글 등록
===================================================== */
function submitComment(key) {
  const text = document.getElementById('commentText').value.trim();
  const pw   = document.getElementById('commentPw').value;

  if (!text) return; /* 내용 없으면 무시 */
  if (!pw)   { showModalAlert('비밀번호를 입력해 주세요.'); return; }

  /* 익명 ID 자동 생성 (예: Anon#A3F2) */
  const id   = 'Anon#' + Math.random().toString(36).slice(2, 6).toUpperCase();
  const time = new Date().toLocaleString('ko-KR', {
    month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'
  });

  /* 최신 댓글이 위에 오도록 앞에 추가 */
  comments[key].unshift({ id, text, time, pwHash: simpleHash(pw) });

  /* 입력창 초기화 */
  document.getElementById('commentText').value = '';
  document.getElementById('commentPw').value   = '';

  /* 화면 갱신 */
  document.getElementById('commentList').innerHTML = renderComments(key);
  document.getElementById('commentsHeading').innerHTML =
    `Comments <span id="commentCount">(${comments[key].length})</span>`;
}

/* =====================================================
  ■ 댓글 목록 HTML 생성
===================================================== */
function renderComments(key) {
  if (!comments[key] || !comments[key].length) {
    return `<div style="text-align:center;font-family:'IBM Plex Mono',monospace;
      font-size:10px;letter-spacing:0.14em;color:var(--text-dim);padding:24px 0">
      — 아직 댓글이 없습니다 —</div>`;
  }
  return comments[key].map((c, i) => `
    <div class="comment-item">
      <div class="comment-meta">
        <div class="comment-meta-left">
          <span>${escH(c.id)}</span>
          <span>${escH(c.time)}</span>
        </div>
        <div class="comment-actions">
          <button class="c-act-btn" onclick="openEditModal('${key}',${i})">수정</button>
          <button class="c-act-btn" onclick="openDeleteModal('${key}',${i})">삭제</button>
        </div>
      </div>
      <div class="comment-text">${escH(c.text)}</div>
    </div>
  `).join('');
}

/* =====================================================
  ■ 댓글 삭제 모달
    본인 비밀번호 또는 MASTER_KEY 로 삭제 가능
===================================================== */
function openDeleteModal(key, idx) {
  openModal('댓글 삭제', `
    <div>삭제하려면 작성 시 입력한 비밀번호를 입력해 주세요.</div>
    <input type="password" id="modalPwInput" placeholder="비밀번호">
  `, [
    { label: '취소', cls: '',       action: closeModal },
    { label: '삭제', cls: 'danger', action: () => {
      const pw = document.getElementById('modalPwInput').value;
      /* 마스터키 또는 원래 비밀번호인지 확인 */
      if (pw !== MASTER_KEY && simpleHash(pw) !== comments[key][idx].pwHash) {
        const e = document.getElementById('modalError');
        e.style.display = 'block';
        e.textContent = '입력하신 비밀번호가 작성 당시와 일치하지 않습니다. '
                      + '(비밀번호를 분실하신 경우 수정 및 삭제가 불가능합니다.)';
        return;
      }
      comments[key].splice(idx, 1); /* 댓글 배열에서 제거 */
      closeModal();
      document.getElementById('commentList').innerHTML = renderComments(key);
      document.getElementById('commentsHeading').innerHTML =
        `Comments <span id="commentCount">(${comments[key].length})</span>`;
    }}
  ]);
}

/* =====================================================
  ■ 댓글 수정 모달
    본인 비밀번호 또는 MASTER_KEY 로 수정 가능
===================================================== */
function openEditModal(key, idx) {
  const c = comments[key][idx];
  openModal('댓글 수정', `
    <div>수정할 내용과 비밀번호를 입력해 주세요.</div>
    <textarea id="modalEditText">${escH(c.text)}</textarea>
    <input type="password" id="modalPwInput" placeholder="비밀번호">
  `, [
    { label: '취소',     cls: '',        action: closeModal },
    { label: '수정 완료', cls: 'primary', action: () => {
      const pw      = document.getElementById('modalPwInput').value;
      const newText = document.getElementById('modalEditText').value.trim();
      /* 마스터키 또는 원래 비밀번호인지 확인 */
      if (pw !== MASTER_KEY && simpleHash(pw) !== c.pwHash) {
        const e = document.getElementById('modalError');
        e.style.display = 'block';
        e.textContent = '입력하신 비밀번호가 작성 당시와 일치하지 않습니다. '
                      + '(비밀번호를 분실하신 경우 수정 및 삭제가 불가능합니다.)';
        return;
      }
      if (!newText) return;
      comments[key][idx].text = newText; /* 내용 교체 */
      closeModal();
      document.getElementById('commentList').innerHTML = renderComments(key);
    }}
  ]);
}

/* =====================================================
  ■ 모달 공통 열기/닫기
    title   : 모달 제목
    bodyHTML: 모달 내용 HTML
    btns    : [{ label, cls, action }] 버튼 배열
===================================================== */
function openModal(title, bodyHTML, btns) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML    = bodyHTML;
  document.getElementById('modalError').style.display = 'none';

  const btnsEl = document.getElementById('modalBtns');
  btnsEl.innerHTML = '';
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'modal-btn ' + (b.cls || '');
    btn.textContent = b.label;
    btn.onclick = b.action;
    btnsEl.appendChild(btn);
  });

  document.getElementById('modal-backdrop').classList.add('visible');

  /* 입력칸에서 Enter 키 → 마지막 버튼(확인) 실행 */
  setTimeout(() => {
    const inp = document.querySelector('#modalBody input');
    if (inp) inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') btns[btns.length - 1].action();
    });
  }, 50);
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('visible');
}
/* 단순 알림 모달 */
function showModalAlert(msg) {
  openModal('알림', `<div>${msg}</div>`, [{ label:'확인', cls:'primary', action: closeModal }]);
}
/* 바깥 클릭 시 모달 닫기 */
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});

/* =====================================================
  ■ 사이드바 현재 위치 강조
    열려 있는 메뉴·소목차·게시글을 활성 스타일로 표시
===================================================== */
function navHighlight(cat, sub, idx) {
  document.querySelectorAll('.nav-cat,.nav-sub,.nav-content-item')
    .forEach(el => el.classList.remove('active'));

  if (cat) {
    const c = document.querySelector(`.nav-cat[data-cat="${cat}"]`);
    if (c) c.classList.add('active');
  }
  if (sub) {
    const s = document.querySelector(`.nav-sub[data-sub="${sub}"]`);
    if (s) s.classList.add('active');
  }
  if (idx !== null && idx !== undefined) {
    const i = document.querySelector(
      `.nav-content-item[data-cat="${cat}"][data-sub="${sub}"][data-idx="${idx}"]`
    );
    if (i) i.classList.add('active');
  }
}

/* =====================================================
  ■ 사이드바 열기/닫기 (모바일용)
===================================================== */
const burgerBtn = document.getElementById('burgerBtn');
const sidebar   = document.getElementById('sidebar');
const overlay   = document.getElementById('overlay');

function openSidebar()  { sidebar.classList.add('open');    overlay.classList.add('visible');    burgerBtn.classList.add('open');    }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); burgerBtn.classList.remove('open'); }

burgerBtn.addEventListener('click', () =>
  sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
);
document.getElementById('closeBtn').addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);

/* =====================================================
  ■ 맨 위로 버튼
    스크롤 300px 이상 내리면 버튼 표시
===================================================== */
const scrollBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', () => {
  scrollBtn.classList.toggle('visible', window.scrollY > 300);
});
scrollBtn.addEventListener('click', () =>
  window.scrollTo({ top: 0, behavior: 'smooth' })
);

/* =====================================================
  ■ HTML 특수문자 이스케이프 유틸
    사용자 입력이 화면에 그대로 출력될 때 XSS 방지
    예) <script> → &lt;script&gt;
===================================================== */
function escH(s) {
  if (!s && s !== 0) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
