<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛情反正日誌 — 단편 웹진</title>

<!-- =====================================================
  구글 폰트 불러오기
  - Libre Baskerville : 영문 세리프 (제목용)
  - IBM Plex Mono     : 영문 고정폭 (태그·라벨용)
  - Noto Serif KR     : 한국어 본문 폰트
  - Noto Serif SC     : 한자 타이틀 폰트
  - Hahmlet           : 게시글 제목 전용 폰트
===================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;600&family=Hahmlet:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* =====================================================
  ■ 색상·크기 변수 모음 (CSS 변수)
    여기서 색상을 바꾸면 사이트 전체에 반영됩니다.
    라이트 모드 기준입니다.
===================================================== */
:root {
  /* 배경 계열 — 베이지를 더 밝고 따뜻하게 올렸습니다 */
  --c-paper:   #faf6ee;   /* 전체 배경: 더 밝은 크림 베이지 */
  --c-cream:   #f3ece0;   /* 카드·패널 배경 */
  --c-tan:     #d4c9b4;
  --c-warm:    #b8a88a;
  --c-brown:   #7a5c3c;

  /* 글씨 계열 — 대비를 높여 가독성 강화 */
  --c-ink:     #1a1208;   /* 본문: 더 짙게 */
  --c-mid:     #3d2e1a;   /* 중간 강조: 더 짙게 */
  --c-muted:   #7a6548;   /* 흐린 글씨: 더 짙게 → 잘 보이게 */
  --c-dim:     #a89070;   /* 힌트 글씨: 기존보다 훨씬 밝게 */

  /* 포인트 색 */
  --c-accent:  #b02020;   /* 빨강 강조 */
  --c-gold:    #9a7010;   /* 금색 강조 */

  /* 테두리 — 조금 더 진하게 해서 구분선이 잘 보이게 */
  --c-border:  #cec0a8;
  --c-border2: #b8a080;

  /* 실제 사용 별칭 */
  --bg:        var(--c-paper);
  --surface:   #ffffff;   /* 카드는 순백 */
  --surface2:  var(--c-cream);
  --border:    var(--c-border);
  --text:      var(--c-ink);
  --text-mid:  var(--c-mid);
  --text-muted:var(--c-muted);
  --text-dim:  var(--c-dim);
  --accent:    var(--c-accent);
  --gold:      var(--c-gold);

  --sidebar-w: 280px;
  --header-h:  58px;
  --radius:    3px;
  --trans:     0.3s cubic-bezier(0.4,0,0.2,1);
  --shadow:    0 2px 12px rgba(42,31,20,0.10);
  --shadow-lg: 0 8px 40px rgba(42,31,20,0.18);
}

/* =====================================================
  ■ 다크 모드 색상
    헤더의 ☽ 버튼을 누르면 이 값들로 덮어씁니다.
===================================================== */
[data-theme="dark"] {
  /* ─────────────────────────────────────────────
     다크모드 색상
     노란기를 줄이고 채도를 낮춘 중성 다크 톤
     블록(카드·패널)은 밝은 회색계열로 올려 배경과 구분
  ───────────────────────────────────────────── */
  --bg:         #181818;   /* 전체 배경: 순수 다크 그레이 (황갈색 제거) */
  --surface:    #f5f5f3;   /* 카드·패널: 연한 오프화이트 (블록이 밝게) */
  --surface2:   #eaeae8;   /* 입력창 등 보조 배경 */
  --border:     #d0cdc8;   /* 테두리: 중성 그레이 */
  --text:       #1a1a1a;   /* 카드 안 글씨: 짙은 다크 (배경이 밝으므로) */
  --text-mid:   #3a3835;   /* 중간 강조 글씨 */
  --text-muted: #6a6660;   /* 흐린 설명 글씨 */
  --text-dim:   #999590;   /* 힌트 글씨 */
  --accent:     #b82020;   /* 강조 빨강 (채도 약간 낮춤) */
  --gold:       #8a7020;   /* 금색 (채도 낮춤, 노란기 줄임) */
  --c-border2:  #bab8b2;
}

/* =====================================================
  ■ 기본 리셋 & body 스타일
===================================================== */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth }
body {
  font-family:'Noto Serif KR',serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;          /* 가로 스크롤 방지 */
  transition:background 0.4s,color 0.4s;
}

/* 종이 질감 그레인 오버레이 (배경 위에 살짝 깔리는 노이즈) */
body::after {
  content:'';
  position:fixed; inset:0; z-index:9998; pointer-events:none;
  opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* 화면 테두리 장식선 (데스크탑에서 보이는 얇은 액자선) */
#main-deco {
  position:fixed; top:var(--header-h); left:0; right:0; bottom:0;
  pointer-events:none; z-index:0; overflow:hidden;
}
#main-deco::before {
  content:''; position:absolute;
  border:1px solid var(--border); opacity:0.4;
  top:24px; left:calc(var(--sidebar-w) + 24px); right:24px; bottom:24px;
  border-radius:2px;
}

/* =====================================================
  ■ 인트로 화면 (처음 켰을 때 나오는 전체화면)
    클릭하면 사라집니다.
===================================================== */
#intro {
  position:fixed; inset:0; z-index:9000;
  background:#0e0b08;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer;
}
/* 클릭 후 위로 날아가는 퇴장 애니메이션 */
#intro.hidden {
  animation:introOut 0.9s cubic-bezier(0.7,0,0.3,1) forwards;
}
@keyframes introOut {
  0%   { opacity:1; transform:translateY(0) }
  100% { opacity:0; transform:translateY(-100%); pointer-events:none }
}
/* 인트로 이미지 슬롯
   src에 URL을 넣으면 이미지가 표시되고,
   비워두면 이미지 영역이 숨겨집니다. */
.intro-img-wrap {
  margin-bottom:24px;
  opacity:0; animation:introFadeUp 0.8s ease 0.2s forwards;
}
.intro-img-wrap img {
  max-height:120px; max-width:260px;
  object-fit:contain;
  display:block; margin:0 auto;
  filter:drop-shadow(0 2px 16px rgba(200,168,106,0.35));
}
.intro-img-wrap.hidden { display:none }

/* 인트로 타이틀 */
.intro-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(36px,12vw,96px);
  font-weight:600;
  color:#f0e8d8;
  letter-spacing:0.06em;
  opacity:0; animation:introFadeUp 0.8s ease 0.7s forwards;
  line-height:1.1;
}
.intro-title span { color:#c0392b } /* 강조 한자는 빨강 */

/* 인트로 부제목 */
.intro-sub {
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:0.35em; text-transform:uppercase;
  color:#7a6a58; margin-top:20px;
  opacity:0; animation:introFadeUp 0.8s ease 1.0s forwards;
}
/* "클릭하여 입장" 깜빡임 */
.intro-click {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px; letter-spacing:0.25em; text-transform:uppercase;
  color:#4a3d2c; margin-top:48px;
  opacity:0; animation:introBlink 1.4s ease 1.6s infinite;
}

/* 인트로 네 모서리 장식 */
.intro-corner {
  position:absolute; width:40px; height:40px;
  border-color:#3a2e22; border-style:solid; border-width:0;
}
.intro-corner.tl { top:24px;    left:24px;  border-top-width:1px;    border-left-width:1px  }
.intro-corner.tr { top:24px;    right:24px; border-top-width:1px;    border-right-width:1px }
.intro-corner.bl { bottom:24px; left:24px;  border-bottom-width:1px; border-left-width:1px  }
.intro-corner.br { bottom:24px; right:24px; border-bottom-width:1px; border-right-width:1px }

/* 공통 등장 애니메이션 */
@keyframes introFadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes introBlink  { 0%,100%{opacity:0} 50%{opacity:1} }

/* =====================================================
  ■ 상단 헤더
===================================================== */
#header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:var(--header-h);
  background:var(--bg);
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
  transition:background 0.4s, border-color 0.4s;
}
/* 헤더 아래 보조 선 */
#header::after {
  content:''; position:absolute; bottom:-4px; left:0; right:0;
  height:1px; background:var(--border); opacity:0.5;
}

/* 로고 (한자 타이틀) */
.logo {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:19px; color:var(--text); cursor:pointer;
  letter-spacing:0.05em; display:flex; align-items:baseline; gap:8px;
}
.logo-hanja {
  font-weight:600; font-size:19px; letter-spacing:0.06em;
  /* 빨강→금색 그라디언트 글씨 */
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-tag {
  font-family:'IBM Plex Mono',monospace;
  font-size:8px; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--text-muted);
}
.header-right { display:flex; align-items:center; gap:10px }

/* 다크모드 토글 버튼 */
.theme-btn {
  width:34px; height:34px; background:none;
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:border-color var(--trans); color:var(--text-muted);
}
.theme-btn:hover { border-color:var(--gold); color:var(--gold) }

/* 햄버거 메뉴 버튼 (모바일) */
.burger {
  width:34px; height:34px; background:none;
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
  transition:border-color var(--trans);
}
.burger:hover { border-color:var(--accent) }
.burger span { display:block; width:16px; height:1px; background:var(--text-mid); transition:all var(--trans); transform-origin:center }
/* 열렸을 때 X 모양으로 변환 */
.burger.open span:nth-child(1) { transform:translateY(6px) rotate(45deg) }
.burger.open span:nth-child(2) { opacity:0; transform:scaleX(0) }
.burger.open span:nth-child(3) { transform:translateY(-6px) rotate(-45deg) }

/* =====================================================
  ■ 어두운 배경 오버레이 (모바일에서 사이드바 열릴 때)
===================================================== */
#overlay {
  position:fixed; inset:0; z-index:150;
  background:rgba(14,11,8,0.55);
  opacity:0; pointer-events:none; transition:opacity var(--trans);
}
#overlay.visible { opacity:1; pointer-events:all }

/* =====================================================
  ■ 왼쪽 사이드바 (목차 메뉴)
===================================================== */
#sidebar {
  position:fixed; top:0; left:0; bottom:0; z-index:200;
  width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  box-shadow:var(--shadow-lg);
  transform:translateX(-100%);    /* 기본: 왼쪽으로 숨김 */
  transition:transform var(--trans), background 0.4s;
  overflow-y:auto; display:flex; flex-direction:column;
}
#sidebar.open { transform:translateX(0) }  /* 열리면 원위치 */

.sidebar-head {
  padding:20px;
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-logo {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:15px; font-weight:600; letter-spacing:0.06em;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.sidebar-close {
  width:28px; height:28px; background:none; border:none;
  color:var(--text-muted); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border-radius:var(--radius); transition:color var(--trans);
}
.sidebar-close:hover { color:var(--accent) }

/* 대메뉴 (Fiction / Art / Videos) — 글씨 더 크고 선명하게 */
.nav-section  { padding:8px 0 }
.nav-cat {
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 20px; cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text-mid);   /* 기존 text-muted → text-mid 로 더 진하게 */
  transition:all var(--trans); user-select:none;
  border-left:3px solid transparent;   /* 기존 2px → 3px */
}
.nav-cat:hover, .nav-cat.active { color:var(--text); border-left-color:var(--accent) }
.nav-cat.active { color:var(--accent) }
.nav-cat-arrow { font-size:8px; transition:transform var(--trans); color:var(--text-muted) }
.nav-cat.open .nav-cat-arrow { transform:rotate(90deg) }

/* 접혔다 펼쳐지는 서브메뉴 컨테이너 */
.nav-sublist { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1); background:var(--surface2) }
.nav-sublist.open { max-height:2000px }

/* ─────────────────────────────────────────────
  사이드바 목차 이미지 슬롯
  각 대메뉴(nav-sublist) 맨 아래에 이미지가
  목차와 함께 슬라이드 다운됩니다.

  사용법:
  JS의 buildNav() 함수 안에 NAV_IMAGES 객체에
  대메뉴명을 키로, 이미지 URL을 값으로 넣으세요.
  예) Fiction: "https://raw.githubusercontent.com/.../fiction-banner.png"
───────────────────────────────────────────── */
.nav-cat-img-wrap {
  overflow:hidden;
  max-height:0;
  transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1);
}
.nav-cat-img-wrap.open {
  max-height:300px;
}
.nav-cat-img {
  width:100%;
  display:block;
  object-fit:cover;
  opacity:0;
  transform:translateY(-8px);
  transition:opacity 0.4s ease 0.2s, transform 0.4s ease 0.2s;
}
.nav-cat-img-wrap.open .nav-cat-img {
  opacity:1;
  transform:translateY(0);
}

/* 소목차 — 클릭 시 카테고리 페이지로 바로 이동하므로 더 눈에 띄게 */
.nav-sub {
  padding:10px 20px 10px 28px; cursor:pointer;
  font-size:12px; font-weight:500;   /* 기존 11px, 일반 → 12px, 500으로 키움 */
  color:var(--text-mid);             /* 기존 text-muted → text-mid */
  letter-spacing:0.04em;
  transition:color var(--trans), background var(--trans);
  border-left:3px solid transparent;
  font-family:'Noto Serif KR',serif;
}
.nav-sub:hover { color:var(--text); background:var(--surface); border-left-color:var(--gold) }
.nav-sub.active { color:var(--accent); border-left-color:var(--accent) }

/* 개별 게시글 항목 */
.nav-content-item {
  padding:5px 20px 5px 42px; cursor:pointer;
  font-size:11px; color:var(--text-muted);   /* 기존 text-dim → text-muted */
  font-family:'Noto Serif KR',serif;
  transition:color var(--trans);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display:flex; align-items:center; gap:6px;
}
.nav-content-item:hover  { color:var(--text) }
.nav-content-item.active { color:var(--accent) }
.nav-lock-icon { font-size:9px; opacity:0.6 }
.sidebar-divider { height:1px; background:var(--border); margin:4px 0 }

/* =====================================================
  ■ 메인 콘텐츠 영역
===================================================== */
#main {
  position:relative; z-index:1;
  margin-top:var(--header-h);
  min-height:calc(100vh - var(--header-h));
  padding:48px 24px 100px;
  max-width:780px;
  margin-left:auto; margin-right:auto;
}

/* =====================================================
  ■ 메인 랜딩 화면 (처음 진입 화면)
===================================================== */
#landing { display:none }
#landing.active {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:75vh; text-align:center;
  animation:fadeUp 0.7s ease both;
}
.landing-vol {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px; letter-spacing:0.35em; text-transform:uppercase;
  color:var(--text-muted); margin-bottom:24px;
  display:flex; align-items:center; gap:12px;
}
.landing-vol::before, .landing-vol::after {
  content:''; display:block; width:40px; height:1px; background:var(--border)
}
/* 대형 타이틀 */
.landing-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(38px,10vw,88px);
  font-weight:600; line-height:1.05; color:var(--text);
  margin-bottom:16px; letter-spacing:0.04em;
}
.landing-title em {
  color:var(--accent); display:block; font-style:normal; font-size:0.72em;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
/* 타이틀 아래 장식선 */
.landing-rule {
  width:80px; height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:20px auto;
}
.landing-desc {
  font-size:14px; color:var(--text-muted); line-height:1.9;
  max-width:360px; font-weight:300; margin-bottom:48px;
}

/* 카테고리 선택 버튼 3개 — 크기 키움 */
.cat-buttons { display:flex; gap:32px; flex-wrap:wrap; justify-content:center }
.cat-btn {
  position:relative; overflow:hidden;
  padding:16px 40px;        /* 기존 14px 32px → 16px 40px */
  background:var(--surface);
  border:1px solid var(--c-border2);
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  font-size:13px; letter-spacing:0.18em; text-transform:uppercase;  /* 10px → 13px */
  color:var(--text-mid);
  transition:all var(--trans);
  box-shadow:var(--shadow);
}
/* 마우스 올리면 빨간 배경이 왼쪽에서 스윽 채워짐 */
.cat-btn::before {
  content:''; position:absolute; inset:0;
  background:var(--accent);
  transform:scaleX(0); transform-origin:left;
  transition:transform var(--trans); z-index:0;
}
.cat-btn:hover::before { transform:scaleX(1) }
.cat-btn:hover { color:#fff; border-color:var(--accent); box-shadow:0 4px 20px rgba(192,57,43,0.25); transform:translateY(-1px) }
.cat-btn span { position:relative; z-index:1; display:flex; align-items:center; gap:8px }
.cat-btn-num { font-size:11px; color:var(--text-dim) }   /* 8px → 11px */
.cat-btn:hover .cat-btn-num { color:rgba(255,255,255,0.6) }

/* =====================================================
  ■ 카테고리 목록 페이지
===================================================== */
#catPage { display:none }
#catPage.active { display:block; animation:fadeUp 0.5s ease both }

.catpage-head {
  margin-bottom:32px; padding-bottom:20px;
  border-bottom:2px solid var(--border);
  display:flex; align-items:flex-end; justify-content:space-between;
  flex-wrap:wrap; gap:12px;
}
.catpage-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(32px,7vw,52px);
  font-weight:600; color:var(--text); line-height:1;
}
.catpage-title em { color:var(--accent); font-style:normal }

/* 뒤로가기 버튼 — 크기 키움 */
.back-btn {
  padding:9px 18px; background:none;    /* 7px 14px → 9px 18px */
  border:1px solid var(--border); border-radius:var(--radius);
  font-family:'IBM Plex Mono',monospace; font-size:11px;   /* 9px → 11px */
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--text-muted); cursor:pointer; transition:all var(--trans);
}
.back-btn:hover { border-color:var(--accent); color:var(--accent) }

/* 소목차 탭 버튼들 — 크기 키움 */
.sub-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px }
.sub-tab {
  padding:8px 20px; background:none;    /* 6px 16px → 8px 20px */
  border:1px solid var(--border); border-radius:2px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:0.12em; text-transform:uppercase;   /* 9px → 11px */
  color:var(--text-muted); cursor:pointer; transition:all var(--trans);
}
.sub-tab:hover, .sub-tab.active { background:var(--text); border-color:var(--text); color:var(--bg) }

/* 게시글 카드 목록 */
.content-grid { display:flex; flex-direction:column; gap:2px }
.content-card {
  background:var(--surface); border:1px solid var(--border);
  padding:20px 22px; cursor:pointer;
  transition:all var(--trans);
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  position:relative; overflow:hidden;
}
/* 마우스 올리면 왼쪽에 빨간 세로선 생김 */
.content-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:0;
  background:var(--accent); transition:width var(--trans);
}
.content-card:hover::before { width:3px }
.content-card:hover { padding-left:25px; background:var(--surface2) }

.card-info   { flex:1 }
.card-meta   {
  font-family:'IBM Plex Mono',monospace; font-size:9px;   /* 8.5 → 9px */
  letter-spacing:0.15em; text-transform:uppercase;
  color:var(--text-muted);   /* text-dim → text-muted 로 더 진하게 */
  margin-bottom:6px;
}
/* 게시글 제목 (Hahmlet 폰트) */
.card-title  {
  font-family:'Hahmlet',serif;
  font-size:17px; font-weight:400;
  color:var(--text); line-height:1.3; margin-bottom:8px;
}
/* 작가명 */
.card-author {
  font-size:12px; color:var(--text-muted); font-style:italic;
}
.card-author::before {
  content:'by ';
  font-family:'IBM Plex Mono',monospace; font-style:normal;
  font-size:8px; letter-spacing:0.12em; color:var(--text-dim); margin-right:2px;
}
.card-lock  { font-size:13px; color:var(--text-dim); flex-shrink:0 }
.card-arrow { font-size:14px; color:var(--text-dim); transition:transform var(--trans),color var(--trans); flex-shrink:0 }
.content-card:hover .card-arrow { transform:translateX(4px); color:var(--accent) }

/* 전체 탭에서 소목차 구분 헤더
   — 다크모드에서도 CSS 변수가 제대로 적용되도록 인라인 스타일 대신 class 사용 */
.sub-section-label {
  padding:10px 4px 6px;
  font-family:'IBM Plex Mono',monospace; font-size:9px;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--text-muted);
  border-top:1px solid var(--border);
  margin-top:8px;
  display:flex; align-items:center; gap:6px;
}
.sub-section-label::before {
  content:'·';
  color:var(--accent);
}

/* =====================================================
  ■ 게시글 뷰어 (읽기 화면)
===================================================== */
#viewer { display:none }
#viewer.active { display:block; animation:fadeUp 0.5s ease both }

/* 뷰어 상단 바 (뒤로가기 + 경로 표시) */
.viewer-topbar {
  display:flex; align-items:center; gap:10px;
  margin-bottom:32px; flex-wrap:wrap;
}
.viewer-bc {
  font-family:'IBM Plex Mono',monospace; font-size:9px;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--text-muted); flex:1;
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
}
.viewer-bc span { color:var(--text-dim) }

/* 게시글 제목 영역 */
.viewer-header {
  margin-bottom:28px; padding-bottom:22px;
  border-bottom:2px solid var(--border); position:relative;
}
/* 제목 아래 짧은 빨간 선 */
.viewer-header::before {
  content:''; position:absolute; bottom:-4px; left:0; width:60px; height:1px;
  background:var(--accent);
}
/* 게시글 제목 (Hahmlet 폰트) */
.viewer-title {
  font-family:'Hahmlet',serif;
  font-size:clamp(24px,6vw,40px);
  font-weight:500; line-height:1.2;
  color:var(--text); margin-bottom:14px;
}
.viewer-info-row {
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
/* 작가명 (뷰어용) */
.viewer-author {
  font-family:'Noto Serif KR',serif;
  font-size:15px; color:var(--text-mid); font-style:italic;
}
.viewer-author::before {
  content:'by ';
  font-family:'IBM Plex Mono',monospace; font-style:normal;
  font-size:9px; letter-spacing:0.12em; color:var(--text-muted);
}
/* 소목차 이름 배지 — 더 잘 보이게 */
.viewer-sub {
  font-family:'IBM Plex Mono',monospace; font-size:11px;   /* 9px → 11px */
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--text-mid);
  padding:3px 10px; border:1px solid var(--border); border-radius:2px;
}
/* 타입 배지 — 크기 키움 */
.type-badge {
  font-family:'IBM Plex Mono',monospace;
  display:inline-block; padding:4px 12px;   /* 3px 10px → 4px 12px */
  border-radius:2px; font-size:11px; font-weight:500;   /* 9px → 11px */
  letter-spacing:0.12em; text-transform:uppercase;
}
.type-badge.fiction { background:rgba(176,32,32,0.12);  color:#8b1515; border:1px solid rgba(176,32,32,0.40) }
.type-badge.art     { background:rgba(154,112,16,0.12); color:#7a5a00; border:1px solid rgba(154,112,16,0.40) }
.type-badge.video   { background:rgba(32,80,160,0.10);  color:#1a4a9a; border:1px solid rgba(32,80,160,0.35) }
[data-theme="dark"] .type-badge.fiction { color:#e05050; border-color:rgba(224,80,80,0.5) }
[data-theme="dark"] .type-badge.art     { color:#d4a020; border-color:rgba(212,160,32,0.5) }
[data-theme="dark"] .type-badge.video   { color:#6090e0; border-color:rgba(96,144,224,0.5) }

/* =====================================================
  ■ 픽션(소설) 본문
    - 문단 사이 거리: 늘림 (margin-bottom 2.2em)
    - 줄간격: 약간 줄임 (2.1 → 1.95)
    - 들여쓰기: 줄임 (2em → 1.4em)
    - 글 위아래 공백 추가
===================================================== */
.fiction-body {
  font-family:'Noto Serif KR',serif;
  font-size:16.5px; line-height:1.95;   /* 줄간격 살짝 줄임 */
  color:var(--text); font-weight:300;
  letter-spacing:0.01em; max-width:640px;
  padding:20px 0;   /* 글 위아래 공백 */
}
.fiction-body p {
  margin-bottom:2.2em;   /* 문단 사이 거리 늘림 */
  text-indent:1.4em;     /* 들여쓰기 줄임 */
}
/* "나 "로 시작하는 문장은 들여쓰기 규칙 관계없이 무조건 들여쓰기
   JS에서 처리하므로 여기서는 클래스만 정의합니다 */
.indent-na {
  display:block;
  padding-left:1.4em;   /* 들여쓰기와 동일한 값 */
  text-indent:0;
}
/* txt 파일 로딩 실패 시 오류 메시지 */
.fiction-error {
  font-size:12px; color:var(--accent);
  padding:24px; border:1px solid var(--border); border-radius:var(--radius);
  font-family:'IBM Plex Mono',monospace; letter-spacing:0.08em;
  margin:20px 0;
}

/* =====================================================
  ■ 아트(이미지) 뷰어
===================================================== */
.art-viewer { display:flex; flex-direction:column; gap:3px }
.art-viewer img { width:100%; display:block; border-radius:2px; border:1px solid var(--border) }
.art-caption {
  margin-top:16px; font-size:12px;
  color:var(--text-muted); text-align:center;
  font-style:italic; line-height:1.6;
}

/* =====================================================
  ■ 영상(유튜브) 뷰어
===================================================== */
.video-wrapper {
  position:relative; width:100%; padding-bottom:56.25%; /* 16:9 비율 */
  background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden;
}
.video-wrapper iframe { position:absolute; inset:0; width:100%; height:100%; border:none }
.video-desc {
  margin-top:16px; font-size:13.5px; color:var(--text-muted);
  line-height:1.8; font-weight:300;
}

/* =====================================================
  ■ 이전글/다음글 버튼
===================================================== */
.viewer-pager {
  display:flex; gap:10px; justify-content:space-between;
  margin-top:48px; padding-top:24px; border-top:2px solid var(--border);
}
.pager-btn {
  flex:1; padding:13px 16px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text-muted); cursor:pointer;
  font-family:'IBM Plex Mono',monospace; font-size:11px;   /* 9px → 11px */
  letter-spacing:0.10em; text-transform:uppercase;
  transition:all var(--trans); box-shadow:var(--shadow);
  display:flex; align-items:center; gap:8px;
}
.pager-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent) }
.pager-btn:disabled { opacity:0.22; cursor:not-allowed; box-shadow:none }
.pager-btn.prev { justify-content:flex-start }
.pager-btn.next { justify-content:flex-end }
.pager-label { font-size:13px; color:var(--text); font-family:'Noto Serif KR',serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:130px }

/* 글 하단 "목록으로" 버튼 */
.viewer-back-bottom { display:flex; justify-content:center; margin-top:16px }
.viewer-back-bottom .back-btn { padding:12px 32px; font-size:11px }

/* =====================================================
  ■ 글씨 크기 조절 컨트롤
    뷰어 상단에 표시되는 A- / A+ 버튼
===================================================== */
.font-size-ctrl {
  display:flex; align-items:center; gap:4px;
  margin-left:auto;   /* 오른쪽 정렬 */
}
.font-size-ctrl span {
  font-family:'IBM Plex Mono',monospace; font-size:9px;
  letter-spacing:0.12em; color:var(--text-muted);
  padding:0 4px;
}
.fs-btn {
  width:28px; height:28px; background:none;
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; font-family:'IBM Plex Mono',monospace;
  font-size:11px; color:var(--text-mid);
  display:flex; align-items:center; justify-content:center;
  transition:all var(--trans); line-height:1;
}
.fs-btn:hover { border-color:var(--accent); color:var(--accent) }

/* =====================================================
  ■ 맨 위로 올라가기 버튼
    스크롤을 300px 이상 내리면 나타납니다.
    border에 --c-border2 대신 --border 사용 (다크모드 호환)
===================================================== */
#scrollTopBtn {
  position:fixed; bottom:32px; right:24px; z-index:300;
  width:40px; height:40px;
  background:var(--surface);
  border:1px solid var(--border);   /* --c-border2 → --border 로 변경 (다크모드 안전) */
  border-radius:var(--radius); cursor:pointer;
  font-family:'IBM Plex Mono',monospace; font-size:14px;
  color:var(--text-muted);
  display:none; align-items:center; justify-content:center;
  box-shadow:var(--shadow-lg); transition:all var(--trans);
}
#scrollTopBtn:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-2px) }
#scrollTopBtn.visible { display:flex }


/* =====================================================
  ■ 모달 팝업 (비밀번호 입력창, 성인 인증 등)
===================================================== */
#modal-backdrop {
  position:fixed; inset:0; z-index:8000;
  background:rgba(14,11,8,0.65);
  display:none; align-items:center; justify-content:center; padding:20px;
}
#modal-backdrop.visible { display:flex; animation:fadeIn 0.2s ease both }
.modal {
  background:var(--surface); border:2px solid var(--border);
  border-radius:var(--radius); padding:30px 26px;
  max-width:400px; width:100%; box-shadow:var(--shadow-lg);
  animation:scaleIn 0.22s ease both; position:relative;
}
/* 모달 상단 장식선 */
.modal::before {
  content:''; position:absolute; top:-1px; left:20px; right:20px; height:2px;
  background:linear-gradient(to right,var(--accent),var(--gold),var(--accent));
}
.modal-title {
  font-family:'Libre Baskerville',serif; font-size:18px;
  font-style:italic; color:var(--text); margin-bottom:14px;
}
.modal-body { font-size:13px; color:var(--text-muted); line-height:1.7; margin-bottom:18px }
.modal-body input, .modal-body textarea {
  width:100%; padding:10px 12px; margin-top:10px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius); font-size:12.5px;
  outline:none; transition:border-color var(--trans);
  color:var(--text); font-family:'Noto Serif KR',serif;
}
.modal-body input:focus, .modal-body textarea:focus { border-color:var(--gold) }
.modal-body textarea { resize:vertical; min-height:72px }
/* 비밀번호 불일치 오류 메시지
   — 다크모드에서 rgba 배경이 너무 어두워 보이지 않는 문제를 수정했습니다 */
.modal-error {
  font-size:11px; color:var(--accent); margin-top:8px;
  display:none; line-height:1.5;
  padding:8px;
  background:rgba(192,57,43,0.12);   /* 기존 0.06에서 0.12로 올려 다크모드에서도 보이게 */
  border:1px solid rgba(192,57,43,0.30);
  border-radius:var(--radius);
}
.modal-btns { display:flex; gap:8px; justify-content:flex-end }
.modal-btn {
  padding:10px 22px; border-radius:var(--radius);   /* 8px 18px → 10px 22px */
  font-family:'IBM Plex Mono',monospace; font-size:11px;   /* 9px → 11px */
  letter-spacing:0.12em; text-transform:uppercase; cursor:pointer;
  transition:all var(--trans); border:1px solid var(--border);
  color:var(--text-mid); background:none;
}
.modal-btn:hover            { border-color:var(--text-mid) }
.modal-btn.primary          { background:var(--text);   border-color:var(--text);   color:var(--bg) }
.modal-btn.primary:hover    { background:var(--accent);  border-color:var(--accent) }
.modal-btn.danger           { background:var(--accent);  border-color:var(--accent); color:#fff }
.modal-btn.danger:hover     { background:#a93226 }

/* =====================================================
  ■ 공통 애니메이션
===================================================== */
@keyframes fadeUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }
@keyframes scaleIn  { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }

/* =====================================================
  ■ 스크롤바 커스텀
===================================================== */
::-webkit-scrollbar            { width:5px }
::-webkit-scrollbar-track      { background:var(--bg) }
::-webkit-scrollbar-thumb      { background:var(--border); border-radius:2px }
::-webkit-scrollbar-thumb:hover{ background:var(--text-dim) }

/* =====================================================
  ■ 다크모드 개별 보정
  헤더·사이드바는 어두운 배경을 유지하고
  카드/블록은 밝은 surface 변수를 사용합니다.
===================================================== */
/* 헤더·사이드바 — 별도로 어두운 배경 지정 */
[data-theme="dark"] #header      { background:#1e1e1e; border-color:#333 }
[data-theme="dark"] #sidebar      { background:#242424 }
[data-theme="dark"] .sidebar-head { border-color:#333; background:#242424 }
[data-theme="dark"] .nav-section  { background:#242424 }
[data-theme="dark"] .nav-sublist  { background:#2a2a2a }

/* 사이드바 nav 글씨 — 어두운 배경 위 밝은 글씨 */
[data-theme="dark"] .nav-cat           { color:#c8c4be }
[data-theme="dark"] .nav-cat.active    { color:var(--accent) }
[data-theme="dark"] .nav-sub           { color:#b0aca6 }
[data-theme="dark"] .nav-sub:hover     { color:#f0ede8; background:rgba(255,255,255,0.07) }
[data-theme="dark"] .nav-content-item  { color:#888480 }
[data-theme="dark"] .nav-content-item:hover { color:#c8c4be }
[data-theme="dark"] .sidebar-divider   { background:#333 }
[data-theme="dark"] .sidebar-logo      { background:linear-gradient(135deg,var(--accent),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text }
[data-theme="dark"] .sidebar-close     { color:#888 }

/* 카드·블록 — surface가 밝으므로 글씨는 짙게 (변수로 자동 처리됨) */
[data-theme="dark"] .content-card:hover { background:var(--surface2) }
[data-theme="dark"] .sub-tab   { color:var(--text-muted); border-color:var(--border) }
[data-theme="dark"] .sub-tab.active { background:var(--text); border-color:var(--text); color:var(--surface) }
[data-theme="dark"] .back-btn  { color:var(--text-muted); border-color:var(--border) }

/* type 배지 — 라이트와 동일하게 (surface가 밝으므로) */
[data-theme="dark"] .type-badge.fiction { color:#8b1515; border-color:rgba(176,32,32,0.40) }
[data-theme="dark"] .type-badge.art     { color:#7a5a00; border-color:rgba(154,112,16,0.40) }
[data-theme="dark"] .type-badge.video   { color:#1a4a9a; border-color:rgba(32,80,160,0.35) }

/* 모달 */
[data-theme="dark"] #modal-backdrop { background:rgba(0,0,0,0.75) }
[data-theme="dark"] .modal          { background:var(--surface); border-color:var(--border) }
[data-theme="dark"] .modal-error    { background:rgba(184,32,32,0.10) }

/* 이전/다음 버튼 */
[data-theme="dark"] .pager-btn    { background:var(--surface); color:var(--text-muted) }
[data-theme="dark"] .pager-label  { color:var(--text) }

/* 테마 버튼 */
[data-theme="dark"] .theme-btn { color:#aaa; border-color:#444 }
[data-theme="dark"] .theme-btn:hover { border-color:var(--gold); color:var(--gold) }
[data-theme="dark"] .burger    { border-color:#444 }
[data-theme="dark"] .burger span { background:#c8c4be }

/* 랜딩 — surface 위이므로 별도 처리 불필요하나 배경은 다크 */
[data-theme="dark"] #main       { }
[data-theme="dark"] .landing-title { color:var(--text) }

/* 글씨 크기 조절 버튼 */
[data-theme="dark"] .fs-btn { color:var(--text-muted); border-color:var(--border) }

@media(min-width:900px) {
  #sidebar { transform:translateX(0) }
  #main    { margin-left:var(--sidebar-w); max-width:calc(720px + var(--sidebar-w)); padding:56px 52px 100px }
  .burger  { display:none }
  #overlay { display:none }
  #header  { padding-left:calc(var(--sidebar-w) + 24px) }
}
</style>
</head>
<body>

<!-- =====================================================
  인트로 화면
===================================================== -->
<div id="intro" onclick="dismissIntro()">
  <div class="intro-corner tl"></div>
  <div class="intro-corner tr"></div>
  <div class="intro-corner bl"></div>
  <div class="intro-corner br"></div>

  <!--

      const open = subListEl.classList.contains('open');
      document.querySelectorAll('.nav-cat').forEach(el => el.classList.remove('open','active'));
      document.querySelectorAll('#navMenu > .nav-sublist').forEach(el => el.classList.remove('open'));
      /* 모든 이미지 wrap 닫기 */
      document.querySelectorAll('.nav-cat-img-wrap').forEach(el => el.classList.remove('open'));
      if (!open) {
        catEl.classList.add('open','active');
        subListEl.classList.add('open');
        /* 이미지 wrap 열기 */
        const imgWrap = catEl.nextElementSibling?.nextElementSibling;
        if (imgWrap && imgWrap.classList.contains('nav-cat-img-wrap')) {
          imgWrap.classList.add('open');
        }
      }
    });

    container.appendChild(catEl);
    container.appendChild(subListEl);

    /* 이미지 슬롯 — NAV_IMAGES[cat] 에 URL이 있으면 표시 */
    const imgWrap = document.createElement('div');
    imgWrap.className = 'nav-cat-img-wrap';
    const navImgUrl = NAV_IMAGES[cat] || '';
    if (navImgUrl) {
      const navImg = document.createElement('img');
      navImg.className = 'nav-cat-img';
      navImg.src = navImgUrl;
      navImg.alt = cat;
      imgWrap.appendChild(navImg);
      container.appendChild(imgWrap);
    }

    const hr = document.createElement('div');
    hr.className = 'sidebar-divider';
    container.appendChild(hr);
  }
}
buildNav();

/* =====================================================
  ■ 화면 전환
===================================================== */
function hideAll() {
  ['landing','catPage','viewer'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active');
    el.style.display = 'none';
  });
}
function show(id) {
  const el = document.getElementById(id);
  el.style.display = id === 'landing' ? 'flex' : 'block';
  el.classList.add('active');
}
function goLanding() {
  hideAll(); show('landing');
  currentCat = null;
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* =====================================================
  ■ 카테고리 페이지 이동
    defaultSub: 사이드바 소목차를 클릭했을 때
    해당 소목차 탭을 자동 선택합니다.
===================================================== */
function goCategory(cat, defaultSub) {
  hideAll(); show('catPage');
  currentCat = cat; currentSub = null; currentIdx = null;

  const icons = { Fiction:'✦', Art:'◈', Videos:'▷' };
  document.getElementById('catPageTitle').innerHTML = `<em>${icons[cat]||'·'}</em> ${cat}`;

  const subs   = Object.keys(contentData[cat]);
  const tabsEl = document.getElementById('subTabs');
  tabsEl.innerHTML = '';

  /* 전체 탭 */
  const allBtn = document.createElement('button');
  allBtn.className = 'sub-tab' + (!defaultSub ? ' active' : '');
  allBtn.textContent = '전체';
  allBtn.addEventListener('click', () => {
    document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    renderGridAll(cat);
  });
  tabsEl.appendChild(allBtn);

  /* 소목차별 탭 */
  subs.forEach(sub => {
    const btn = document.createElement('button');
    btn.className = 'sub-tab' + (sub === defaultSub ? ' active' : '');
    btn.textContent = sub;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid(cat, sub);
    });
    tabsEl.appendChild(btn);
  });

  /* 사이드바 소목차 클릭 시 → 해당 소목차 탭 선택 상태로 시작 */
  if (defaultSub) renderGrid(cat, defaultSub);
  else            renderGridAll(cat);

  window.scrollTo({ top:0, behavior:'smooth' });
  navHighlight(cat, null, null);
}

/* =====================================================
  ■ 카드 만들기 (공통 헬퍼)
===================================================== */
function makeCard(item, cat, sub, idx) {
  const card = document.createElement('div');
  card.className = 'content-card';
  card.innerHTML = `
    <div class="card-info">
      <div class="card-meta">
        ${escH(sub)} &nbsp;·&nbsp; ${item.type.toUpperCase()}
        ${item.adult ? '<span style="color:var(--accent)">· 성인</span>' : ''}
      </div>
      <div class="card-title">${escH(item.title)}</div>
      <div class="card-author">${escH(item.author || 'Anonymous')}</div>
    </div>
    ${item.adult ? '<div class="card-lock">🔒</div>' : ''}
    <div class="card-arrow">→</div>
  `;
  card.addEventListener('click', () => attemptLoad(cat, sub, idx));
  return card;
}

/* 전체 탭 렌더링 */
function renderGridAll(cat) {
  currentSub = null;
  const grid = document.getElementById('contentGrid');
  grid.innerHTML = '';
  Object.entries(contentData[cat]).forEach(([sub, items]) => {
    const hdr = document.createElement('div');
    hdr.className = 'sub-section-label';
    hdr.textContent = sub;
    grid.appendChild(hdr);
    items.forEach((item, idx) => grid.appendChild(makeCard(item, cat, sub, idx)));
  });
}

/* 소목차 탭 렌더링 */
function renderGrid(cat, sub) {
  currentSub = sub;
  const grid = document.getElementById('contentGrid');
  grid.innerHTML = '';
  (contentData[cat][sub] || []).forEach((item, idx) =>
    grid.appendChild(makeCard(item, cat, sub, idx))
  );
}

/* =====================================================
  ■ 성인 게시글 접근 확인
===================================================== */
function attemptLoad(cat, sub, idx) {
  const item = contentData[cat][sub][idx];
  if (item.adult && !adultUnlocked) {
    /*
      성인 인증 모달
      비밀번호 입력 + "인증하러가기" 버튼 (ADULT_LINK 있을 때만 표시)
    */
    const linkBtn = ADULT_LINK
      ? `<a href="${ADULT_LINK}" target="_blank" style="
            display:inline-block;margin-top:10px;padding:7px 16px;
            background:none;border:1px solid var(--border);border-radius:var(--radius);
            font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.12em;
            text-transform:uppercase;color:var(--text-muted);text-decoration:none;
            transition:all 0.3s;cursor:pointer;"
          onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
          onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'">
          인증하러가기 →</a>`
      : '';
    openModal('성인 인증', `
      <div>이 콘텐츠는 성인 전용입니다.<br>접근 비밀번호를 입력해 주세요.</div>
      <input type="password" id="modalPwInput" placeholder="비밀번호" autocomplete="off">
      ${linkBtn}
    `, [
      { label:'취소', cls:'',        action: closeModal },
      { label:'확인', cls:'primary', action: () => {
        const pw = document.getElementById('modalPwInput').value;
        if (pw === ADULT_PW) {
          adultUnlocked = true;
          closeModal();
          loadContent(cat, sub, idx);
        } else {
          const e = document.getElementById('modalError');
          e.style.display = 'block';
          e.textContent = '비밀번호가 올바르지 않습니다.';
        }
      }}
    ]);
  } else {
    loadContent(cat, sub, idx);
  }
}

/* =====================================================
  ■ 게시글 뷰어 로딩
===================================================== */
async function loadContent(cat, sub, idx) {
  hideAll(); show('viewer');
  currentCat = cat; currentSub = sub; currentIdx = idx;

  const item = contentData[cat][sub][idx];

  /* 이전/다음 계산 */
  const fi   = flatList.findIndex(f => f.cat===cat && f.sub===sub && f.idx===idx);
  const prev = fi > 0                   ? flatList[fi-1] : null;
  const next = fi < flatList.length - 1 ? flatList[fi+1] : null;

  document.getElementById('viewerBc').innerHTML = `${cat} <span>›</span> ${sub}`;
  document.getElementById('viewerBackBtn').onclick = () => goCategory(cat);

  /* 이전/다음 버튼 */
  const pagerHTML = `
    <div class="viewer-pager">
      <button class="pager-btn prev"
        ${!prev ? 'disabled' : ''}
        ${prev ? `onclick="attemptLoad('${prev.cat}','${prev.sub}',${prev.idx})"` : ''}>
        ← <span class="pager-label">${prev ? escH(prev.item.title) : '처음'}</span>
      </button>
      <button class="pager-btn next"
        ${!next ? 'disabled' : ''}
        ${next ? `onclick="attemptLoad('${next.cat}','${next.sub}',${next.idx})"` : ''}>
        <span class="pager-label">${next ? escH(next.item.title) : '마지막'}</span> →
      </button>
    </div>
    <div class="viewer-back-bottom">
      <button class="back-btn" onclick="goCategory('${cat}')">← 목록으로</button>
    </div>
  `;

  document.getElementById('viewerInner').innerHTML = `
    <div class="viewer-header">
      <h1 class="viewer-title">${escH(item.title)}</h1>
      <div class="viewer-info-row">
        <span class="type-badge ${item.type}">${item.type.toUpperCase()}</span>
        <span class="viewer-author">${escH(item.author || 'Anonymous')}</span>
        <span class="viewer-sub">${escH(sub)}</span>
        ${item.type === 'fiction' ? `
          <div class="font-size-ctrl" title="글씨 크기 조절">
            <button class="fs-btn" onclick="changeFontSize(-1)">A−</button>
            <span id="fsSizeLabel">${currentFontSize}px</span>
            <button class="fs-btn" onclick="changeFontSize(1)">A+</button>
          </div>` : ''}
      </div>
    </div>
    <div id="contentBody" style="padding:24px 0 32px">${await renderBody(item)}</div>
    ${pagerHTML}
  `;

  /* 글씨 크기 현재 설정값 적용 */
  applyFontSize();
  navHighlight(cat, sub, idx);
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* =====================================================
  ■ 글씨 크기 조절
    A- : 1px 줄이기  /  A+ : 1px 키우기
    최솟값 13px, 최댓값 22px
===================================================== */
function changeFontSize(dir) {
  currentFontSize = Math.min(FONT_MAX, Math.max(FONT_MIN, currentFontSize + dir * FONT_STEP));
  applyFontSize();
}
function applyFontSize() {
  const body = document.querySelector('.fiction-body');
  if (body) body.style.fontSize = currentFontSize + 'px';
  const label = document.getElementById('fsSizeLabel');
  if (label) label.textContent = currentFontSize + 'px';
}

/* =====================================================
  ■ 본문 렌더링
===================================================== */
async function renderBody(item) {

  /* Fiction */
  if (item.type === 'fiction') {
    let text = '';
    if (item.bodyFile || item.bodyURL) {
      const url = item.bodyURL || item.bodyFile;
      try {
        const r = await fetch(url);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        text = await r.text();
      } catch(e) {
        return `<div class="fiction-error">
          ⚠ 파일을 불러올 수 없습니다: ${escH(url)}<br>
          오류: ${e.message}<br><br>
          GitHub Raw URL 형식인지 확인하세요:<br>
          https://raw.githubusercontent.com/유저명/저장소명/main/파일명.txt
        </div>`;
      }
    } else {
      text = item.body || '';
    }

    /*
      단락 변환 + "나 "로 시작하는 문장 처리
      ─────────────────────────────────────
      빈 줄(두 번 줄바꿈)로 단락을 나누고,
      각 단락 안에서 "나 "로 시작하는 문장을
      들여쓰기 클래스(.indent-na)로 감쌉니다.
    */
    const ps = text.trim().split(/\n\n+/).map(para => {
      /* 단락 안의 줄들을 처리 */
      const lines = para.split('\n').map(line => {
        if (line.trimStart().startsWith('나 ') || line.trimStart() === '나') {
          /* "나 "로 시작하는 줄은 별도 span으로 들여쓰기 강제 */
          return `<span class="indent-na">${escH(line)}</span>`;
        }
        return escH(line);
      });
      return `<p>${lines.join('<br>')}</p>`;
    }).join('');
    return `<div class="fiction-body">${ps}</div>`;
  }

  /* Art */
  if (item.type === 'art') {
    const imgs = (item.images || []).map(u =>
      `<img src="${u}" alt="artwork" loading="lazy">`
    ).join('');
    return `<div class="art-viewer">${imgs}</div>
            ${item.caption ? `<div class="art-caption">${escH(item.caption)}</div>` : ''}`;
  }

  /* Video */
  if (item.type === 'video') {
    return `<div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/${item.youtubeId}"
        allowfullscreen allow="autoplay;encrypted-media"></iframe>
    </div>
    ${item.desc ? `<p class="video-desc">${escH(item.desc)}</p>` : ''}`;
  }

  return '';
}

/* =====================================================
  ■ 모달 열기/닫기
===================================================== */
function openModal(title, bodyHTML, btns) {
  document.getElementById('modalTitle').textContent    = title;
  document.getElementById('modalBody').innerHTML       = bodyHTML;
  document.getElementById('modalError').style.display = 'none';

  const btnsEl = document.getElementById('modalBtns');
  btnsEl.innerHTML = '';
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className   = 'modal-btn ' + (b.cls || '');
    btn.textContent = b.label;
    btn.onclick     = b.action;
    btnsEl.appendChild(btn);
  });

  document.getElementById('modal-backdrop').classList.add('visible');

  setTimeout(() => {
    const inp = document.querySelector('#modalBody input[type="password"]');
    if (inp) inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') btns[btns.length - 1].action();
    });
  }, 50);
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('visible');
}
function showModalAlert(msg) {
  openModal('알림', `<div>${msg}</div>`, [{ label:'확인', cls:'primary', action:closeModal }]);
}
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});

/* =====================================================
  ■ 사이드바 현재 위치 강조
===================================================== */
function navHighlight(cat, sub, idx) {
  document.querySelectorAll('.nav-cat,.nav-sub,.nav-content-item')
    .forEach(el => el.classList.remove('active'));
  if (cat) {
    const c = document.querySelector(`.nav-cat[data-cat="${cat}"]`);
    if (c) c.classList.add('active');
  }
  if (idx !== null && idx !== undefined) {
    const i = document.querySelector(
      `.nav-content-item[data-cat="${cat}"][data-sub="${sub}"][data-idx="${idx}"]`
    );
    if (i) i.classList.add('active');
  }
}

/* =====================================================
  ■ 사이드바 열기/닫기 (모바일)
===================================================== */
const burgerBtn = document.getElementById('burgerBtn');
const sidebar   = document.getElementById('sidebar');
const overlay   = document.getElementById('overlay');

function openSidebar()  { sidebar.classList.add('open');    overlay.classList.add('visible');    burgerBtn.classList.add('open');    }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); burgerBtn.classList.remove('open'); }

burgerBtn.addEventListener('click', () =>
  sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
);
document.getElementById('closeBtn').addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);

/* =====================================================
  ■ 맨 위로 버튼 (스크롤 300px 이상)
===================================================== */
const scrollBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', () => {
  scrollBtn.classList.toggle('visible', window.scrollY > 300);
});
scrollBtn.addEventListener('click', () =>
  window.scrollTo({ top:0, behavior:'smooth' })
);

/* =====================================================
  ■ HTML 특수문자 이스케이프
===================================================== */
function escH(s) {
  if (!s && s !== 0) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
