/* =====================================================
  ■ 카드 만들기 (공통 헬퍼)
===================================================== */
const CARD_FRAME_IMAGES = [
  'https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B8%94%EB%A1%9D1-1.png?raw=true',
  'https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B8%94%EB%A1%9D1-2.png?raw=true',
  'https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B8%94%EB%A1%9D1-3.png?raw=true',
  'https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B8%94%EB%A1%9D1-4.png?raw=true',
  'https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B8%94%EB%A1%9D1-5.png?raw=true'
];

function makeCard(item, cat, sub, idx) {
  const card = document.createElement('div');
  card.className = 'content-card sr';
  card.dataset.srDelay = idx * 55;
  const randomFrame = CARD_FRAME_IMAGES[Math.floor(Math.random() * CARD_FRAME_IMAGES.length)];
  card.style.borderImageSource = `url('${randomFrame}')`;
  card.innerHTML = `
    <div class="card-info">
      <div class="card-meta">
        <span class="card-meta-cat">${escH(cat)}</span>&nbsp;·&nbsp;<span class="card-meta-sub">${escH(sub)}</span>
        ${item.adult ? '<span style="color:var(--accent)">· 성인</span>' : ''}
      </div>
      <div class="card-title">${escH(item.title)}</div>
      <div class="card-author">${escH(item.author || 'Anonymous')}</div>
    </div>
  `;
  card.addEventListener('click', () => attemptLoad(cat, sub, idx));
  return card;
}

/* 전체 탭 렌더링 */
function renderGridAll(cat) {
  currentSub = null;
  const grid = document.getElementById('contentGrid');
  grid.innerHTML = '';
  Object.entries(contentData[cat]).forEach(([sub, items]) => {
    const hdr = document.createElement('div');
    hdr.className = 'sub-section-label';
    hdr.textContent = sub;
    grid.appendChild(hdr);
    items.forEach((item, idx) => grid.appendChild(makeCard(item, cat, sub, idx)));
  });
}

/* 소목차 탭 렌더링 */
function renderGrid(cat, sub) {
  currentSub = sub;
  const grid = document.getElementById('contentGrid');
  grid.innerHTML = '';
  (contentData[cat][sub] || []).forEach((item, idx) =>
    grid.appendChild(makeCard(item, cat, sub, idx))
  );
}

/* =====================================================
  ■ 성인 게시글 접근 확인
===================================================== */
function attemptLoad(cat, sub, idx) {
  const item = contentData[cat][sub][idx];
  if (item.adult && !adultUnlocked) {
    /*
      성인 인증 모달
      비밀번호 입력 + "인증하러가기" 버튼 (ADULT_LINK 있을 때만 표시)
      "인증하러가기"는 취소·확인 버튼과 같은 가로선에 배치됩니다.
    */
    openModal('성인 인증', `
      <div>이 콘텐츠는 성인 전용입니다.<br>접근 비밀번호를 입력해 주세요.</div>
      <input type="text" id="modalPwInput" placeholder="비밀번호" autocomplete="off">
    `, [
      /* ADULT_LINK 가 있을 때만 "인증하러가기" 버튼 표시 */
      ...(ADULT_LINK ? [{
        label:'인증하러가기 →', cls:'link-out',
        action: () => { window.open(ADULT_LINK, '_blank') }
      }] : []),
      { label:'취소', cls:'',        action: closeModal },
      { label:'확인', cls:'primary', action: () => {
        const pw = document.getElementById('modalPwInput').value;
        if (pw === ADULT_PW) {
          adultUnlocked = true;
          closeModal();
          loadContent(cat, sub, idx);
        } else {
          const e = document.getElementById('modalError');
          e.style.display = 'block';
          e.textContent = '비밀번호가 올바르지 않습니다.';
        }
      }}
    ]);
  } else {
    loadContent(cat, sub, idx);
  }
}

/* =====================================================
  ■ 게시글 뷰어 로딩
===================================================== */
async function loadContent(cat, sub, idx, pushState = true) {
  hideAll(); show('viewer');
  currentCat = cat; currentSub = sub; currentIdx = idx;
  /* ── URL 해시 업데이트 ── */
  if (pushState) {
    const hash = `#${encodeURIComponent(cat)}/${encodeURIComponent(sub)}/${idx}`;
    history.pushState({ page:'viewer', cat, sub, idx }, '', hash);
  }

  const item = contentData[cat][sub][idx];

  /* 이전/다음 계산 */
  const fi   = flatList.findIndex(f => f.cat===cat && f.sub===sub && f.idx===idx);
  const prev = fi > 0                   ? flatList[fi-1] : null;
  const next = fi < flatList.length - 1 ? flatList[fi+1] : null;

  document.getElementById('viewerBc').innerHTML = `${cat} <span>›</span> ${sub}`;
  document.getElementById('viewerBackBtn').onclick = () => goCategory(cat);

  /* 이전/다음 버튼 */
  const pagerHTML = `
    <div class="viewer-pager">
      <button class="pager-btn prev"
        ${!prev ? 'disabled' : ''}
        ${prev ? `onclick="attemptLoad('${prev.cat}','${prev.sub}',${prev.idx})"` : ''}>
        ← <span class="pager-label">${prev ? escH(prev.item.title) : '처음'}</span>
      </button>
      <button class="pager-btn next"
        ${!next ? 'disabled' : ''}
        ${next ? `onclick="attemptLoad('${next.cat}','${next.sub}',${next.idx})"` : ''}>
        <span class="pager-label">${next ? escH(next.item.title) : '마지막'}</span> →
      </button>
    </div>
    <div class="viewer-back-bottom">
      <button class="back-btn" onclick="goCategory('${cat}')">← Back</button>
    </div>
  `;

  document.getElementById('viewerInner').innerHTML = `
    <div class="viewer-banner">
      <img src="https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%ED%97%A4%EB%8D%94.png?raw=true" alt="">
    </div>
    <div class="viewer-header">
      <h1 class="viewer-title">${escH(item.title)}</h1>
      <div class="viewer-author-row">
        <span class="viewer-author">${escH(item.author || 'Anonymous')}</span>
      </div>
      <div class="viewer-info-row">
        <span class="type-badge ${item.type}" style="display:none;">${item.type.toUpperCase()}</span>
        <div class="viewer-controls-right">
          ${item.type === 'fiction' ? `
            <div class="font-controls-group">
              <div class="font-family-dropdown" id="fontFamilyDropdown">
                <button class="ff-toggle-btn" onclick="toggleFontFamilyMenu(event)">
                  ${currentFontFamily === 'pretendard' ? 'Pretendard' : '명조'} <span class="ff-caret">▾</span>
                </button>
                <div class="ff-menu" id="ffMenu">
                  <button class="ff-option ${currentFontFamily === 'default' ? 'active' : ''}" data-ff="default" onclick="changeFontFamily('default')">명조</button>
                  <button class="ff-option ${currentFontFamily === 'pretendard' ? 'active' : ''}" data-ff="pretendard" onclick="changeFontFamily('pretendard')">Pretendard</button>
                </div>
              </div>
              <div class="font-size-ctrl" title="글씨 크기 조절">
                <button class="fs-btn" onclick="changeFontSize(-1)">A−</button>
                <span id="fsSizeLabel">${currentFontSize}px</span>
                <button class="fs-btn" onclick="changeFontSize(1)">A+</button>
              </div>
            </div>
            <button class="dark-toggle-btn" id="darkToggleBtn" onclick="toggleContentDark()" title="본문 다크모드">
              ${contentDarkMode ? '☀' : '☾'}
            </button>` : ''}
        </div>
      </div>
    </div>
    <div id="contentBody" style="padding-top:40px; padding-bottom:48px">${await renderBody(item)}</div>
    ${pagerHTML}
  `;

  /* 글씨 크기 현재 설정값 적용 */
  applyFontSize();
  applyFontFamily();
  applyContentDark();
  navHighlight(cat, sub, idx);
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* =====================================================
  ■ 글씨 크기 조절
    A- : 1px 줄이기  /  A+ : 1px 키우기
    최솟값 13px, 최댓값 22px
===================================================== */
function changeFontSize(dir) {
  currentFontSize = Math.min(FONT_MAX, Math.max(FONT_MIN, currentFontSize + dir * FONT_STEP));
  applyFontSize();
}
function applyFontSize() {
  const body = document.querySelector('.fiction-body');
  if (body) body.style.fontSize = currentFontSize + 'px';
  const label = document.getElementById('fsSizeLabel');
  if (label) label.textContent = currentFontSize + 'px';
}

/* =====================================================
  ■ 본문 폰트 선택 (명조 ↔ Pretendard) — 드롭다운 방식
===================================================== */
function changeFontFamily(ff) {
  currentFontFamily = ff;
  applyFontFamily();
  closeFontFamilyMenu();
}
function applyFontFamily() {
  const body = document.querySelector('.fiction-body');
  if (body) body.classList.toggle('font-pretendard', currentFontFamily === 'pretendard');

  document.querySelectorAll('.ff-option').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.ff === currentFontFamily);
  });
  const toggleBtn = document.querySelector('.ff-toggle-btn');
  if (toggleBtn) {
    toggleBtn.innerHTML = (currentFontFamily === 'pretendard' ? 'Pretendard' : '명조') + ' <span class="ff-caret">▾</span>';
  }
}

/* 본문 미색 영역 다크모드 토글 */
function toggleContentDark() {
  contentDarkMode = !contentDarkMode;
  applyContentDark();
}
function applyContentDark() {
  const body = document.getElementById('contentBody');
  if (body) body.classList.toggle('content-dark', contentDarkMode);
  const btn = document.getElementById('darkToggleBtn');
  if (btn) btn.innerHTML = contentDarkMode ? '☀' : '☾';
}
function toggleFontFamilyMenu(e) {
  e.stopPropagation();
  const dd = document.getElementById('fontFamilyDropdown');
  if (!dd) return;
  dd.classList.toggle('open');
}
function closeFontFamilyMenu() {
  const dd = document.getElementById('fontFamilyDropdown');
  if (dd) dd.classList.remove('open');
}
document.addEventListener('click', (e) => {
  const dd = document.getElementById('fontFamilyDropdown');
  if (dd && dd.classList.contains('open') && !dd.contains(e.target)) {
    dd.classList.remove('open');
  }
});

/* =====================================================
  ■ 본문 렌더링
===================================================== */

/*
  ─────────────────────────────────────────────────────
  ■ 텍스트 파일 마크다운 인라인 파싱
  ─────────────────────────────────────────────────────
  텍스트 파일(.txt) 내의 마크다운 서식을 HTML로 변환합니다.
  지원 문법:
    **텍스트**   → <strong> (굵게)
    *텍스트*     → <em>     (기울임)
    ~~텍스트~~   → <del>    (취소선)
    위 세 가지를 중첩해서 사용할 수 있습니다.
    예) **_굵은 기울임_**  →  <strong><em>굵은 기울임</em></strong>
  ─────────────────────────────────────────────────────
  엔터 처리:
    엔터 한 번(\n)  → 줄바꿈 <br> 유지
    빈 줄 두 개(\n\n) → 새 단락 <p> 구분
*/
function parseInlineMarkdown(text) {
  /* 1) HTML 특수문자 이스케이프 (XSS 방지) */
  let s = String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');

  /* 2) 인라인 서식 변환 — 순서 중요 (긴 패턴 먼저) */
  /* 굵은 기울임 ***텍스트*** */
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  /* 굵게 **텍스트** */
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  /* 기울임 *텍스트* (단, ** 는 이미 처리됨) */
  s = s.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  /* 취소선 ~~텍스트~~ */
  s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');

  return s;
}

async function renderBody(item) {

  /* Fiction */
  if (item.type === 'fiction') {
    let text = '';
    if (item.bodyFile || item.bodyURL) {
      const url = item.bodyURL || item.bodyFile;
      try {
        const r = await fetch(url);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        text = await r.text();
      } catch(e) {
        return `<div class="fiction-error">
          ⚠ 파일을 불러올 수 없습니다: ${escH(url)}<br>
          오류: ${e.message}<br><br>
          GitHub Raw URL 형식인지 확인하세요:<br>
          https://raw.githubusercontent.com/유저명/저장소명/main/파일명.txt
        </div>`;
      }
    } else {
      text = item.body || '';
    }

    /*
      단락 변환 + 들여쓰기 규칙 + 마크다운 인라인 처리
      ─────────────────────────────────────────
      빈 줄 두 개(엔터 두 번, \n\n) = 새 단락 <p>
      엔터 한 번(\n)              = 줄바꿈 <br> 유지
      
      들여쓰기 적용 기준:
        1. "나 " 로 시작하는 문장
        2. " (큰따옴표) 로 시작하는 문장
        3. ' (작은따옴표/한국어 인용부호 '·「) 로 시작하는 문장
        4. 단락 내 두 번째 줄 이후 (엔터 한 번으로 구분된 줄)
      
      인라인 마크다운:
        **텍스트** → 굵게, *텍스트* → 기울임, ~~텍스트~~ → 취소선
    */
    const QUOTE_CHARS = ['"', '\u201c', '\u2018', '\u300c', '\u300e', "'", '\u2019', '\u201d'];

    /* Windows CRLF(\r\n) → LF(\n) 정규화 */
    const normalizedText = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

    const ps = normalizedText.trim().split('\n\n').map((para) => {
      if (para.trim() === '') {
        /* 무더기 엔터 → 빈 줄 개수만큼 그대로 띄워줌 */
        return `<p class="empty-line">&nbsp;</p>`;
      }
      /* 단락 내 줄들 처리 */
      const lines = para.split('\n');
      const processed = lines.map((line, lIdx) => {
        const trimmed = line.trimStart();

        /* 마크다운 인라인 파싱 적용 */
        const parsedLine = parseInlineMarkdown(line);
        const parsedTrimmed = parseInlineMarkdown(trimmed);

        const needsIndent =
          trimmed.startsWith('나 ') || trimmed === '나' ||
          QUOTE_CHARS.some(q => trimmed.startsWith(q)) ||
          lIdx > 0;

        if (needsIndent) {
          return `<span class="indent-na">${parsedLine}</span>`;
        }
        return parsedTrimmed;
      });
      return `<p>${processed.join('<br>')}</p>`;
    }).join('');

    return `<div class="fiction-body">${ps}</div>`;
  }

  /* Art */
  if (item.type === 'art') {
    const imgs = (item.images || []).map(u =>
      `<img src="${u}" alt="artwork" loading="lazy">`
    ).join('');
    return `<div class="art-viewer">${imgs}</div>
            ${item.caption ? `<div class="art-caption">${escH(item.caption)}</div>` : ''}`;
  }

  /* Video */
  if (item.type === 'video') {
    return `<div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/${item.youtubeId}"
        allowfullscreen allow="autoplay;encrypted-media"></iframe>
    </div>
    ${item.desc ? `<p class="video-desc">${escH(item.desc)}</p>` : ''}`;
  }

  return '';
}

/* =====================================================
  ■ 모달 열기/닫기
===================================================== */
function openModal(title, bodyHTML, btns) {
  document.getElementById('modalTitle').textContent    = title;
  document.getElementById('modalBody').innerHTML       = bodyHTML;
  document.getElementById('modalError').style.display = 'none';

  const btnsEl = document.getElementById('modalBtns');
  btnsEl.innerHTML = '';
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className   = 'modal-btn ' + (b.cls || '');
    btn.textContent = b.label;
    btn.onclick     = b.action;
    btnsEl.appendChild(btn);
  });

  document.getElementById('modal-backdrop').classList.add('visible');

  setTimeout(() => {
    const inp = document.querySelector('#modalBody input[type="text"]');
    if (inp) inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') btns[btns.length - 1].action();
    });
  }, 50);
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('visible');
}
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});

/* =====================================================
  ■ 사이드바 현재 위치 강조
===================================================== */
function navHighlight(cat, sub, idx) {
  document.querySelectorAll('.nav-cat,.nav-sub,.nav-content-item')
    .forEach(el => el.classList.remove('active'));
  if (cat) {
    const c = document.querySelector(`.nav-cat[data-cat="${cat}"]`);
    if (c) c.classList.add('active');
  }
  if (idx !== null && idx !== undefined) {
    const i = document.querySelector(
      `.nav-content-item[data-cat="${cat}"][data-sub="${sub}"][data-idx="${idx}"]`
    );
    if (i) i.classList.add('active');
  }
}

/* =====================================================
  ■ 사이드바 열기/닫기 (모바일)
===================================================== */
const burgerBtn = document.getElementById('burgerBtn');
const sidebar   = document.getElementById('sidebar');
const overlay   = document.getElementById('overlay');

function openSidebar()  { sidebar.classList.add('open');    overlay.classList.add('visible');    burgerBtn.classList.add('open');    }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); burgerBtn.classList.remove('open'); }

burgerBtn.addEventListener('click', () =>
  sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
);
document.getElementById('closeBtn').addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);

/* =====================================================
  ■ 맨 위로 버튼 (스크롤 300px 이상)
===================================================== */
const scrollBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', () => {
  const headerOk = window.__headerVisible !== false;
  scrollBtn.classList.toggle('visible', window.scrollY > 300 && headerOk);
}, { passive: true });
scrollBtn.addEventListener('click', () =>
  window.scrollTo({ top:0, behavior:'smooth' })
);

/* =====================================================
  ■ HTML 특수문자 이스케이프
===================================================== */
function escH(s) {
  if (!s && s !== 0) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

</script>
