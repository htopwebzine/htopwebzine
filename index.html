<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛情反正日誌 — 단편 웹진</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;600&family=Hahmlet:wght@300;400;500;600&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">

<style>
/* =====================================================
  ■ 색상·크기 변수 모음 (CSS 변수)
    여기서 색상을 바꾸면 사이트 전체에 반영됩니다.
    라이트 모드 기준입니다.
===================================================== */
:root {
  /* 배경 계열 — 베이지를 더 밝고 따뜻하게 올렸습니다 */
  --c-paper:   #faf6ee;   /* 전체 배경: 더 밝은 크림 베이지 */
  --c-cream:   #f3ece0;   /* 카드·패널 배경 */
  --c-tan:     #d4c9b4;
  --c-warm:    #b8a88a;
  --c-brown:   #7a5c3c;

  /* 글씨 계열 — 대비를 높여 가독성 강화 */
  --c-ink:     #1a1208;   /* 본문: 더 짙게 */
  --c-mid:     #3d2e1a;   /* 중간 강조: 더 짙게 */
  --c-muted:   #7a6548;   /* 흐린 글씨: 더 짙게 → 잘 보이게 */
  --c-dim:     #a89070;   /* 힌트 글씨: 기존보다 훨씬 밝게 */

  /* 포인트 색 */
  --c-accent:  #b02020;   /* 빨강 강조 */
  --c-gold:    #9a7010;   /* 금색 강조 */

  /* 테두리 — 조금 더 진하게 해서 구분선이 잘 보이게 */
  --c-border:  #cec0a8;
  --c-border2: #b8a080;

  /* 실제 사용 별칭 */
  --bg:        var(--c-paper);
  --surface:   #ffffff;   /* 카드는 순백 */
  --surface2:  var(--c-cream);
  --border:    var(--c-border);
  --text:      var(--c-ink);
  --text-mid:  var(--c-mid);
  --text-muted:var(--c-muted);
  --text-dim:  var(--c-dim);
  --accent:    var(--c-accent);
  --gold:      var(--c-gold);

  --sidebar-w: 280px;
  --header-h:  58px;
  --radius:    3px;
  --trans:     0.3s cubic-bezier(0.4,0,0.2,1);
  --shadow:    0 2px 12px rgba(42,31,20,0.10);
  --shadow-lg: 0 8px 40px rgba(42,31,20,0.18);
}

/* =====================================================
  ■ 기본 리셋 & body 스타일
===================================================== */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth }
body {
  font-family:'Noto Serif KR',serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  transition:background 0.4s;
  user-select:none;          /* 텍스트 드래그 선택 방지 */
  -webkit-user-select:none;
}

/* 종이 질감 그레인 오버레이 (배경 위에 살짝 깔리는 노이즈) */
body::after {
  content:'';
  position:fixed; inset:0; z-index:9998; pointer-events:none;
  opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* 화면 테두리 장식선 (데스크탑에서 보이는 얇은 액자선) */
#main-deco {
  position:fixed; top:var(--header-h); left:0; right:0; bottom:0;
  pointer-events:none; z-index:0; overflow:hidden;
}
#main-deco::before {
  content:''; position:absolute;
  border:1px solid var(--border); opacity:0.4;
  top:24px; left:calc(var(--sidebar-w) + 24px); right:24px; bottom:24px;
  border-radius:2px;
}

/* =====================================================
  ■ 인트로 화면 (처음 켰을 때 나오는 전체화면)
    클릭하면 사라집니다.
===================================================== */
#intro {
  position:fixed; inset:0; z-index:9000;
  background:#0e0b08;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer;
}
/* 클릭 후 위로 날아가는 퇴장 애니메이션 */
#intro.hidden {
  animation:introOut 0.9s cubic-bezier(0.7,0,0.3,1) forwards;
}
@keyframes introOut {
  0%   { opacity:1; transform:translateY(0) }
  100% { opacity:0; transform:translateY(-100%); pointer-events:none }
}
.intro-img-wrap {
  margin-bottom:24px;
  opacity:0; animation:introFadeUp 0.8s ease 0.2s forwards;
}
.intro-img-wrap img {
  max-height:120px; max-width:260px;
  object-fit:contain;
  display:block; margin:0 auto;
  filter:drop-shadow(0 2px 16px rgba(200,168,106,0.35));
}
.intro-img-wrap.hidden { display:none }

/* 인트로 타이틀 */
.intro-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(36px,12vw,96px);
  font-weight:600;
  color:#f0e8d8;
  letter-spacing:0.06em;
  opacity:0; animation:introFadeUp 0.8s ease 0.7s forwards;
  line-height:1.1;
}
.intro-title span { color:#c0392b } /* 강조 한자는 빨강 */

/* 인트로 부제목 */
.intro-sub {
  font-family:'IBM Plex Mono',monospace;
  font-size:13px; letter-spacing:0.35em; text-transform:uppercase;
  color:#9d8b7a; margin-top:20px;
  opacity:0; animation:introFadeUp 0.8s ease 1.0s forwards;
}
/* "클릭하여 입장" 깜빡임 */
.intro-click {
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:0.25em; text-transform:uppercase;
  color:#6a5a48; margin-top:48px;
  opacity:0; animation:introBlink 1.4s ease 1.6s infinite;
}

/* 인트로 네 모서리 장식 */
.intro-corner {
  position:absolute; width:40px; height:40px;
  border-color:#3a2e22; border-style:solid; border-width:0;
}
.intro-corner.tl { top:24px;    left:24px;  border-top-width:1px;    border-left-width:1px  }
.intro-corner.tr { top:24px;    right:24px; border-top-width:1px;    border-right-width:1px }
.intro-corner.bl { bottom:24px; left:24px;  border-bottom-width:1px; border-left-width:1px  }
.intro-corner.br { bottom:24px; right:24px; border-bottom-width:1px; border-right-width:1px }

/* 공통 등장 애니메이션 */
@keyframes introFadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes introBlink  { 0%,100%{opacity:0} 50%{opacity:1} }

/* =====================================================
  ■ 상단 헤더
===================================================== */
#header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:var(--header-h);
  background:var(--bg);
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
  transition:background 0.4s;
}
#header::after {
  content:''; position:absolute; bottom:-4px; left:0; right:0;
  height:1px; background:var(--border); opacity:0.5;
}

.logo {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:19px; color:var(--text); cursor:pointer;
  letter-spacing:0.05em; display:flex; align-items:baseline; gap:8px;
}
.logo-hanja {
  font-weight:600; font-size:19px; letter-spacing:0.06em;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-tag {
  font-family:'IBM Plex Mono',monospace;
  font-size:8px; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--text-muted);
}
.header-right { display:flex; align-items:center; gap:10px }
#headerIcons { display:flex; align-items:center; gap:6px }

.header-icon-link {
  display:flex; align-items:center; justify-content:center;
  width:34px; height:34px;
  border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text-muted); font-size:14px; text-decoration:none;
  transition:border-color var(--trans), color var(--trans);
  flex-shrink:0;
}
.header-icon-link:hover { border-color:var(--gold); color:var(--gold) }
.header-icon-link img {
  width:20px; height:20px;
  object-fit:contain;
  display:block;
}
.burger {
  width:34px; height:34px; background:none;
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
  transition:border-color var(--trans);
}
.burger:hover { border-color:var(--accent) }
.burger span { display:block; width:16px; height:1px; background:var(--text-mid); transition:all var(--trans); transform-origin:center }
.burger.open span:nth-child(1) { transform:translateY(6px) rotate(45deg) }
.burger.open span:nth-child(2) { opacity:0; transform:scaleX(0) }
.burger.open span:nth-child(3) { transform:translateY(-6px) rotate(-45deg) }

/* =====================================================
  ■ 어두운 배경 오버레이 (모바일)
===================================================== */
#overlay {
  position:fixed; inset:0; z-index:150;
  background:rgba(14,11,8,0.55);
  opacity:0; pointer-events:none; transition:opacity var(--trans);
}
#overlay.visible { opacity:1; pointer-events:all }

/* =====================================================
  ■ 왼쪽 사이드바 (목차 메뉴)
===================================================== */
#sidebar {
  position:fixed; top:0; left:0; bottom:0; z-index:200;
  width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  box-shadow:var(--shadow-lg);
  transform:translateX(-100%);
  transition:transform var(--trans);
  overflow-y:auto; display:flex; flex-direction:column;
}
#sidebar.open { transform:translateX(0) }

.sidebar-head {
  padding:20px;
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-logo {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:15px; font-weight:600; letter-spacing:0.06em;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.sidebar-close {
  width:28px; height:28px; background:none; border:none;
  color:var(--text-muted); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border-radius:var(--radius); transition:color var(--trans);
}
.sidebar-close:hover { color:var(--accent) }

.nav-section  { padding:8px 0 }
.nav-cat {
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 20px; cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text-mid);
  transition:all var(--trans); user-select:none;
  border-left:3px solid transparent;
}
.nav-cat:hover, .nav-cat.active { color:var(--text); border-left-color:var(--accent) }
.nav-cat.active { color:var(--accent) }
.nav-cat-arrow { font-size:8px; transition:transform var(--trans); color:var(--text-muted) }
.nav-cat.open .nav-cat-arrow { transform:rotate(90deg) }

.nav-sublist { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1); background:var(--surface2) }
.nav-sublist.open { max-height:2000px }

.nav-sub {
  padding:11px 20px 11px 28px; cursor:pointer;
  font-size:12.5px; font-weight:700;
  color:var(--text-mid);
  letter-spacing:0.03em;
  transition:color var(--trans), background var(--trans);
  border-left:3px solid transparent;
  border-bottom:1px solid var(--border);
  font-family:'Nanum Myeongjo',serif;
}
.nav-sub:hover { color:var(--text); background:var(--surface); border-left-color:var(--gold) }
.nav-sub.active { color:var(--accent); border-left-color:var(--accent) }

.nav-content-item {
  padding:5px 20px 5px 42px; cursor:pointer;
  font-size:11px; color:var(--text-muted);
  font-family:'Noto Serif KR',serif;
  transition:color var(--trans);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display:flex; align-items:center; gap:6px;
}
.nav-content-item:hover  { color:var(--text) }
.nav-content-item.active { color:var(--accent) }
.nav-lock-icon { font-size:9px; opacity:0.6 }

.sidebar-bottom-img-wrap {
  margin-top:auto;
  pointer-events:none;
  line-height:0;
}
.sidebar-bottom-img-wrap img {
  width:100%;
  display:block;
  object-fit:contain;
  object-position:left bottom;
}
.sidebar-divider { height:1px; background:var(--border); margin:4px 0 }

/* =====================================================
  ■ 메인 콘텐츠 영역
===================================================== */
#main {
  position:relative; z-index:1;
  margin-top:var(--header-h);
  min-height:calc(100vh - var(--header-h));
  padding:48px 24px 100px;
  max-width:780px;
  margin-left:auto; margin-right:auto;
}

/* =====================================================
  ■ 메인 랜딩 화면
===================================================== */
#landing { display:none }
#landing.active {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
  animation:fadeUp 0.7s ease both;
  position:fixed;
  inset:0;
  z-index:10;
  overflow:hidden;
}
#landing-bg {
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  z-index:-1;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
}
#landing.has-bg > *:not(#landing-bg):not(#landing-overlay-img) { position:relative; z-index:1 }

#landing-overlay-img {
  display:none;
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  z-index:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  pointer-events:none;
  animation:overlayFloat 6s ease-in-out infinite;
  filter:drop-shadow(0 3px 4px rgba(0,0,0,0.42));
}
#landing-title-img {
  display:none;
  max-width:min(1200px, 96vw);
  width:96vw;
  height:auto;
  max-height:520px;
  object-fit:contain;
  margin-top:60px;
  margin-bottom:12px;
  animation:titleFloat 4s ease-in-out infinite;
  filter:drop-shadow(0 3px 5px rgba(0,0,0,0.50));
}

.landing-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(38px,10vw,88px);
  font-weight:600; line-height:1.05; color:var(--text);
  margin-bottom:16px; letter-spacing:0.04em;
}
.landing-title em {
  color:var(--accent); display:block; font-style:normal; font-size:0.72em;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.landing-rule {
  width:80px; height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:20px auto;
}
.landing-desc {
  display:none;
  font-size:14px; color:var(--text-muted); line-height:1.9;
  max-width:360px; font-weight:300; margin-bottom:48px;
}

.cat-buttons { 
  display:flex; 
  flex-direction:column;
  align-items:center;
  gap:0px;
  margin-top:-52px;
}
.cat-btn:nth-child(1) { transform:translateX(-50px); }
.cat-btn:nth-child(2) { transform:translateX(50px);  }
.cat-btn:nth-child(3) { transform:translateX(-50px); }

.landing-animate .cat-btn:nth-child(1) { animation:btnRise1 0.7s cubic-bezier(0.22,1,0.36,1) 0.85s both, btnPulse1 3.2s ease-in-out 2s infinite; }
.landing-animate .cat-btn:nth-child(2) { animation:btnRise2 0.7s cubic-bezier(0.22,1,0.36,1) 1.05s both, btnPulse2 3.2s ease-in-out 2.6s infinite; }
.landing-animate .cat-btn:nth-child(3) { animation:btnRise3 0.7s cubic-bezier(0.22,1,0.36,1) 1.25s both, btnPulse3 3.2s ease-in-out 3.2s infinite; }

@keyframes btnPulse1 {
  0%,100% { transform:translateX(-50px) translateY(0)   scale(1);    opacity:1; }
  50%     { transform:translateX(-50px) translateY(-3px) scale(1.02); opacity:0.93; }
}
@keyframes btnPulse2 {
  0%,100% { transform:translateX(50px)  translateY(0)   scale(1);    opacity:1; }
  50%     { transform:translateX(50px)  translateY(-3px) scale(1.02); opacity:0.93; }
}
@keyframes btnPulse3 {
  0%,100% { transform:translateX(-50px) translateY(0)   scale(1);    opacity:1; }
  50%     { transform:translateX(-50px) translateY(-3px) scale(1.02); opacity:0.93; }
}
@keyframes btnRise1 {
  from { opacity:0; transform:translateX(-50px) translateY(20px); }
  to   { opacity:1; transform:translateX(-50px) translateY(0); }
}
@keyframes btnRise2 {
  from { opacity:0; transform:translateX(50px) translateY(20px); }
  to   { opacity:1; transform:translateX(50px) translateY(0); }
}
@keyframes btnRise3 {
  from { opacity:0; transform:translateX(-50px) translateY(20px); }
  to   { opacity:1; transform:translateX(-50px) translateY(0); }
}

.cat-btn {
  position:relative; overflow:hidden;
  padding:16px 40px;
  background:var(--surface);
  border:1px solid var(--c-border2);
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  font-size:13px; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text-mid);
  transition:transform var(--trans), box-shadow var(--trans);
  box-shadow:var(--shadow);
  border-radius:var(--radius);
}
.cat-btn:hover {
  box-shadow:var(--shadow);
  transform:scale(1.06);
}
.cat-btn span { position:relative; z-index:1; display:flex; align-items:center; gap:8px }
.cat-btn-num  { font-size:11px; color:var(--text-dim) }
.cat-btn:not(.has-img)::before { display:none }
.cat-btn:not(.has-img):hover::before { display:none }

.cat-btn-img {
  display:none;
  width:160px;
  height:120px;
  object-fit:contain;
  transition:transform var(--trans);
  cursor:pointer;
  pointer-events:none;
}
.cat-btn.has-img {
  padding:0;
  background:none;
  border:none;
  box-shadow:none;
  border-radius:var(--radius);
  overflow:visible;
}
.cat-btn:nth-child(1).has-img:hover { transform:translateX(-50px) scale(1.06); }
.cat-btn:nth-child(2).has-img:hover { transform:translateX(50px)  scale(1.06); }
.cat-btn:nth-child(3).has-img:hover { transform:translateX(-50px) scale(1.06); }
.cat-btn.has-img:hover .cat-btn-img { transform:scale(1.06); }
.cat-btn.has-img > span { display:none }

/* =====================================================
  ■ 카테고리 목록 페이지
===================================================== */
#catPage { display:none }
#catPage.active { display:block; animation:fadeUp 0.5s ease both }

.catpage-head {
  margin-bottom:32px; padding-bottom:20px;
  border-bottom:2px solid var(--border);
  display:flex; align-items:flex-end; justify-content:space-between;
  flex-wrap:wrap; gap:12px;
}
.catpage-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(32px,7vw,52px);
  font-weight:600; color:var(--text); line-height:1;
}
.catpage-title em { color:var(--accent); font-style:normal }

.back-btn {
  padding:9px 18px; background:none;
  border:1px solid var(--border); border-radius:var(--radius);
  font-family:'IBM Plex Mono',monospace; font-size:11px;
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--text-muted); cursor:pointer; transition:all var(--trans);
}
.back-btn:hover { border-color:var(--accent); color:var(--accent) }

.sub-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px }
.sub-tab {
  padding:8px 20px; background:none;
  border:1px solid var(--border); border-radius:2px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--text-muted); cursor:pointer; transition:all var(--trans);
}
.sub-tab:hover, .sub-tab.active { background:var(--text); border-color:var(--text); color:var(--bg) }

.content-grid { display:flex; flex-direction:column; gap:2px }

});

// UI 구성 요소 뼈대 바인딩

  } else {
    document.getElementById("introImgWrap").classList.add("hidden");
  }

  // 사이드바 하단 그래픽 처리
  const sbBotWrap = document.getElementById("sidebarBottomImgWrap");

// 왼쪽 메뉴 트리 컴포넌트 자동 빌드
function buildSidebar() {
  const navContainer = document.getElementById("sidebarNav");
  let html = '';

  Object.keys(CATEGORIES).forEach(cKey => {
    const cat = CATEGORIES[cKey];
    const postCount = POSTS.filter(p => p.cat === cKey).length;
    
    html += `
      <div class="nav-section">
        <div class="nav-cat" data-cat="${cKey}">
          <span>${cat.name} <span style="font-size:9px; opacity:0.5; margin-left:4px;">(${postCount})</span></span>
          <span class="nav-cat-arrow">&larr;</span>
        </div>
        <div class="nav-sublist" id="sublist-${cKey}">
    `;

    // 전체보기 메뉴 개설
    html += `<div class="nav-sub" data-cat="${cKey}" data-sub="all">ALL ARTICLES</div>`;

    // 매핑된 소목차 인덱스 추출 및 목록 바인딩
    Object.keys(SUB_CATEGORIES).forEach(sKey => {
      const sub = SUB_CATEGORIES[sKey];
      if(sub.cat !== cKey) return;
      
      html += `<div class="nav-sub" data-cat="${cKey}" data-sub="${sKey}">${sub.name}</div>`;
      
      // 개별 포스트 목록 추가 주입
      const subPosts = POSTS.filter(p => p.cat === cKey && p.sub === sKey);
      subPosts.forEach(p => {
        let lock = p.pw ? '<span class="nav-lock-icon">🔒</span>' : '';
        html += `<div class="nav-content-item" data-id="${p.id}">${lock}${p.title}</div>`;
      });
    });

    html += `</div></div><div class="sidebar-divider"></div>`;
  });

  navContainer.innerHTML = html;
  bindSidebarEvents();
}

/* ─────────────────────────────────────────────
   [라우터] 인터페이스 트랜지션 및 화면 전환 디스패처
───────────────────────────────────────────── */
function goView(viewName, pushHistory = true) {
  state.curView = viewName;
  
  // 전체 컴포넌트 마스킹 해제 루틴
  document.getElementById("landing").classList.remove("active");
  document.getElementById("catPage").classList.remove("active");
  document.getElementById("viewer").classList.remove("active");
  
  // 타겟 컴포넌트 뷰포트 스위칭 활성화
  document.getElementById(viewName).classList.add("active");
  closeSidebar();
  window.scrollTo(0, 0);

  // 현재 사이드바 메뉴 활성화 클래스 싱크로나이즈
  updateSidebarActiveStates();

  if(pushHistory) {
    let url = "?view=" + viewName;
    if(state.curCat) url += "&cat=" + state.curCat;
    if(state.curSub && state.curSub !== "all") url += "&sub=" + state.curSub;
    if(state.curPostId) url += "&id=" + state.curPostId;
    history.pushState(state, "", url);
  }
}

function handlePopState(e) {
  if(e.state) {
    state = e.state;
    goView(state.curView, false);
    if(state.curView === "catPage") renderCatPage(false);
    if(state.curView === "viewer") loadPost(state.curPostId, false);
  } else {
    routeByUrl();
  }
}

function routeByUrl() {
  const params = new URLSearchParams(window.location.search);
  const view = params.get("view") || "landing";
  const cat = params.get("cat");
  const sub = params.get("sub") || "all";
  const id = params.get("id");

  state.curCat = cat;
  state.curSub = sub;
  state.curPostId = id;

  if(view === "viewer" && id) {
    loadPost(id, false);
  } else if(view === "catPage" && cat) {
    renderCatPage(false);
  } else {
    goView("landing", false);
  }
}

function updateSidebarActiveStates() {
  // 카테고리 강조 리셋
  document.querySelectorAll(".nav-cat").forEach(el => {
    el.classList.toggle("active", el.dataset.cat === state.curCat);
  });
  // 서브메뉴 & 게시글 항목 강조 상태 업데이트
  document.querySelectorAll(".nav-sub").forEach(el => {
    let mCat = el.dataset.cat === state.curCat;
    let mSub = el.dataset.sub === state.curSub;
    el.classList.toggle("active", mCat && mSub);
  });
  document.querySelectorAll(".nav-content-item").forEach(el => {
    el.classList.toggle("active", el.dataset.id === state.curPostId);
  });
}

/* ─────────────────────────────────────────────
   [렌더러] 카테고리별 목록 인덱싱 뷰 컴파일
───────────────────────────────────────────── */
function renderCatPage(pushHistory = true) {
  const catInfo = CATEGORIES[state.curCat];
  if(!catInfo) return goView("landing");

  document.getElementById("catPageTitle").innerHTML = `${catInfo.name} <em>${catInfo.kor}</em>`;
  
  // 소목차 상단 탭 컴포넌트 앵커링 빌드
  const tabContainer = document.getElementById("subTabs");
  let tabHtml = `<button class="sub-tab ${state.curSub==='all'?'active':''}" data-sub="all">ALL</button>`;
  
  Object.keys(SUB_CATEGORIES).forEach(sKey => {
    const sub = SUB_CATEGORIES[sKey];
    if(sub.cat !== state.curCat) return;
    tabHtml += `<button class="sub-tab ${state.curSub===sKey?'active':''}" data-sub="${sKey}">${sub.name}</button>`;
  });
  tabContainer.innerHTML = tabHtml;

  // 필터링 규칙 기반 포스트 바인딩 컴파일 루틴
  const gridContainer = document.getElementById("contentGrid");
  let filtered = POSTS.filter(p => p.cat === state.curCat);
  
  // 단일 서브 카테고리 모드인 경우
  if(state.curSub !== "all") {
    filtered = filtered.filter(p => p.sub === state.curSub);
    gridContainer.innerHTML = buildCardListMarkup(filtered);
  } else {
    // 통합 ALL 뷰 상태일 때 소목차 레이블 세그먼트 분할 적용
    let allHtml = '';
    const validSubs = Object.keys(SUB_CATEGORIES).filter(k => SUB_CATEGORIES[k].cat === state.curCat);
    
    validSubs.forEach(sKey => {
      const subPosts = filtered.filter(p => p.sub === sKey);
      if(subPosts.length === 0) return;
      
      allHtml += `<div class="sub-section-label">${SUB_CATEGORIES[sKey].name}</div>`;
      allHtml += buildCardListMarkup(subPosts);
    });
    
    if(!allHtml) allHtml = '<div style="font-size:12px; opacity:0.4; padding:40px 4px;">등록된 게시글이 없습니다.</div>';
    gridContainer.innerHTML = allHtml;
  }

  // 카드 아이템에 이벤트 동적 위임 바인딩
  gridContainer.querySelectorAll(".content-card").forEach(card => {
    card.addEventListener("click", () => {
      loadPost(card.dataset.id);
    });
  });

  goView("catPage", pushHistory);
}

function buildCardListMarkup(postArr) {
  return postArr.map(p => {
    let lock = p.pw ? '<span class="card-lock">🔒</span>' : '';
    return `
      <div class="content-card" data-id="${p.id}">
        <div class="card-info">
          <div class="card-meta">${SUB_CATEGORIES[p.sub].name} &nbsp;&middot;&nbsp; ${p.date}</div>
          <h3 class="card-title">${p.title}</h3>
          <span class="card-author">${p.author}</span>
        </div>
        ${lock}
        <div class="card-arrow">&rarr;</div>
      </div>
    `;
  }).join('');
}

/* ─────────────────────────────────────────────
   [포스트 엔진] 상세 콘텐츠 로더 및 시큐리티 모달 가드
───────────────────────────────────────────── */
function loadPost(postId, pushHistory = true) {
  const post = POSTS.find(p => p.id === postId);
  if(!post) return;

  // 암호 잠금 유효성 검사 트래킹 가드 규칙 선언
  if(post.pw) {
    openAuthModal("인증 필요", "이 콘텐츠를 열람하려면 비밀번호를 입력해 주세요.", (inputPw) => {
      if(inputPw === post.pw) {
        closeAuthModal();
        renderPostViewer(post, pushHistory);
      } else {
        document.getElementById("modalError").innerText = "비밀번호가 일치하지 않습니다.";
      }
    });
  } else {
    renderPostViewer(post, pushHistory);
  }
}

// 뷰어 데이터 맵 렌더링 바인더
function renderPostViewer(post, pushHistory = true) {
  state.curPostId = post.id;
  state.curCat = post.cat;
  state.curSub = post.sub;

  // 카테고리 활성화 상태 전개 전이 처리
  expandSidebarCategory(post.cat);

  // 네비게이션 브레드크럼 필드 빌딩
  document.getElementById("viewerBreadcrumb").innerHTML = `
    ${CATEGORIES[post.cat].name} <span>&nbsp;&rsaquo;&nbsp;</span> ${SUB_CATEGORIES[post.sub].name}
  `;
  
  document.getElementById("viewerTitle").innerText = post.title;
  document.getElementById("viewerAuthor").innerText = post.author;
  document.getElementById("viewerSubName").innerText = SUB_CATEGORIES[post.sub].name;
  
  // 포스트 미디어 타입 배지 세팅
  const badge = document.getElementById("viewerTypeBadge");
  badge.className = `type-badge ${post.cat}`;
  badge.innerText = CATEGORIES[post.cat].name;

  // 본문 조절 제어 레이아웃 초기화
  const bodyEl = document.getElementById("viewerBody");
  const sizeCtrl = document.getElementById("fontSizeCtrl");
  bodyEl.className = `${post.cat}-body`;
  bodyEl.style.fontSize = ""; // 리셋
  sizeCtrl.style.display = "none"; // 기본적으로 숨김

  // [코어 미디어 분기 라우터]
  if(post.cat === "fiction") {
    sizeCtrl.style.display = "flex";
    bodyEl.style.fontSize = state.fontSize + "px";
    bodyEl.innerHTML = `<div style="font-size:12px; opacity:0.5;">Loading text resource...</div>`;
    
    // 비동기 텍스트 파일 데이터 패치 스트림
    fetch(post.file)
      .then(res => {
        if(!res.ok) throw new Error("네트워크 응답 규격이 올바르지 않습니다.");
        return res.text();
      })
      .then(txt => {
        renderFiction(txt);
      })
      .catch(err => {
        bodyEl.innerHTML = `<div class="fiction-error">TXT 리소스를 로드하지 못했습니다.<br>오류내역: ${err.message}</div>`;
      });
  } 
  else if(post.cat === "art") {
    let imagesHtml = '<div class="art-viewer">';
    post.images.forEach(img => {
      imagesHtml += `
        <div style="margin-bottom:40px;">
          <img src="${img.url}" alt="Artwork">
          ${img.cap ? `<div class="art-caption">${img.cap}</div>` : ''}
        </div>
      `;
    });
    imagesHtml += '</div>';
    bodyEl.innerHTML = imagesHtml;
  } 
  else if(post.cat === "video") {
    bodyEl.innerHTML = `
      <div style="max-width:640px; margin:0 auto;">
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/${post.youtube_id}" allowfullscreen></iframe>
        </div>
        ${post.desc ? `<p class="video-desc">${post.desc}</p>` : ''}
      </div>
    `;
  }

  // 하단 페이징 제어 레코드 캐싱 규칙 갱신
  buildPager(post);

  goView("viewer", pushHistory);
}

/* ─────────────────────────────────────────────
   소설 원본 데이터 렌더러 파서
   수정: 공백 라인 필터를 지우고 통째로 pre-wrap 주입 처리
───────────────────────────────────────────── */
function renderFiction(txt) {
  const bodyEl = document.getElementById('viewerBody');
  if(!bodyEl) return;

  // 1. 보안을 위한 HTML 특수문자 차단(이스케이프) 및 마크다운 스타일 인라인 토큰 변환 파싱
  let formatted = escH(txt)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/~~([^~]+)~~/g, '<del>$1</del>');

  // 2. "나 " 패턴 감지 정규 기믹 매핑 (기존 특정 들여쓰기 기능 하이재킹 호환 유지)
  let lines = formatted.split('\n');
  lines = lines.map(ln => {
    if (ln.trim().indexOf('나 ') === 0) {
      return `<span class="indent-na">${ln}</span>`;
    }
    return ln;
  });
  
  // 3. 🟢 핵심 변경: 문장을 유실시키는 p태그 루프를 돌리지 않고 전체를 단일 보존 래퍼에 통째로 꽂아 출력합니다.
  bodyEl.innerHTML = `<div class="fiction-text-wrap">${lines.join('\n')}</div>`;
}

// 하단 페이징 탐색 인덱서
function buildPager(curPost) {
  const catPosts = POSTS.filter(p => p.cat === curPost.cat);
  const idx = catPosts.findIndex(p => p.id === curPost.id);

  const prevBtn = document.getElementById("pagerPrevBtn");
  const nextBtn = document.getElementById("pagerNextBtn");
  const prevLabel = document.getElementById("pagerPrevLabel");
  const nextLabel = document.getElementById("pagerNextLabel");

  // 이전글 세팅
  if(idx > 0) {
    const prevPost = catPosts[idx - 1];
    prevBtn.disabled = false;
    prevBtn.dataset.targetId = prevPost.id;
    prevLabel.innerText = prevPost.title;
  } else {
    prevBtn.disabled = true;
    prevBtn.removeAttribute("data-target-id");
    prevLabel.innerText = "이전 글이 없습니다";
  }

  // 다음글 세팅
  if(idx < catPosts.length - 1) {
    const nextPost = catPosts[idx + 1];
    nextBtn.disabled = false;
    nextBtn.dataset.targetId = nextPost.id;
    nextLabel.innerText = nextPost.title;
  } else {
    nextBtn.disabled = true;
    nextBtn.removeAttribute("data-target-id");
    nextLabel.innerText = "다음 글이 없습니다";
  }
}

/* ─────────────────────────────────────────────
   [이벤트] 인터랙션 바인딩 및 전역 UI 컨트롤러 리스너
───────────────────────────────────────────── */
function bindGlobalEvents() {
  // 인트로 제거 클릭 리스너
  document.getElementById("intro").addEventListener("click", function() {
    this.classList.add("hidden");
    // 최초 입장 시 테마를 로컬스토리지나 시간대에 맞춰 자동 전환하고 싶다면 여기에 추가 가능합니다.
  });

  // 로고 홈 복귀 처리 링크
  document.getElementById("headerLogo").addEventListener("click", () => {
    state.curCat = null; state.curSub = "all"; state.curPostId = null;
    goView("landing");
  });

  // 카테고리 목록 뒤로가기
  document.getElementById("catPageBackBtn").addEventListener("click", () => {
    state.curCat = null; state.curSub = "all";
    goView("landing");
  });

  // 뷰어에서 카테고리 리스트 혹은 메인으로 상위 복귀
  const goBackFromViewer = () => {
    state.curPostId = null;
    if(state.curCat) renderCatPage();
    else goView("landing");
  };
  document.getElementById("viewerBackBtn").addEventListener("click", goBackFromViewer);
  document.getElementById("viewerBackBottomBtn").addEventListener("click", goBackFromViewer);

  // 상단 소목차 변경 탭 스위치 라우팅
  document.getElementById("subTabs").addEventListener("click", (e) => {
    const tab = e.target.closest(".sub-tab");
    if(!tab) return;
    state.curSub = tab.dataset.sub;
    renderCatPage();
  });

  // 상세 페이지 하단 이전글 / 다음글 핸들러
  document.getElementById("pagerPrevBtn").addEventListener("click", function() {
    if(this.dataset.targetId) loadPost(this.dataset.targetId);
  });
  document.getElementById("pagerNextBtn").addEventListener("click", function() {
    if(this.dataset.targetId) loadPost(this.dataset.targetId);
  });

  // 폰트사이즈 스케일 조절 엔진 조작
  document.getElementById("fsIncBtn").addEventListener("click", () => {
    if(state.fontSize >= 24) return;
    state.fontSize += 1.5;
    document.getElementById("viewerBody").style.fontSize = state.fontSize + "px";
  });
  document.getElementById("fsDecBtn").addEventListener("click", () => {
    if(state.fontSize <= 12) return;
    state.fontSize -= 1.5;
    document.getElementById("viewerBody").style.fontSize = state.fontSize + "px";
  });
}

// 사이드바 카테고리 폴더 아코디언 매핑
function bindSidebarEvents() {
  document.querySelectorAll(".nav-cat").forEach(catHeader => {
    catHeader.addEventListener("click", () => {
      const cKey = catHeader.dataset.cat;
      const sublist = document.getElementById(`sublist-${cKey}`);
      
      const isOpen = sublist.classList.contains("open");
      
      // 토글 메커니즘
      catHeader.classList.toggle("open", !isOpen);
      sublist.classList.toggle("open", !isOpen);
    });
  });

  // 사이드바 내부 소목차 탭 클릭 트리거
  document.querySelectorAll(".nav-sub").forEach(subBtn => {
    subBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      state.curCat = subBtn.dataset.cat;
      state.curSub = subBtn.dataset.sub;
      state.curPostId = null;
      renderCatPage();
    });
  });

  // 사이드바 개별 포스트 바로가기 앵커
  document.querySelectorAll(".nav-content-item").forEach(item => {
    item.addEventListener("click", (e) => {
      e.stopPropagation();
      loadPost(item.dataset.id);
    });
  });

  // 메인 비주얼 내부 빠른 시작 카드 버튼 라우팅 스위칭
  document.getElementById("landingCatBtns").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-cat]");
    if(!btn) return;
    state.curCat = btn.dataset.cat;
    state.curSub = "all";
    state.curPostId = null;
    renderCatPage();
  });
}

function expandSidebarCategory(cKey) {
  const catHeader = document.querySelector(`.nav-cat[data-cat="${cKey}"]`);
  const sublist = document.getElementById(`sublist-${cKey}`);
  if(catHeader && sublist) {
    catHeader.classList.add("open");
    sublist.classList.add("open");
  }
}

/* ─────────────────────────────────────────────
   사이드바 및 모달 컴포넌트 기능 제어 함수
───────────────────────────────────────────── */
const burgerBtn = document.getElementById('burgerBtn');
const sidebar   = document.getElementById('sidebar');
const overlay   = document.getElementById('overlay');

function openSidebar()  { sidebar.classList.add('open');    overlay.classList.add('visible');    burgerBtn.classList.add('open');    }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); burgerBtn.classList.remove('open'); }

burgerBtn.addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
document.getElementById('closeBtn').addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);

// 맨 위로 이동 컴포넌트 핸들링
const scrollBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', () => {
  scrollBtn.classList.toggle('visible', window.scrollY > 300);
});
scrollBtn.addEventListener('click', () => window.scrollTo({ top:0, behavior:'smooth' }));

// 암호 인증 모달창 활성 루틴
let modalConfirmCallback = null;
function openAuthModal(title, text, callback) {
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalText").innerText = text;
  document.getElementById("modalInput").value = "";
  document.getElementById("modalError").innerText = "";
  document.getElementById("modal-backdrop").classList.add("visible");
  document.getElementById("modalInput").focus();
  modalConfirmCallback = callback;
}
function closeAuthModal() {
  document.getElementById("modal-backdrop").classList.remove("visible");
  modalConfirmCallback = null;
}

document.getElementById("modalConfirmBtn").addEventListener("click", () => {
  if(modalConfirmCallback) modalConfirmCallback(document.getElementById("modalInput").value);
});
document.getElementById("modalInput").addEventListener("keydown", (e) => {
  if(e.key === "Enter" && modalConfirmCallback) modalConfirmCallback(document.getElementById("modalInput").value);
});
document.getElementById("modalCancelBtn").addEventListener("click", closeAuthModal);

// HTML 특수문자 이스케이프 유틸 함수
function escH(s) {
  if (!s && s !== 0) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
