<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛情反正日誌 — 단편 웹진</title>

<!-- =====================================================
  구글 폰트 불러오기
  - Libre Baskerville : 영문 세리프 (제목용)
  - IBM Plex Mono     : 영문 고정폭 (태그·라벨용)
  - Noto Serif KR     : 한국어 본문 폰트
  - Noto Serif SC     : 한자 타이틀 폰트
  - Hahmlet           : 게시글 제목 전용 폰트
===================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;600&family=Hahmlet:wght@300;400;500;600&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">

<style>
/* =====================================================
  ■ 색상·크기 변수 모음 (CSS 변수)
    여기서 색상을 바꾸면 사이트 전체에 반영됩니다.
    라이트 모드 기준입니다.
===================================================== */
:root {
  /* 배경 계열 — 베이지를 더 밝고 따뜻하게 올렸습니다 */
  --c-paper:   #faf6ee;   /* 전체 배경: 더 밝은 크림 베이지 */
  --c-cream:   #f3ece0;   /* 카드·패널 배경 */
  --c-tan:     #d4c9b4;
  --c-warm:    #b8a88a;
  --c-brown:   #7a5c3c;

  /* 글씨 계열 — 대비를 높여 가독성 강화 */
  --c-ink:     #1a1208;   /* 본문: 더 짙게 */
  --c-mid:     #3d2e1a;   /* 중간 강조: 더 짙게 */
  --c-muted:   #7a6548;   /* 흐린 글씨: 더 짙게 → 잘 보이게 */
  --c-dim:     #a89070;   /* 힌트 글씨: 기존보다 훨씬 밝게 */

  /* 포인트 색 */
  --c-accent:  #b02020;   /* 빨강 강조 */
  --c-gold:    #9a7010;   /* 금색 강조 */

  /* 테두리 — 조금 더 진하게 해서 구분선이 잘 보이게 */
  --c-border:  #cec0a8;
  --c-border2: #b8a080;

  /* 실제 사용 별칭 */
  --bg:        var(--c-paper);
  --surface:   #ffffff;   /* 카드는 순백 */
  --surface2:  var(--c-cream);
  --border:    var(--c-border);
  --text:      var(--c-ink);
  --text-mid:  var(--c-mid);
  --text-muted:var(--c-muted);
  --text-dim:  var(--c-dim);
  --accent:    var(--c-accent);
  --gold:      var(--c-gold);

  --sidebar-w: 280px;
  --header-h:  58px;
  --radius:    3px;
  --trans:     0.3s cubic-bezier(0.4,0,0.2,1);
  --shadow:    0 2px 12px rgba(42,31,20,0.10);
  --shadow-lg: 0 8px 40px rgba(42,31,20,0.18);
}



/* =====================================================
  ■ 기본 리셋 & body 스타일
===================================================== */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth }
body {
  font-family:'Noto Serif KR',serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  transition:background 0.4s;
  user-select:none;          /* 텍스트 드래그 선택 방지 */
  -webkit-user-select:none;
}

/* 종이 질감 그레인 오버레이 (배경 위에 살짝 깔리는 노이즈) */
body::after {
  content:'';
  position:fixed; inset:0; z-index:9998; pointer-events:none;
  opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* =====================================================
  ■ 인트로 화면 (처음 켰을 때 나오는 전체화면)
    클릭하면 사라집니다.
===================================================== */
#intro {
  position:fixed; inset:0; z-index:9000;
  background:#0e0b08;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer;
}
/* 클릭 후 위로 날아가는 퇴장 애니메이션 */
#intro.hidden {
  animation:introOut 0.9s cubic-bezier(0.7,0,0.3,1) forwards;
}
@keyframes introOut {
  0%   { opacity:1; transform:translateY(0) }
  100% { opacity:0; transform:translateY(-100%); pointer-events:none }
}
/* 인트로 이미지 슬롯
   src에 URL을 넣으면 이미지가 표시되고,
   비워두면 이미지 영역이 숨겨집니다. */
.intro-img-wrap {
  margin-bottom:24px;
  opacity:0; animation:introFadeUp 0.8s ease 0.2s forwards;
}
.intro-img-wrap img {
  max-height:120px; max-width:260px;
  object-fit:contain;
  display:block; margin:0 auto;
  filter:drop-shadow(0 2px 16px rgba(200,168,106,0.35));
}
.intro-img-wrap.hidden { display:none }

/* 인트로 타이틀 */
.intro-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(36px,12vw,96px);
  font-weight:600;
  color:#f0e8d8;
  letter-spacing:0.06em;
  opacity:0; animation:introFadeUp 0.8s ease 0.7s forwards;
  line-height:1.1;
}
.intro-title span { color:#c0392b } /* 강조 한자는 빨강 */

/* 인트로 부제목 */
.intro-sub {
  font-family:'IBM Plex Mono',monospace;
  font-size:13px; letter-spacing:0.35em; text-transform:uppercase;
  color:#9d8b7a; margin-top:20px;
  opacity:0; animation:introFadeUp 0.8s ease 1.0s forwards;
}
/* "클릭하여 입장" 깜빡임 */
.intro-click {
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:0.25em; text-transform:uppercase;
  color:#6a5a48; margin-top:48px;
  opacity:0; animation:introBlink 1.4s ease 1.6s infinite;
}

/* 인트로 네 모서리 장식 */
.intro-corner {
  position:absolute; width:40px; height:40px;
  border-color:#3a2e22; border-style:solid; border-width:0;
}
.intro-corner.tl { top:24px;    left:24px;  border-top-width:1px;    border-left-width:1px  }
.intro-corner.tr { top:24px;    right:24px; border-top-width:1px;    border-right-width:1px }
.intro-corner.bl { bottom:24px; left:24px;  border-bottom-width:1px; border-left-width:1px  }
.intro-corner.br { bottom:24px; right:24px; border-bottom-width:1px; border-right-width:1px }

/* 공통 등장 애니메이션 */
@keyframes introFadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes introBlink  { 0%,100%{opacity:0} 50%{opacity:1} }

/* =====================================================
  ■ 상단 헤더
===================================================== */
#header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:var(--header-h);
  background:var(--bg);
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
  transition:background 0.4s;
}
/* 헤더 아래 보조 선 */
#header::after {
  content:''; position:absolute; bottom:-4px; left:0; right:0;
  height:1px; background:var(--border); opacity:0.5;
}

/* 로고 (한자 타이틀) */
.logo {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:19px; color:var(--text); cursor:pointer;
  letter-spacing:0.05em; display:flex; align-items:baseline; gap:8px;
}
.logo-hanja {
  font-weight:600; font-size:19px; letter-spacing:0.06em;
  /* 빨강→금색 그라디언트 글씨 */
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-tag {
  font-family:'IBM Plex Mono',monospace;
  font-size:8px; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--text-muted);
}
.header-right { display:flex; align-items:center; gap:10px }

/* 헤더 아이콘 링크 컨테이너 */
#headerIcons { display:flex; align-items:center; gap:6px }

/* 헤더 아이콘 링크 개별 버튼
   아이콘 이미지가 없으면 텍스트·이모지가 표시됩니다. */
.header-icon-link {
  display:flex; align-items:center; justify-content:center;
  width:34px; height:34px;
  border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text-muted); font-size:14px; text-decoration:none;
  transition:border-color var(--trans), color var(--trans);
  flex-shrink:0;
}
.header-icon-link:hover { border-color:var(--gold); color:var(--gold) }
.header-icon-link img {
  width:20px; height:20px;
  object-fit:contain;
  display:block;
}
/* 햄버거 메뉴 버튼 (모바일) */
.burger {
  width:34px; height:34px; background:none;
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
  transition:border-color var(--trans);
}
.burger:hover { border-color:var(--accent) }
.burger span { display:block; width:16px; height:1px; background:var(--text-mid); transition:all var(--trans); transform-origin:center }
/* 열렸을 때 X 모양으로 변환 */
.burger.open span:nth-child(1) { transform:translateY(6px) rotate(45deg) }
.burger.open span:nth-child(2) { opacity:0; transform:scaleX(0) }
.burger.open span:nth-child(3) { transform:translateY(-6px) rotate(-45deg) }

/* =====================================================
  ■ 어두운 배경 오버레이 (모바일에서 사이드바 열릴 때)
===================================================== */
#overlay {
  position:fixed; inset:0; z-index:150;
  background:rgba(14,11,8,0.55);
  opacity:0; pointer-events:none; transition:opacity var(--trans);
}
#overlay.visible { opacity:1; pointer-events:all }

/* =====================================================
  ■ 왼쪽 사이드바 (목차 메뉴)
===================================================== */
#sidebar {
  position:fixed; top:0; left:0; bottom:0; z-index:200;
  width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  box-shadow:var(--shadow-lg);
  transform:translateX(-100%);    /* 기본: 왼쪽으로 숨김 */
  transition:transform var(--trans);
  overflow-y:auto; display:flex; flex-direction:column;
}
#sidebar.open { transform:translateX(0) }  /* 열리면 원위치 */

.sidebar-head {
  padding:20px;
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-logo {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:15px; font-weight:600; letter-spacing:0.06em;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.sidebar-close {
  width:28px; height:28px; background:none; border:none;
  color:var(--text-muted); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border-radius:var(--radius); transition:color var(--trans);
}
.sidebar-close:hover { color:var(--accent) }

/* 대메뉴 (Fiction / Art / Videos) — 글씨 더 크고 선명하게 */
.nav-section  { padding:8px 0 }
.nav-cat {
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 20px; cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text-mid);   /* 기존 text-muted → text-mid 로 더 진하게 */
  transition:all var(--trans); user-select:none;
  border-left:3px solid transparent;   /* 기존 2px → 3px */
}
.nav-cat:hover, .nav-cat.active { color:var(--text); border-left-color:var(--accent) }
.nav-cat.active { color:var(--accent) }
.nav-cat-arrow { font-size:8px; transition:transform var(--trans); color:var(--text-muted) }
.nav-cat.open .nav-cat-arrow { transform:rotate(90deg) }

/* 접혔다 펼쳐지는 서브메뉴 컨테이너 */
.nav-sublist { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1); background:var(--surface2) }
.nav-sublist.open { max-height:2000px }


/* 소목차 — 클릭 시 카테고리 페이지로 바로 이동하므로 더 눈에 띄게 */
.nav-sub {
  padding:11px 20px 11px 28px; cursor:pointer;
  font-size:12.5px; font-weight:700;
  color:var(--text-mid);
  letter-spacing:0.03em;
  transition:color var(--trans), background var(--trans);
  border-left:3px solid transparent;
  border-bottom:1px solid var(--border);
  font-family:'Nanum Myeongjo',serif;
}
.nav-sub:hover { color:var(--text); background:var(--surface); border-left-color:var(--gold) }
.nav-sub.active { color:var(--accent); border-left-color:var(--accent) }

/* 개별 게시글 항목 */
.nav-content-item {
  padding:5px 20px 5px 42px; cursor:pointer;
  font-size:11px; color:var(--text-muted);   /* 기존 text-dim → text-muted */
  font-family:'Noto Serif KR',serif;
  transition:color var(--trans);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display:flex; align-items:center; gap:6px;
}
.nav-content-item:hover  { color:var(--text) }
.nav-content-item.active { color:var(--accent) }
.nav-lock-icon { font-size:9px; opacity:0.6 }

/* 사이드바 최하단 이미지 (목차 열렸을 때만 보임) */
.sidebar-bottom-img-wrap {
  margin-top:auto;
  pointer-events:none;
  line-height:0;
}
.sidebar-bottom-img-wrap img {
  width:100%;
  display:block;
  object-fit:contain;
  object-position:left bottom;
}

.sidebar-divider { height:1px; background:var(--border); margin:4px 0 }

/* =====================================================
  ■ 메인 콘텐츠 영역
===================================================== */
#main {
  position:relative; z-index:1;
  margin-top:var(--header-h);
  min-height:calc(100vh - var(--header-h));
  padding:48px 24px 100px;
  max-width:780px;
  margin-left:auto; margin-right:auto;
}
#main::before {
  content:'';
  position:fixed; inset:0; z-index:-1;
  background-image:url("https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B0%B0%EA%B2%BD.png?raw=true");
  background-size:cover; background-position:center top; background-repeat:no-repeat;
}

/* =====================================================
  ■ 메인 랜딩 화면 (처음 진입 화면)
===================================================== */
#landing { display:none }
#landing.active {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
  animation:fadeUp 0.7s ease both;
  position:fixed;
  inset:0;
  z-index:10;
  overflow:hidden;
}

/* ─────────────────────────────────────────────
   랜딩 배경 이미지
   JS의 LANDING_BG_URL 에 이미지 URL을 넣으면 배경이 적용됩니다.
   비워두면 기본 --bg 색상 배경 그대로 표시됩니다.
   전체 화면에 꽉 차게 표시됩니다.
───────────────────────────────────────────── */
#landing-bg {
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  z-index:-1;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
}
/* 배경 이미지 활성화 시 타이틀·버튼을 z-index:1 로 */
#landing.has-bg > *:not(#landing-bg):not(#landing-overlay-img) { position:relative; z-index:1 }

/* ─────────────────────────────────────────────
   랜딩 오버레이 이미지
   배경(#landing-bg)과 완전히 겹쳐 전체 화면을 채웁니다.
   z-index:0 → 랜딩 콘텐츠(z:1) 뒤에 위치, 버튼·로고 아래
   pointer-events:none → 클릭 완전 통과
───────────────────────────────────────────── */
#landing-overlay-img {
  display:none;
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  z-index:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  pointer-events:none;
  /* 로고와 반대 위상·다른 속도로 둥둥 */
  animation:overlayFloat 6s ease-in-out infinite;  /* 기본: 부유만 */
  filter:drop-shadow(0 3px 4px rgba(0,0,0,0.42));
}

/* ─────────────────────────────────────────────
   랜딩 타이틀 이미지
   #landing-title-img 의 src 에 URL을 넣으면
   텍스트 타이틀 대신 이미지 로고가 크게 표시됩니다.
   권장 크기: 폭 1200px 이상의 투명 PNG
───────────────────────────────────────────── */
#landing-title-img {
  display:none;
  max-width:min(1320px, 98vw);
  width:98vw;
  height:auto;
  max-height:570px;
  object-fit:contain;
  margin-top:60px;
  margin-bottom:12px;
  animation:titleFloat 4s ease-in-out infinite;  /* 기본: 부유만 */
  filter:drop-shadow(0 3px 5px rgba(0,0,0,0.50)) drop-shadow(0 0 16px rgba(192,57,43,0.3));
}

/* 대형 텍스트 타이틀 */
.landing-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(48px,14vw,88px);
  font-weight:600; line-height:1.05; color:var(--text);
  margin-bottom:16px; letter-spacing:0.04em;
}
.landing-title em {
  color:var(--accent); display:block; font-style:normal; font-size:0.72em;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.landing-desc {
  display:none;                  /* 문구 숨김 */
  font-size:14px; color:var(--text-muted); line-height:1.9;
  max-width:360px; font-weight:300; margin-bottom:48px;
}

/* ─────────────────────────────────────────────
   카테고리 선택 버튼 3개
   이미지를 넣으면 이미지 자체가 버튼이 됩니다.
   이미지가 없으면 기존 텍스트 버튼으로 표시됩니다.
───────────────────────────────────────────── */
/* ─────────────────────────────────────────────
   카테고리 선택 버튼 3개
   대각선 세로 배치: Fiction(왼쪽) / Art(오른쪽) / Videos(왼쪽)
───────────────────────────────────────────── */
.cat-buttons { 
  display:flex; 
  flex-direction:column;
  align-items:center;
  gap:0px;
  margin-top:-52px;
}

/* 기본 상태: 대각선 배치 */
.cat-btn:nth-child(1) { transform:translateX(-50px); }
.cat-btn:nth-child(2) { transform:translateX(50px);  }
.cat-btn:nth-child(3) { transform:translateX(-50px); }

/* ── 등장 애니메이션: .landing-animate 클래스 부착 시 실행 ── */
.landing-animate .cat-btn:nth-child(1) { animation:btnRise1 0.7s cubic-bezier(0.22,1,0.36,1) 0.85s both, btnPulse1 3.2s ease-in-out 2s infinite; }
.landing-animate .cat-btn:nth-child(2) { animation:btnRise2 0.7s cubic-bezier(0.22,1,0.36,1) 1.05s both, btnPulse2 3.2s ease-in-out 2.6s infinite; }
.landing-animate .cat-btn:nth-child(3) { animation:btnRise3 0.7s cubic-bezier(0.22,1,0.36,1) 1.25s both, btnPulse3 3.2s ease-in-out 3.2s infinite; }

/* ── 버튼 상시 pulse (위상 다르게) ── */
@keyframes btnPulse1 {
  0%,100% { transform:translateX(-50px) translateY(0)   scale(1);    opacity:1; }
  50%     { transform:translateX(-50px) translateY(-3px) scale(1.02); opacity:0.93; }
}
@keyframes btnPulse2 {
  0%,100% { transform:translateX(50px)  translateY(0)   scale(1);    opacity:1; }
  50%     { transform:translateX(50px)  translateY(-3px) scale(1.02); opacity:0.93; }
}
@keyframes btnPulse3 {
  0%,100% { transform:translateX(-50px) translateY(0)   scale(1);    opacity:1; }
  50%     { transform:translateX(-50px) translateY(-3px) scale(1.02); opacity:0.93; }
}

@keyframes btnRise1 {
  from { opacity:0; transform:translateX(-50px) translateY(20px); }
  to   { opacity:1; transform:translateX(-50px) translateY(0); }
}
@keyframes btnRise2 {
  from { opacity:0; transform:translateX(50px) translateY(20px); }
  to   { opacity:1; transform:translateX(50px) translateY(0); }
}
@keyframes btnRise3 {
  from { opacity:0; transform:translateX(-50px) translateY(20px); }
  to   { opacity:1; transform:translateX(-50px) translateY(0); }
}

/* ── 기본 버튼 (이미지 없을 때) ── */
.cat-btn {
  position:relative; overflow:hidden;
  padding:16px 40px;
  background:var(--surface);
  border:1px solid var(--c-border2);
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  font-size:13px; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text-mid);
  transition:transform var(--trans), box-shadow var(--trans);
  box-shadow:var(--shadow);
  border-radius:var(--radius);
}
.cat-btn:hover {
  box-shadow:var(--shadow);
  transform:scale(1.06);
}
.cat-btn span { position:relative; z-index:1; display:flex; align-items:center; gap:8px }
.cat-btn-num  { font-size:11px; color:var(--text-dim) }

/* 텍스트 버튼 hover — shimmer 없음 */
.cat-btn:not(.has-img)::before { display:none }
.cat-btn:not(.has-img):hover::before { display:none }

/* ── 이미지 버튼 (이미지 있을 때) ──
   이미지 자체가 버튼이 됩니다.
   정사각형 틀이 아니라 이미지의 실제 영역을 사용합니다.
   투명부분을 제외한 이미지 크기대로 표시됩니다. */
.cat-btn-img {
  display:none;
  width:160px;
  height:120px;
  object-fit:contain;
  transition:transform var(--trans);
  cursor:pointer;
  pointer-events:none;
}

/* has-img: 버튼 껍데기를 완전히 비움 */
.cat-btn.has-img {
  padding:0;
  background:none;
  border:none;
  box-shadow:none;
  border-radius:var(--radius);
  overflow:visible;      /* 이미지가 overflow:hidden에 잘리지 않도록 */
}
/* has-img 버튼 hover — translateX 유지하며 확대 */
.cat-btn:nth-child(1).has-img:hover { transform:translateX(-50px) scale(1.06); }
.cat-btn:nth-child(2).has-img:hover { transform:translateX(50px)  scale(1.06); }
.cat-btn:nth-child(3).has-img:hover { transform:translateX(-50px) scale(1.06); }
.cat-btn.has-img:hover .cat-btn-img { transform:scale(1.06); }
/* has-img 버튼의 텍스트 span 완전히 숨김 */
.cat-btn.has-img > span { display:none }

/* =====================================================
  ■ 카테고리 목록 페이지
===================================================== */
#catPage { display:none }
#catPage.active { display:block; animation:fadeUp 0.5s ease both }

.catpage-head {
  margin-bottom:32px; padding-bottom:20px;
  border-bottom:2px solid var(--border);
  display:flex; align-items:center; justify-content:flex-start;
  flex-wrap:nowrap; gap:12px;
}
.catpage-title {
  font-family:'Noto Serif SC','Noto Serif KR',serif;
  font-size:clamp(32px,7vw,52px);
  font-weight:600; color:var(--text); line-height:1;
}
.catpage-title em { color:var(--accent); font-style:normal }
.catpage-title-img {
  max-width:min(340px, 60vw);
  height:auto;
  display:block;
}

/* 뒤로가기 버튼 — 크기 키움 */
.back-btn {
  padding:9px 18px; background:var(--surface);    /* 7px 14px → 9px 18px */
  border:1px solid var(--border); border-radius:var(--radius);
  font-family:'IBM Plex Mono',monospace; font-size:11px;   /* 9px → 11px */
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--text-muted); cursor:pointer; transition:all var(--trans);
}
.back-btn:hover { border-color:var(--accent); color:var(--accent) }

/* 소목차 탭 버튼들 — 크기 키움 */
.sub-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px }
.sub-tab {
  padding:8px 20px; background:var(--surface);    /* 6px 16px → 8px 20px */
  border:1px solid var(--border); border-radius:2px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:0.12em; text-transform:uppercase;   /* 9px → 11px */
  color:var(--text-muted); cursor:pointer; transition:all var(--trans);
}
.sub-tab:hover, .sub-tab.active { background:var(--text); border-color:var(--text); color:var(--bg) }

/* 게시글 카드 목록 */
.content-grid { display:flex; flex-direction:column; gap:2px }
.content-card {
  background:var(--surface); border:1px solid var(--border);
  padding:20px 22px; cursor:pointer;
  transition:all var(--trans);
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  position:relative; overflow:hidden;
}
/* 마우스 올리면 왼쪽에 빨간 세로선 생김 */
.content-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:0;
  background:var(--accent); transition:width var(--trans);
}
.content-card:hover::before { width:3px }
.content-card:hover { padding-left:25px; background:var(--surface2) }

.card-info   { flex:1 }
.card-meta   {
  font-family:'IBM Plex Mono',monospace; font-size:11px;
  letter-spacing:0.15em; text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:6px;
}
.card-meta-sub {
  font-size:11px; font-weight:400; letter-spacing:0.15em;
  color:var(--text-muted);
}
/* 게시글 제목 (Hahmlet 폰트) */
.card-title  {
  font-family:'Hahmlet',serif;
  font-size:17px; font-weight:400;
  color:var(--text); line-height:1.3; margin-bottom:8px;
}
/* 작가명 */
.card-author {
  font-family:'Nanum Myeongjo',serif;
  font-size:12px; color:var(--text-muted); font-style:normal;
}
.card-author::before {
  content:'by ';
  font-family:'IBM Plex Mono',monospace; font-style:normal;
  font-size:8px; letter-spacing:0.12em; color:var(--text-dim); margin-right:2px;
}
.card-lock  { font-size:13px; color:var(--text-dim); flex-shrink:0 }
.card-lock img { width:28px; height:28px; object-fit:contain; display:block }
.card-arrow { font-size:20px; color:var(--text-dim); transition:transform var(--trans),color var(--trans); flex-shrink:0 }
.content-card:hover .card-arrow { transform:translateX(4px); color:var(--accent) }

/* 전체 탭에서 소목차 구분 헤더
   — 다크모드에서도 CSS 변수가 제대로 적용되도록 인라인 스타일 대신 class 사용 */
.sub-section-label {
  padding:10px 4px 6px;
  font-family:'IBM Plex Mono',monospace; font-size:9px;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--text-muted);
  border-top:1px solid var(--border);
  margin-top:8px;
  display:flex; align-items:center; gap:6px;
}
.sub-section-label::before {
  content:'·';
  color:var(--accent);
}

/* =====================================================
  ■ 게시글 뷰어 (읽기 화면)
===================================================== */
#viewer { display:none }
#main:has(#viewer.active)::before { display:none; }
#main:has(#viewer.active) { background:#faf6ee; }
#viewer.active { display:block; animation:fadeUp 0.5s ease both; }

/* 뷰어 상단 바 (뒤로가기 + 경로 표시) */
.viewer-topbar {
  display:flex; align-items:center; gap:10px;
  margin-bottom:32px; flex-wrap:wrap;
  justify-content:flex-start;
}
.viewer-topbar .back-btn { flex-shrink:0; order:1; margin-left:auto; }
.viewer-bc {
  font-family:'IBM Plex Mono',monospace; font-size:12px;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--text-muted); flex:1;
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
}
.viewer-bc span { color:var(--text-dim) }

/* 게시글 제목 영역 */
.viewer-header {
  margin-bottom:28px; padding-bottom:22px;
  border-bottom:2px solid var(--border); position:relative;
}
/* 제목 아래 짧은 빨간 선 */
.viewer-header::before {
  content:''; position:absolute; bottom:-4px; left:0; width:60px; height:1px;
  background:var(--accent);
}
/* 게시글 제목 (Hahmlet 폰트) */
.viewer-title {
  font-family:'Hahmlet',serif;
  font-size:clamp(24px,6vw,40px);
  font-weight:500; line-height:1.2;
  color:var(--text); margin-bottom:14px;
}
.viewer-info-row {
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
/* 작가명 (뷰어용) */
.viewer-author {
  font-family:'Noto Serif KR',serif;
  font-size:15px; color:var(--text-mid); font-style:normal;
}
.viewer-author::before {
  content:'by ';
  font-family:'IBM Plex Mono',monospace; font-style:normal;
  font-size:9px; letter-spacing:0.12em; color:var(--text-muted);
}
/* 소목차 이름 배지 — 더 잘 보이게 */
.viewer-sub {
  font-family:'IBM Plex Mono',monospace; font-size:13px;   /* 11px → 13px */
  letter-spacing:0.12em; text-transform:uppercase;
  color:var(--text-mid);
  padding:3px 10px; border:1px solid var(--border); border-radius:2px;
}
/* 타입 배지 — 크기 키움 */
.type-badge {
  font-family:'IBM Plex Mono',monospace;
  display:inline-block; padding:4px 12px;   /* 3px 10px → 4px 12px */
  border-radius:2px; font-size:11px; font-weight:500;   /* 9px → 11px */
  letter-spacing:0.12em; text-transform:uppercase;
}
.type-badge.fiction { background:rgba(176,32,32,0.12);  color:#8b1515; border:1px solid rgba(176,32,32,0.40) }
.type-badge.art     { background:rgba(154,112,16,0.12); color:#7a5a00; border:1px solid rgba(154,112,16,0.40) }
.type-badge.video   { background:rgba(32,80,160,0.10);  color:#1a4a9a; border:1px solid rgba(32,80,160,0.35) }


/* =====================================================
  ■ 픽션(소설) 본문
    - 문단 사이 거리: 늘림 (margin-bottom 2.2em)
    - 줄간격: 약간 줄임 (2.1 → 1.95)
    - 들여쓰기: 줄임 (2em → 1.4em)
    - 글 위아래 공백 추가
===================================================== */
.fiction-body {
  font-family:'Noto Serif KR',serif;
  font-size:15.5px; line-height:1.95;   /* 줄간격 살짝 줄임 */
  color:var(--text); font-weight:300;
  letter-spacing:0.01em; max-width:640px;
  padding:40px 0;   /* 글 위아래 공백 */
}
.fiction-body p {
  margin-bottom:2.2em;   /* 문단 사이 거리 늘림 */
  text-indent:1.4em;     /* 들여쓰기 줄임 */
}
/* 무더기 엔터 → 추가 여백으로 표시 */
.fiction-body p.empty-line {
  text-indent:0; margin-bottom:1em; height:1em;
}
/* "나 "로 시작하는 문장은 들여쓰기 규칙 관계없이 무조건 들여쓰기
   JS에서 처리하므로 여기서는 클래스만 정의합니다 */
.indent-na {
  display:block;
  padding-left:1.4em;   /* 들여쓰기와 동일한 값 */
  text-indent:0;
}
/* txt 파일 로딩 실패 시 오류 메시지 */
.fiction-error {
  font-size:12px; color:var(--accent);
  padding:24px; border:1px solid var(--border); border-radius:var(--radius);
  font-family:'IBM Plex Mono',monospace; letter-spacing:0.08em;
  margin:20px 0;
}

/* ─────────────────────────────────────────────
   텍스트 파일 마크다운 인라인 서식 스타일
   **굵게**  →  strong
   *기울임*  →  em
   ~~취소선~~ → del
───────────────────────────────────────────── */
.fiction-body strong {
  font-weight:600;
  color:var(--text);       /* 조금 더 강조 */
}
.fiction-body em {
  font-style:italic;
  color:var(--text-mid);   /* 기울임은 약간 진한 색 */
}
.fiction-body del {
  text-decoration:line-through;
  color:var(--text-muted); /* 취소선은 흐린 색 */
  opacity:0.75;
}
/* 중첩: 굵은 기울임 */
.fiction-body strong em,
.fiction-body em strong {
  font-weight:600; font-style:italic;
}

/* =====================================================
  ■ 아트(이미지) 뷰어
===================================================== */
.art-viewer { display:flex; flex-direction:column; gap:3px }
.art-viewer img { width:100%; display:block; border-radius:2px; border:1px solid var(--border) }
.art-caption {
  margin-top:16px; font-size:12px;
  color:var(--text-muted); text-align:center;
  font-style:italic; line-height:1.6;
}

/* =====================================================
  ■ 영상(유튜브) 뷰어
===================================================== */
.video-wrapper {
  position:relative; width:100%; padding-bottom:56.25%; /* 16:9 비율 */
  background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden;
}
.video-wrapper iframe { position:absolute; inset:0; width:100%; height:100%; border:none }
.video-desc {
  margin-top:16px; font-size:13.5px; color:var(--text-muted);
  line-height:1.8; font-weight:300;
}

/* =====================================================
  ■ 이전글/다음글 버튼
===================================================== */
.viewer-pager {
  display:flex; gap:10px; justify-content:space-between;
  margin-top:48px; padding-top:24px; border-top:2px solid var(--border);
}
.pager-btn {
  flex:1; padding:13px 16px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text-muted); cursor:pointer;
  font-family:'IBM Plex Mono',monospace; font-size:11px;   /* 9px → 11px */
  letter-spacing:0.10em; text-transform:uppercase;
  transition:all var(--trans); box-shadow:var(--shadow);
  display:flex; align-items:center; gap:8px;
}
.pager-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent) }
.pager-btn:disabled { opacity:0.22; cursor:not-allowed; box-shadow:none }
.pager-btn.prev { justify-content:flex-start }
.pager-btn.next { justify-content:flex-end }
.pager-label { font-size:13px; color:var(--text); font-family:'Noto Serif KR',serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:130px }

/* 글 하단 "목록으로" 버튼 */
.viewer-back-bottom { display:flex; justify-content:center; margin-top:16px }
.viewer-back-bottom .back-btn { padding:12px 32px; font-size:11px }

/* =====================================================
  ■ 글씨 크기 조절 컨트롤
    뷰어 상단에 표시되는 A- / A+ 버튼
===================================================== */
.font-size-ctrl {
  display:flex; align-items:center; gap:4px;
  margin-left:auto;   /* 오른쪽 정렬 */
}
.font-size-ctrl span {
  font-family:'IBM Plex Mono',monospace; font-size:9px;
  letter-spacing:0.12em; color:var(--text-muted);
  padding:0 4px;
}
.fs-btn {
  width:28px; height:28px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; font-family:'IBM Plex Mono',monospace;
  font-size:11px; color:var(--text-mid);
  display:flex; align-items:center; justify-content:center;
  transition:all var(--trans); line-height:1;
}
.fs-btn:hover { border-color:var(--accent); color:var(--accent) }

/* =====================================================
  ■ 맨 위로 올라가기 버튼
    스크롤을 300px 이상 내리면 나타납니다.
    border에 --c-border2 대신 --border 사용 (다크모드 호환)
===================================================== */
#scrollTopBtn {
  position:fixed; bottom:32px; right:24px; z-index:300;
  width:40px; height:40px;
  background:var(--surface);
  border:1px solid var(--border);   /* --c-border2 → --border 로 변경 (다크모드 안전) */
  border-radius:var(--radius); cursor:pointer;
  font-family:'IBM Plex Mono',monospace; font-size:14px;
  color:var(--text-muted);
  display:none; align-items:center; justify-content:center;
  box-shadow:var(--shadow-lg); transition:all var(--trans);
}
#scrollTopBtn:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-2px) }
#scrollTopBtn.visible { display:flex }


/* =====================================================
  ■ 모달 팝업 (비밀번호 입력창, 성인 인증 등)
===================================================== */
#modal-backdrop {
  position:fixed; inset:0; z-index:8000;
  background:rgba(14,11,8,0.65);
  display:none; align-items:center; justify-content:center; padding:20px;
}
#modal-backdrop.visible { display:flex; animation:fadeIn 0.2s ease both }
.modal {
  background:var(--surface); border:2px solid var(--border);
  border-radius:var(--radius); padding:30px 26px;
  max-width:400px; width:100%; box-shadow:var(--shadow-lg);
  animation:scaleIn 0.22s ease both; position:relative;
}
/* 모달 상단 장식선 */
.modal::before {
  content:''; position:absolute; top:-1px; left:20px; right:20px; height:2px;
  background:linear-gradient(to right,var(--accent),var(--gold),var(--accent));
}
.modal-title {
  font-family:'Libre Baskerville',serif; font-size:18px;
  font-style:italic; color:var(--text); margin-bottom:14px;
}
.modal-body { font-size:13px; color:var(--text-muted); line-height:1.7; margin-bottom:18px }
.modal-body input, .modal-body textarea {
  width:100%; padding:10px 12px; margin-top:10px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius); font-size:12.5px;
  outline:none; transition:border-color var(--trans);
  color:var(--text); font-family:'Noto Serif KR',serif;
}
.modal-body input:focus, .modal-body textarea:focus { border-color:var(--gold) }
.modal-body textarea { resize:vertical; min-height:72px }
/* 비밀번호 불일치 오류 메시지
   — 다크모드에서 rgba 배경이 너무 어두워 보이지 않는 문제를 수정했습니다 */
.modal-error {
  font-size:11px; color:var(--accent); margin-top:8px;
  display:none; line-height:1.5;
  padding:8px;
  background:rgba(192,57,43,0.12);   /* 기존 0.06에서 0.12로 올려 다크모드에서도 보이게 */
  border:1px solid rgba(192,57,43,0.30);
  border-radius:var(--radius);
}
.modal-btns { display:flex; gap:8px; justify-content:flex-end; align-items:center; flex-wrap:wrap }
/* "인증하러가기" 버튼 — 왼쪽으로 밀어 분리 */
.modal-btn.link-out { margin-right:auto; color:var(--gold); border-color:var(--gold) }
.modal-btn.link-out:hover { background:rgba(154,112,16,0.08); border-color:var(--gold) }
.modal-btn {
  padding:10px 22px; border-radius:var(--radius);   /* 8px 18px → 10px 22px */
  font-family:'IBM Plex Mono',monospace; font-size:11px;   /* 9px → 11px */
  letter-spacing:0.12em; text-transform:uppercase; cursor:pointer;
  transition:all var(--trans); border:1px solid var(--border);
  color:var(--text-mid); background:none;
}
.modal-btn:hover            { border-color:var(--text-mid) }
.modal-btn.primary          { background:var(--text);   border-color:var(--text);   color:var(--bg) }
.modal-btn.primary:hover    { background:var(--accent);  border-color:var(--accent) }
.modal-btn.danger           { background:var(--accent);  border-color:var(--accent); color:#fff }
.modal-btn.danger:hover     { background:#a93226 }

/* =====================================================
  ■ 공통 애니메이션
===================================================== */
@keyframes fadeUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }
@keyframes scaleIn  { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
/* 로고 부유 — 빠르고 진폭 작음 */
@keyframes titleFloat {
  0%,100% { transform:translateY(0px) }
  50%     { transform:translateY(-10px) }
}
/* 오버레이 부유 — 느리고 진폭 큼, 반대 위상 */
@keyframes overlayFloat {
  0%,100% { transform:translateY(-8px) }
  50%     { transform:translateY(8px) }
}
/* 랜딩 등장 — 배경 페이드인 */
@keyframes landingBgIn {
  from { opacity:0 }
  to   { opacity:1 }
}
/* 랜딩 등장 — 로고 위에서 내려오며 페이드인 */
@keyframes logoDropIn {
  from { opacity:0; transform:translateY(-28px) }
  to   { opacity:1; transform:translateY(0) }
}
/* 랜딩 로고 — 화려한 등장(회전+확대), 1회만 실행 */
@keyframes logoGrandEntrance {
  0%   { opacity:0; transform:scale(0.3) rotate(-25deg); filter:drop-shadow(0 3px 5px rgba(0,0,0,0.50)) drop-shadow(0 0 16px rgba(192,57,43,0.3)); }
  40%  { opacity:1; transform:scale(1.15) rotate(8deg); filter:drop-shadow(0 8px 14px rgba(0,0,0,0.35)) drop-shadow(0 0 16px rgba(192,57,43,0.3)); }
  60%  { transform:scale(0.96) rotate(-3deg); filter:drop-shadow(0 6px 10px rgba(0,0,0,0.40)) drop-shadow(0 0 16px rgba(192,57,43,0.3)); }
  80%  { transform:scale(1.04) rotate(1deg); filter:drop-shadow(0 4px 8px rgba(0,0,0,0.45)) drop-shadow(0 0 16px rgba(192,57,43,0.3)); }
  100% { opacity:1; transform:scale(1) rotate(0deg); filter:drop-shadow(0 3px 5px rgba(0,0,0,0.50)) drop-shadow(0 0 16px rgba(192,57,43,0.3)); }
}
/* 랜딩 등장 — 버튼 아래서 올라오며 페이드인 */
@keyframes btnRiseIn {
  from { opacity:0; transform:translateY(22px) }
  to   { opacity:1; transform:translateY(0) }
}
/* 랜딩 타이틀 — 화려한 등장: 블러+확대에서 골드 글로우와 함께 안착 */
@keyframes titleGrandEntrance {
  0%   { opacity:0; transform:translateY(-24px) scale(0.9); filter:blur(8px); text-shadow:0 0 0px rgba(200,168,106,0); letter-spacing:0.3em; }
  50%  { opacity:1; transform:translateY(4px) scale(1.05); filter:blur(0px); text-shadow:0 0 32px rgba(200,168,106,0.65); letter-spacing:0.02em; }
  75%  { transform:translateY(-2px) scale(1.0); text-shadow:0 0 16px rgba(200,168,106,0.4); }
  100% { opacity:1; transform:translateY(0) scale(1); text-shadow:0 2px 20px rgba(200,168,106,0.25); letter-spacing:0.04em; }
}
/* 버튼 개별 stagger — translateX를 건드리지 않고 opacity+Y만 */
@keyframes btnFadeRise {
  from { opacity:0; transform:translateY(20px) }
  to   { opacity:1; transform:translateY(0) }
}

/* =====================================================
  ■ 동적 효과 — 전체 사이트 생동감
===================================================== */


/* ── 로고 shimmer (헤더 한자 타이틀) ──
   마우스를 올리면 빛이 스쳐지나갑니다. */
.logo:hover .logo-hanja {
  background:linear-gradient(
    120deg,
    var(--accent) 0%,
    var(--gold) 40%,
    #f0d090 55%,
    var(--gold) 70%,
    var(--accent) 100%
  );
  background-size:200% auto;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:shimmerText 1.4s linear infinite;
}
@keyframes shimmerText {
  0%   { background-position:200% center }
  100% { background-position:-200% center }
}

/* ── 콘텐츠 카드 등장 애니메이션 ──
   카드가 아래에서 위로 페이드인됩니다. */
.content-card {
  animation:cardIn 0.4s ease both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(10px) }
  to   { opacity:1; transform:translateY(0) }
}
/* 순서대로 늦게 등장 (nth-child로 stagger) */
.content-card:nth-child(1)  { animation-delay:0.04s }
.content-card:nth-child(2)  { animation-delay:0.08s }
.content-card:nth-child(3)  { animation-delay:0.12s }
.content-card:nth-child(4)  { animation-delay:0.16s }
.content-card:nth-child(5)  { animation-delay:0.20s }
.content-card:nth-child(6)  { animation-delay:0.24s }
.content-card:nth-child(7)  { animation-delay:0.28s }
.content-card:nth-child(8)  { animation-delay:0.32s }

/* ── 뷰어 타이틀 shimmer 장식선 ──
   제목 아래 짧은 빨간 선이 로딩될 때 왼쪽에서 늘어납니다. */
.viewer-header::before {
  animation:lineGrow 0.6s cubic-bezier(0.4,0,0.2,1) both;
}
@keyframes lineGrow {
  from { width:0; opacity:0 }
  to   { width:60px; opacity:1 }
}

/* ── 네비게이션 항목 hover glow ──
   사이드바 소목차에 마우스 올리면 글씨에 은은한 광채 */
.nav-sub:hover {
  text-shadow:0 0 12px rgba(154,112,16,0.35);
}
.nav-cat.active {
  text-shadow:0 0 16px rgba(176,32,32,0.25);
}

/* ── 맨 위로 버튼 pulse ──
   처음 나타날 때 pulse 효과 */
#scrollTopBtn.visible {
  animation:btnPulse 0.4s ease both;
}
@keyframes btnPulse {
  0%   { transform:scale(0.7); opacity:0 }
  70%  { transform:scale(1.12) }
  100% { transform:scale(1); opacity:1 }
}

/* ── 모달 등장 강화 ── */
.modal { animation:modalIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both }
@keyframes modalIn {
  from { opacity:0; transform:scale(0.88) translateY(16px) }
  to   { opacity:1; transform:scale(1) translateY(0) }
}



/* ── 헤더 아이콘 링크 hover spin (이미지 아이콘) ── */
.header-icon-link:hover img {
  animation:iconSpin 0.4s ease;
}
@keyframes iconSpin {
  0%   { transform:rotate(0deg) scale(1) }
  40%  { transform:rotate(-12deg) scale(1.15) }
  100% { transform:rotate(0deg) scale(1) }
}

/* ── sub-tab 활성화 시 슬라이드인 ── */
.sub-tab.active {
  animation:tabPop 0.22s cubic-bezier(0.34,1.4,0.64,1) both;
}
@keyframes tabPop {
  from { transform:scale(0.9); opacity:0.6 }
  to   { transform:scale(1); opacity:1 }
}

/* ── 섹션 페이지 전환 시 더 부드럽게 ── */
#catPage.active  { animation:fadeUp 0.45s cubic-bezier(0.4,0,0.2,1) both }
#viewer.active   { animation:fadeUp 0.45s cubic-bezier(0.4,0,0.2,1) both }

/* ── 사이드바 항목 stagger ── */
.nav-cat { transition:color var(--trans), border-color var(--trans), text-shadow var(--trans) }

/* ── 랜딩 등장 애니메이션: .landing-animate 부착 시 실행 ── */
#landing.landing-animate #landing-bg          { animation:landingBgIn 1.0s ease both; }
#landing.landing-animate #landing-overlay-img { animation:overlayFloat 6s ease-in-out 1.0s infinite, landingBgIn 1.0s ease both; }
#landing.landing-animate #landing-title-img   { animation:logoGrandEntrance 1.8s cubic-bezier(0.22,1,0.36,1) 0.2s 1 both; }
#landing.landing-animate .landing-title-img-wrap { animation:titleFloat 4s ease-in-out 2s infinite; }
#landing.landing-animate #landing-title-text  { animation:titleGrandEntrance 1.3s cubic-bezier(.22,1,.36,1) 0.2s both, titleFloat 4s ease-in-out 1.5s infinite; }
#landing.landing-animate .landing-desc        { animation:fadeUp 0.8s ease 0.7s both; }
/* ── 카테고리 버튼: 개별 stagger는 nth-child에서 처리 ── */

/* =====================================================
  ■ 스크롤바 커스텀
===================================================== */
::-webkit-scrollbar            { width:5px }
::-webkit-scrollbar-track      { background:var(--bg) }
::-webkit-scrollbar-thumb      { background:var(--border); border-radius:2px }
::-webkit-scrollbar-thumb:hover{ background:var(--text-dim) }

@media(min-width:900px) {
  #sidebar { transform:translateX(0) }
  #main    { margin-left:var(--sidebar-w); max-width:calc(720px + var(--sidebar-w)); padding:56px 52px 100px }
  .burger  { display:none }
  #overlay { display:none }
  #header  { padding-left:calc(var(--sidebar-w) + 24px) }
}
</style>
</head>
<body>

<!-- =====================================================
  인트로 화면
===================================================== -->
<div id="intro" onclick="dismissIntro()">
  <div class="intro-corner tl"></div>
  <div class="intro-corner tr"></div>
  <div class="intro-corner bl"></div>
  <div class="intro-corner br"></div>

  <!--
    ★★★ 링크 삽입 ★★★ 인트로 화면 이미지
    src="" 따옴표 안에 이미지 URL을 넣으면 인트로 화면에 이미지가 표시됩니다.
    비워두면 이미지 영역이 숨겨집니다.
    예) src="https://raw.githubusercontent.com/내이름/webzine/main/intro.png"
  -->
  <div class="intro-img-wrap" id="introImgWrap">
    <img id="introImg" src="" alt="">
  </div>

  <h1 class="intro-title">愛情<span>反正</span>日誌</h1>
  <p class="intro-sub">애정반정일지 · 단편 웹진</p>
  <p class="intro-click">— 클릭하여 입장 —</p>
</div>

<div id="overlay"></div>

<!-- =====================================================
  상단 헤더
  ★ 헤더 아이콘 링크 추가 방법:
    아래 HEADER_ICONS 배열에 { icon:"이미지URL", href:"링크URL", title:"툴팁" } 형태로
    원하는 만큼 추가하세요. (JS 설정 섹션 참고)
    이미지 없이 텍스트만 쓸 경우 text:"문자" 필드를 사용합니다.
===================================================== -->
<header id="header">
  <div class="logo" onclick="goLanding()">
    <!--
      헤더 로고: 텍스트 로고만 표시합니다.
      웹진 로고 이미지는 랜딩 타이틀에 표시됩니다.
    -->
    <span id="logo-text-fallback">
      <span class="logo-hanja">愛情反正日誌</span>
      <span class="logo-tag">Webzine</span>
    </span>
  </div>
  <div class="header-right">
    <!--
      ★ 헤더 아이콘 링크 슬롯 — JS의 HEADER_ICONS 에서 관리됩니다.
         buildHeaderIcons() 가 자동으로 이 영역을 채워줍니다.
    -->
    <div id="headerIcons"></div>
    <button class="burger" id="burgerBtn">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- =====================================================
  왼쪽 사이드바 (목차 메뉴)
  buildNav() 함수가 JS에서 자동으로 내용을 채워줍니다.
===================================================== -->
<nav id="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-logo">愛情反正日誌</div>
    <button class="sidebar-close" id="closeBtn">✕</button>
  </div>
  <div class="nav-section" id="navMenu"></div>
  <div class="sidebar-bottom-img-wrap">
    <img src="https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%ED%8E%98%EB%9F%BF.png?raw=true" alt="">
  </div>
</nav>

<!-- =====================================================
  메인 콘텐츠 영역
===================================================== -->
<main id="main">

  <!-- 랜딩 화면: 처음 진입 시 보이는 화면 -->
  <section id="landing" class="active">

    <!-- 랜딩 배경 이미지 레이어 (JS의 LANDING_BG_URL 에서 제어) -->
    <div id="landing-bg"></div>

    <!--
      ★★★ 링크 삽입 ★★★ 랜딩 오버레이 이미지
      배경 이미지와 완전히 겹쳐 전체 화면을 채웁니다.
      position:fixed + z-index로 타이틀·버튼 뒤에 고정됩니다.
      pointer-events:none → 클릭 완전 통과
      권장 크기: 폭 1000px 이상의 투명 PNG
    -->
    <img id="landing-overlay-img"
      src="https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%ED%8C%8C%ED%8B%B0%ED%81%B4.png?raw=true"
      alt="">

    <!--
      ★★★ 링크 삽입 ★★★ 랜딩 타이틀 이미지 (크게 표시)
      src="" 따옴표 안에 이미지 URL을 넣으면 텍스트 타이틀 대신 이미지 로고가 크게 표시됩니다.
      비워두면 아래 텍스트 타이틀(愛情反正日誌)이 그대로 보입니다.
      권장 크기: 폭 800px 이상의 투명 PNG
      예) src="https://raw.githubusercontent.com/내이름/webzine/main/title-logo.png"
    -->
    <div class="landing-title-img-wrap">
      <img id="landing-title-img" src="https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%A1%9C%EA%B3%A0.png?raw=true" alt="愛情反正日誌">
    </div>
    <!--
      ▼ 텍스트 타이틀 (이미지 없을 때 표시)
        이미지를 넣으면 자동으로 숨겨집니다.
    -->
    <h1 class="landing-title" id="landing-title-text">愛情反正日誌</h1>

    <p class="landing-desc">단편 픽션, 아트, 영상을 담은 독립 웹진.<br>한 편씩, 천천히.</p>

    <!--
      ★★★ 링크 삽입 ★★★ 메인 카테고리 버튼 이미지
      각 버튼의 src="" 따옴표 안에 이미지 URL을 넣으면 이미지 버튼으로 바뀝니다.
      이미지는 정사각형(180×180px 내외) 권장. 비워두면 텍스트 버튼 그대로 표시됩니다.
      예) src="https://raw.githubusercontent.com/내이름/webzine/main/btn-fiction.jpg"
    -->
    <div class="cat-buttons">
      <button class="cat-btn" onclick="goCategory('Fiction')">
        <!-- ★ Fiction 버튼 이미지 → src="" 안에 URL 입력 -->
        <img class="cat-btn-img" src="https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B2%84%ED%8A%BC-%ED%94%BD%EC%85%98.png?raw=true" alt="Fiction">
        <span>
          <span class="cat-btn-text"><span class="cat-btn-num">01</span> Fiction</span>
        </span>
      </button>
      <button class="cat-btn" onclick="goCategory('Art')">
        <!-- ★ Art 버튼 이미지 → src="" 안에 URL 입력 -->
        <img class="cat-btn-img" src="https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B2%84%ED%8A%BC-%EC%95%84%ED%8A%B8.png?raw=true" alt="Art">
        <span>
          <span class="cat-btn-text"><span class="cat-btn-num">02</span> Art</span>
        </span>
      </button>
      <button class="cat-btn" onclick="goCategory('Videos')">
        <!-- ★ Videos 버튼 이미지 → src="" 안에 URL 입력 -->
        <img class="cat-btn-img" src="https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%B2%84%ED%8A%BC-%EB%B9%84%EB%94%94%EC%98%A4.png?raw=true" alt="Videos">
        <span>
          <span class="cat-btn-text"><span class="cat-btn-num">03</span> Videos</span>
        </span>
      </button>
    </div>
  </section>

  <!-- 카테고리 목록 페이지 -->
  <section id="catPage">
    <div class="catpage-head">
      <h2 class="catpage-title" id="catPageTitle"></h2>
      <button class="back-btn" onclick="goLanding()">← Back</button>

    <div class="sub-tabs" id="subTabs"></div>
    <div class="content-grid" id="contentGrid"></div>

  모달 팝업 (비밀번호 입력·성인인증·오류 알림)

<script>
/* =====================================================
  ■ 비밀번호 설정
  ─────────────────────────────────────────────────────
  ADULT_PW : 성인 게시글 접근 비밀번호
    → 수정법: 따옴표 안의 값만 바꾸세요. 예) '9999'

  ADULT_LINK : 성인 인증 외부 링크 (모달 내 "인증하러가기" 버튼)
    → 연결할 URL을 넣으세요.
    → 비워두면('') 버튼이 숨겨집니다.

  MASTER_KEY : 댓글 강제 삭제·수정 마스터키 (현재 댓글 기능 미사용)
===================================================== */
const ADULT_PW   = '1234';
/* ★★★ 링크 삽입 ★★★
   성인 인증 페이지 URL
   모달의 "인증하러가기" 버튼을 클릭하면 이 주소로 이동합니다.
   비워두면('') 버튼이 표시되지 않습니다.
   예) const ADULT_LINK = 'https://www.example.com/age-verify';
*/
const ADULT_LINK = '';        /* ← 여기에 성인 인증 페이지 URL 입력 */
const MASTER_KEY = 'admin0000';

/* =====================================================
  ■ 콘텐츠 데이터 (★ 가장 자주 수정하는 곳 ★)
  ─────────────────────────────────────────────────────
  이 contentData 객체 하나가 사이트의 모든 콘텐츠를 관리합니다.

  ┌ 전체 구조
  │  대메뉴 > 소목차 > [게시글 배열]

  ┌ 게시글 공통 필드

===================================================== */
const HEADER_ICONS = [

/* =====================================================

    HEADER_ICONS 배열을 읽어 #headerIcons 영역에 링크를 만듭니다.
===================================================== */
function buildHeaderIcons() {
  const container = document.getElementById('headerIcons');
  if (!container || !HEADER_ICONS.length) return;
  HEADER_ICONS.forEach(item => {
    const a = document.createElement('a');
    a.className = 'header-icon-link';
    a.href      = item.href || '#';
    if (item.blank) a.target = '_blank';
    if (item.title) a.title  = item.title;
    if (item.icon) {
      /* 이미지 아이콘 */
      const img = document.createElement('img');
      img.src = item.icon; img.alt = item.title || '';
      a.appendChild(img);
    } else {
      /* 텍스트/이모지 아이콘 */
      a.textContent = item.text || '';
    }
    container.appendChild(a);
  });
}

/* =====================================================
  ■ 사이드바 네비게이션 자동 생성

    - 게시글 클릭: 해당 게시글 바로 열기
===================================================== */
function buildNav() {
  const container = document.getElementById('navMenu');
  container.innerHTML = '';

  /* ── 전체 목차 섹션 ──
     모든 대메뉴의 게시글을 펼쳐서 개별 항목으로 나열합니다.
     "전체 목차" 헤더 아래에 모든 게시글이 보입니다. */
  const allCatEl = document.createElement('div');
  allCatEl.className = 'nav-cat';
  allCatEl.innerHTML = `전체 목차 <span class="nav-cat-arrow">▶</span>`;

  const allListEl = document.createElement('div');
  allListEl.className = 'nav-sublist';

  for (const [cat, subs] of Object.entries(contentData)) {
    /* 대메뉴 구분 레이블 (예: — Fiction —) */
    const catLabel = document.createElement('div');
    catLabel.style.cssText = `
      padding:8px 20px 4px 20px;
      font-family:'IBM Plex Mono',monospace;font-size:9px;
      letter-spacing:0.2em;text-transform:uppercase;
      color:var(--accent);opacity:0.8;
      border-top:1px solid var(--border);margin-top:4px;
    `;
    catLabel.textContent = '— ' + cat + ' —';
    allListEl.appendChild(catLabel);

    for (const [sub, items] of Object.entries(subs)) {
      items.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'nav-content-item';
        el.dataset.cat = cat; el.dataset.sub = sub; el.dataset.idx = idx;
        el.title = item.title;
        if (item.adult) el.innerHTML = `<span class="nav-lock-icon">🔒</span>${escH(item.title)}`;
        else            el.textContent = item.title;
        el.addEventListener('click', e => {
          e.stopPropagation();
          attemptLoad(cat, sub, idx);
          closeSidebar();
        });
        allListEl.appendChild(el);
      });
    }
  }

  /* 전체 목차 클릭: 펼치기/닫기 */
  allCatEl.addEventListener('click', () => {
    const open = allListEl.classList.contains('open');
    document.querySelectorAll('.nav-cat').forEach(el => el.classList.remove('open','active'));
    document.querySelectorAll('#navMenu > .nav-sublist').forEach(el => el.classList.remove('open'));
    if (!open) { 
      allCatEl.classList.add('open','active'); 
      allListEl.classList.add('open'); 
    }
  });

  container.appendChild(allCatEl);
  container.appendChild(allListEl);


  const hrAll = document.createElement('div');
  hrAll.className = 'sidebar-divider';
  container.appendChild(hrAll);

  /* ── 대메뉴별 목차 ── */
  for (const [cat, subs] of Object.entries(contentData)) {

    const catEl = document.createElement('div');
    catEl.className = 'nav-cat';
    catEl.dataset.cat = cat;
    catEl.innerHTML = `${cat} <span class="nav-cat-arrow">▶</span>`;

    const subListEl = document.createElement('div');
    subListEl.className = 'nav-sublist';

    for (const [sub, items] of Object.entries(subs)) {

      /* 소목차 — 클릭 시 해당 소목차 탭이 선택된 카테고리 페이지로 이동 */
      const subEl = document.createElement('div');
      subEl.className = 'nav-sub';
      subEl.textContent = sub;
      subEl.addEventListener('click', e => {
        e.stopPropagation();
        goCategory(cat, sub);
        closeSidebar();
      });

      const itemListEl = document.createElement('div');
      itemListEl.className = 'nav-sublist';

      items.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'nav-content-item';
        el.dataset.cat = cat; el.dataset.sub = sub; el.dataset.idx = idx;
        el.title = item.title;
        if (item.adult) el.innerHTML = `<span class="nav-lock-icon">🔒</span>${escH(item.title)}`;
        else            el.textContent = item.title;
        el.addEventListener('click', e => {
          e.stopPropagation();
          attemptLoad(cat, sub, idx);
          closeSidebar();
        });
        itemListEl.appendChild(el);
      });

      subListEl.appendChild(subEl);
      subListEl.appendChild(itemListEl);
    }

    catEl.addEventListener('click', () => {
      const open = subListEl.classList.contains('open');
      document.querySelectorAll('.nav-cat').forEach(el => el.classList.remove('open','active'));
      document.querySelectorAll('#navMenu > .nav-sublist').forEach(el => el.classList.remove('open'));
      if (!open) {
        catEl.classList.add('open','active');
        subListEl.classList.add('open');
      }
    });

    container.appendChild(catEl);
    container.appendChild(subListEl);

    const hr = document.createElement('div');
    hr.className = 'sidebar-divider';
    container.appendChild(hr);
  }
}

    Art: 'https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%9E%9C%EC%84%AC%EB%85%B8%ED%8A%B8-%EC%95%84%ED%8A%B8.png?raw=true',
    Videos: 'https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EB%9E%9C%EC%84%AC%EB%85%B8%ED%8A%B8-%EB%B9%84%EB%94%94%EC%98%A4.png?raw=true'
  };
  document.getElementById('catPageTitle').innerHTML = `<img class="catpage-title-img" src="${logos[cat]||''}" alt="${cat}">`;

  const subs   = Object.keys(contentData[cat]);
  const tabsEl = document.getElementById('subTabs');
  tabsEl.innerHTML = '';

  /* 전체 탭 */
  const allBtn = document.createElement('button');
  allBtn.className = 'sub-tab' + (!defaultSub ? ' active' : '');
  allBtn.textContent = '전체';
  allBtn.addEventListener('click', () => {
    document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    renderGridAll(cat);
  });
  tabsEl.appendChild(allBtn);

  /* 소목차별 탭 */
  subs.forEach(sub => {
    const btn = document.createElement('button');
    btn.className = 'sub-tab' + (sub === defaultSub ? ' active' : '');
    btn.textContent = sub;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid(cat, sub);
    });
    tabsEl.appendChild(btn);
  });

  /* 사이드바 소목차 클릭 시 → 해당 소목차 탭 선택 상태로 시작 */
  if (defaultSub) renderGrid(cat, defaultSub);
  else            renderGridAll(cat);

  window.scrollTo({ top:0, behavior:'smooth' });
  navHighlight(cat, null, null);
}

/* =====================================================
  ■ 카드 만들기 (공통 헬퍼)
===================================================== */
function makeCard(item, cat, sub, idx) {
  const card = document.createElement('div');
  card.className = 'content-card';
  card.innerHTML = `
    <div class="card-info">
      <div class="card-meta">
        ${escH(cat)}&nbsp;·&nbsp;<span class="card-meta-sub">${escH(sub)}</span>
        ${item.adult ? '<span style="color:var(--accent)">· 성인</span>' : ''}
      </div>
      <div class="card-title">${escH(item.title)}</div>
      <div class="card-author">${escH(item.author || 'Anonymous')}</div>
    </div>
    ${item.adult ? '<div class="card-lock"><img src="https://github.com/htopwebzine/htopwebzine/blob/main/%EC%82%AC%EC%A7%84/%EC%9B%B9%EC%A7%84%EC%9E%90%EB%AC%BC%EC%87%A0.png?raw=true" alt="잠금"></div>' : ''}
    <div class="card-arrow">→</div>
  `;
  card.addEventListener('click', () => attemptLoad(cat, sub, idx));
  return card;
}

/* 전체 탭 렌더링 */
function renderGridAll(cat) {
  currentSub = null;
  const grid = document.getElementById('contentGrid');
  grid.innerHTML = '';
  Object.entries(contentData[cat]).forEach(([sub, items]) => {
    const hdr = document.createElement('div');
    hdr.className = 'sub-section-label';
    hdr.textContent = sub;
    grid.appendChild(hdr);
    items.forEach((item, idx) => grid.appendChild(makeCard(item, cat, sub, idx)));
  });
}

/* 소목차 탭 렌더링 */
function renderGrid(cat, sub) {
  currentSub = sub;
  const grid = document.getElementById('contentGrid');
  grid.innerHTML = '';
  (contentData[cat][sub] || []).forEach((item, idx) =>
    grid.appendChild(makeCard(item, cat, sub, idx))
  );
}

/* =====================================================
  ■ 성인 게시글 접근 확인
===================================================== */
function attemptLoad(cat, sub, idx) {
  const item = contentData[cat][sub][idx];
  if (item.adult && !adultUnlocked) {
    /*
      성인 인증 모달
      비밀번호 입력 + "인증하러가기" 버튼 (ADULT_LINK 있을 때만 표시)
      "인증하러가기"는 취소·확인 버튼과 같은 가로선에 배치됩니다.
    */
    openModal('성인 인증', `
      <div>이 콘텐츠는 성인 전용입니다.<br>접근 비밀번호를 입력해 주세요.</div>
      <input type="text" id="modalPwInput" placeholder="비밀번호" autocomplete="off">
    `, [
      /* ADULT_LINK 가 있을 때만 "인증하러가기" 버튼 표시 */
      ...(ADULT_LINK ? [{
        label:'인증하러가기 →', cls:'link-out',
        action: () => { window.open(ADULT_LINK, '_blank') }
      }] : []),
      { label:'취소', cls:'',        action: closeModal },
      { label:'확인', cls:'primary', action: () => {
        const pw = document.getElementById('modalPwInput').value;
        if (pw === ADULT_PW) {
          adultUnlocked = true;
          closeModal();
          loadContent(cat, sub, idx);
        } else {
          const e = document.getElementById('modalError');
          e.style.display = 'block';
          e.textContent = '비밀번호가 올바르지 않습니다.';
        }
      }}
    ]);
  } else {
    loadContent(cat, sub, idx);
  }
}

/* =====================================================
  ■ 게시글 뷰어 로딩
===================================================== */
async function loadContent(cat, sub, idx) {
  hideAll(); show('viewer');
  currentCat = cat; currentSub = sub; currentIdx = idx;

  const item = contentData[cat][sub][idx];

  /* 이전/다음 계산 */
  const fi   = flatList.findIndex(f => f.cat===cat && f.sub===sub && f.idx===idx);
  const prev = fi > 0                   ? flatList[fi-1] : null;
  const next = fi < flatList.length - 1 ? flatList[fi+1] : null;

  document.getElementById('viewerBc').innerHTML = `${cat} <span>›</span> ${sub}`;
  document.getElementById('viewerBackBtn').onclick = () => goCategory(cat);

  /* 이전/다음 버튼 */
  const pagerHTML = `
    <div class="viewer-pager">
      <button class="pager-btn prev"
        ${!prev ? 'disabled' : ''}
        ${prev ? `onclick="attemptLoad('${prev.cat}','${prev.sub}',${prev.idx})"` : ''}>
        ← <span class="pager-label">${prev ? escH(prev.item.title) : '처음'}</span>
      </button>
      <button class="pager-btn next"
        ${!next ? 'disabled' : ''}
        ${next ? `onclick="attemptLoad('${next.cat}','${next.sub}',${next.idx})"` : ''}>
        <span class="pager-label">${next ? escH(next.item.title) : '마지막'}</span> →
      </button>
    </div>
    <div class="viewer-back-bottom">
      <button class="back-btn" onclick="goCategory('${cat}')">← 목록으로</button>
    </div>
  `;

  document.getElementById('viewerInner').innerHTML = `
    <div class="viewer-header">
      <h1 class="viewer-title">${escH(item.title)}</h1>
      <div class="viewer-info-row">
        <span class="viewer-sub">${escH(sub)}</span>
        <span class="viewer-author">${escH(item.author || 'Anonymous')}</span>
        <span class="type-badge ${item.type}" style="display:none;">${item.type.toUpperCase()}</span>
        ${item.type === 'fiction' ? `
          <div class="font-size-ctrl" title="글씨 크기 조절">
            <button class="fs-btn" onclick="changeFontSize(-1)">A−</button>
            <span id="fsSizeLabel">${currentFontSize}px</span>
            <button class="fs-btn" onclick="changeFontSize(1)">A+</button>
          </div>` : ''}
      </div>
    </div>
    <div id="contentBody" style="padding:24px 0 32px">${await renderBody(item)}</div>
    ${pagerHTML}
  `;

  /* 글씨 크기 현재 설정값 적용 */
  applyFontSize();
  navHighlight(cat, sub, idx);
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* =====================================================
  ■ 글씨 크기 조절
    A- : 1px 줄이기  /  A+ : 1px 키우기
    최솟값 13px, 최댓값 22px
===================================================== */
function changeFontSize(dir) {
  currentFontSize = Math.min(FONT_MAX, Math.max(FONT_MIN, currentFontSize + dir * FONT_STEP));
  applyFontSize();
}
function applyFontSize() {
  const body = document.querySelector('.fiction-body');
  if (body) body.style.fontSize = currentFontSize + 'px';
  const label = document.getElementById('fsSizeLabel');
  if (label) label.textContent = currentFontSize + 'px';
}

/* =====================================================
  ■ 본문 렌더링
===================================================== */

/*
  ─────────────────────────────────────────────────────
  ■ 텍스트 파일 마크다운 인라인 파싱
  ─────────────────────────────────────────────────────
  텍스트 파일(.txt) 내의 마크다운 서식을 HTML로 변환합니다.
  지원 문법:
    **텍스트**   → <strong> (굵게)
    *텍스트*     → <em>     (기울임)
    ~~텍스트~~   → <del>    (취소선)
    위 세 가지를 중첩해서 사용할 수 있습니다.
    예) **_굵은 기울임_**  →  <strong><em>굵은 기울임</em></strong>
  ─────────────────────────────────────────────────────
  엔터 처리:
    엔터 한 번(\n)  → 줄바꿈 <br> 유지
    빈 줄 두 개(\n\n) → 새 단락 <p> 구분
*/
function parseInlineMarkdown(text) {
  /* 1) HTML 특수문자 이스케이프 (XSS 방지) */
  let s = String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');

  /* 2) 인라인 서식 변환 — 순서 중요 (긴 패턴 먼저) */
  /* 굵은 기울임 ***텍스트*** */
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  /* 굵게 **텍스트** */
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  /* 기울임 *텍스트* (단, ** 는 이미 처리됨) */
  s = s.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  /* 취소선 ~~텍스트~~ */
  s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');

  return s;
}

async function renderBody(item) {

  /* Fiction */
  if (item.type === 'fiction') {
    let text = '';
    if (item.bodyFile || item.bodyURL) {
      const url = item.bodyURL || item.bodyFile;
      try {
        const r = await fetch(url);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        text = await r.text();
      } catch(e) {
        return `<div class="fiction-error">
          ⚠ 파일을 불러올 수 없습니다: ${escH(url)}<br>
          오류: ${e.message}<br><br>
          GitHub Raw URL 형식인지 확인하세요:<br>
          https://raw.githubusercontent.com/유저명/저장소명/main/파일명.txt
        </div>`;
      }
    } else {
      text = item.body || '';
    }

    /*
      단락 변환 + 들여쓰기 규칙 + 마크다운 인라인 처리
      ─────────────────────────────────────────
      빈 줄 두 개(엔터 두 번, \n\n) = 새 단락 <p>
      엔터 한 번(\n)              = 줄바꿈 <br> 유지
      
      들여쓰기 적용 기준:
        1. "나 " 로 시작하는 문장
        2. " (큰따옴표) 로 시작하는 문장
        3. ' (작은따옴표/한국어 인용부호 '·「) 로 시작하는 문장
        4. 단락 내 두 번째 줄 이후 (엔터 한 번으로 구분된 줄)
      
      인라인 마크다운:
        **텍스트** → 굵게, *텍스트* → 기울임, ~~텍스트~~ → 취소선
    */
    const QUOTE_CHARS = ['"', '\u201c', '\u2018', '\u300c', '\u300e', "'", '\u2019', '\u201d'];

    /* Windows CRLF(\r\n) → LF(\n) 정규화 */
    const normalizedText = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

    const ps = normalizedText.trim().split('\n\n').map((para) => {
      if (para.trim() === '') {
        /* 무더기 엔터 → 빈 줄 개수만큼 그대로 띄워줌 */
        return `<p class="empty-line">&nbsp;</p>`;
      }
      /* 단락 내 줄들 처리 */
      const lines = para.split('\n');
      const processed = lines.map((line, lIdx) => {
        const trimmed = line.trimStart();

        /* 마크다운 인라인 파싱 적용 */
        const parsedLine = parseInlineMarkdown(line);
        const parsedTrimmed = parseInlineMarkdown(trimmed);

        const needsIndent =
          trimmed.startsWith('나 ') || trimmed === '나' ||
          QUOTE_CHARS.some(q => trimmed.startsWith(q)) ||
          lIdx > 0;

        if (needsIndent) {
          return `<span class="indent-na">${parsedLine}</span>`;
        }
        return parsedTrimmed;
      });
      return `<p>${processed.join('<br>')}</p>`;
    }).join('');

    return `<div class="fiction-body">${ps}</div>`;
  }

  /* Art */
  if (item.type === 'art') {
    const imgs = (item.images || []).map(u =>
      `<img src="${u}" alt="artwork" loading="lazy">`
    ).join('');
    return `<div class="art-viewer">${imgs}</div>
            ${item.caption ? `<div class="art-caption">${escH(item.caption)}</div>` : ''}`;
  }

  /* Video */
  if (item.type === 'video') {
    return `<div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/${item.youtubeId}"
        allowfullscreen allow="autoplay;encrypted-media"></iframe>
    </div>
    ${item.desc ? `<p class="video-desc">${escH(item.desc)}</p>` : ''}`;
  }

  return '';
}

/* =====================================================
  ■ 모달 열기/닫기
===================================================== */
function openModal(title, bodyHTML, btns) {
  document.getElementById('modalTitle').textContent    = title;
  document.getElementById('modalBody').innerHTML       = bodyHTML;
  document.getElementById('modalError').style.display = 'none';

  const btnsEl = document.getElementById('modalBtns');
  btnsEl.innerHTML = '';
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className   = 'modal-btn ' + (b.cls || '');
    btn.textContent = b.label;
    btn.onclick     = b.action;
    btnsEl.appendChild(btn);
  });

  document.getElementById('modal-backdrop').classList.add('visible');

  setTimeout(() => {
    const inp = document.querySelector('#modalBody input[type="text"]');
    if (inp) inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') btns[btns.length - 1].action();
    });
  }, 50);
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('visible');
}
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});

/* =====================================================
  ■ 사이드바 현재 위치 강조
===================================================== */
function navHighlight(cat, sub, idx) {
  document.querySelectorAll('.nav-cat,.nav-sub,.nav-content-item')
    .forEach(el => el.classList.remove('active'));
  if (cat) {
    const c = document.querySelector(`.nav-cat[data-cat="${cat}"]`);
    if (c) c.classList.add('active');
  }
  if (idx !== null && idx !== undefined) {
    const i = document.querySelector(
      `.nav-content-item[data-cat="${cat}"][data-sub="${sub}"][data-idx="${idx}"]`
    );
    if (i) i.classList.add('active');
  }
}

/* =====================================================
  ■ 사이드바 열기/닫기 (모바일)
===================================================== */
const burgerBtn = document.getElementById('burgerBtn');
const sidebar   = document.getElementById('sidebar');
const overlay   = document.getElementById('overlay');

function openSidebar()  { sidebar.classList.add('open');    overlay.classList.add('visible');    burgerBtn.classList.add('open');    }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); burgerBtn.classList.remove('open'); }

burgerBtn.addEventListener('click', () =>
  sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
);
document.getElementById('closeBtn').addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);

/* =====================================================
  ■ 맨 위로 버튼 (스크롤 300px 이상)
===================================================== */
const scrollBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', () => {
  scrollBtn.classList.toggle('visible', window.scrollY > 300);
});
scrollBtn.addEventListener('click', () =>
  window.scrollTo({ top:0, behavior:'smooth' })
);

/* =====================================================
  ■ HTML 특수문자 이스케이프
===================================================== */
function escH(s) {
  if (!s && s !== 0) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
